.ebtn{background:none;border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);border-radius:4px;padding:4px 12px;cursor:pointer;font-size:10px;color:var(--accent);font-family:'Orbitron',sans-serif;letter-spacing:1px;transition:all .2s}
.ebtn:hover{border-color:var(--accent);box-shadow:0 0 8px color-mix(in srgb, var(--accent) 27%, transparent);background:rgba(var(--accent-rgb),.08)}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--accent-deep) var(--surface)}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--accent-deep);border-radius:2px}
.msg{max-width:88%;animation:fadein .3s ease-out}
.msg.u{align-self:flex-end}
.msg.a{align-self:flex-start}
.bbl{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.7}
.msg.u .bbl{background:linear-gradient(135deg,rgba(var(--accent-deep-rgb),.22),rgba(var(--accent-rgb),.08));border:1px solid var(--accent-deep);border-radius:8px 2px 8px 8px;color:#f5e8ef}
.msg.a .bbl{background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 13%, transparent);border-radius:2px 8px 8px 8px;color:var(--ink)}
.atag{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--accent);letter-spacing:1px;margin-bottom:5px}
.mact{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.spkbtn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(var(--accent-deep-rgb),.12),rgba(var(--accent-rgb),.06));border:1px solid color-mix(in srgb, var(--accent-deep) 33%, transparent);border-radius:20px;padding:6px 14px 6px 12px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .22s;color:var(--accent-soft)}
.spkbtn:hover{border-color:var(--accent-deep);box-shadow:0 0 14px -4px var(--accent-deep);background:linear-gradient(135deg,rgba(var(--accent-deep-rgb),.2),rgba(var(--accent-rgb),.1))}
.spkbtn:active{transform:scale(.95)}
.spkbtn.on{border-color:#ff5252;color:var(--accent-soft);box-shadow:0 0 16px -4px #ff5252;background:linear-gradient(135deg,rgba(255,82,82,.18),rgba(var(--accent-deep-rgb),.1))}
.spkwave{display:flex;align-items:center;gap:2px;height:14px}
.spkwave span{width:2.5px;height:5px;border-radius:2px;background:currentColor;opacity:.55;transition:opacity .2s}
.spkbtn.on .spkwave span{opacity:1;animation:wave 1s ease-in-out infinite}
.spkbtn.on .spkwave span:nth-child(1){animation-delay:0s}
.spkbtn.on .spkwave span:nth-child(2){animation-delay:.15s}
.spkbtn.on .spkwave span:nth-child(3){animation-delay:.3s}
.spkbtn.on .spkwave span:nth-child(4){animation-delay:.45s}
@keyframes wave{0%,100%{height:4px}50%{height:13px}}
.spktxt{line-height:1}
@keyframes spkpulse{0%,100%{opacity:1}50%{opacity:.5}}
.playbtn{display:flex;align-items:center;gap:5px;background:none;border:1px solid color-mix(in srgb, var(--accent) 40%, transparent);border-radius:4px;padding:4px 11px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .2s;color:var(--accent)}
.playbtn:hover{border-color:var(--accent);box-shadow:0 0 8px color-mix(in srgb, var(--accent) 27%, transparent);background:rgba(var(--accent-rgb),.08)}
.nlbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted)}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px}
.tdd{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}
.tdd:nth-child(2){animation-delay:.2s}.tdd:nth-child(3){animation-delay:.4s}
.iw{padding:10px 12px;background:var(--surface);border-top:1px solid color-mix(in srgb, var(--accent) 20%, transparent);flex-shrink:0}
.ir{display:flex;gap:8px;align-items:flex-end}
.tin{flex:1;background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);border-radius:6px;padding:10px 14px;color:var(--ink);font-family:'Rajdhani',sans-serif;font-size:14px;resize:none;min-height:44px;max-height:110px;outline:none;transition:border-color .2s}
.tin:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(var(--accent-rgb),.15)}
.tin::placeholder{color:var(--muted)}
.snd{width:44px;height:44px;border:none;border-radius:6px;background:linear-gradient(135deg,var(--accent-deep),var(--accent));cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;color:#fff}
.snd:hover{transform:scale(1.06);box-shadow:0 0 18px var(--accent)}
.snd:disabled{opacity:.35;cursor:not-allowed;transform:none}
.hint{font-size:9px;color:var(--muted);text-align:center;margin-top:5px;font-family:'Share Tech Mono',monospace}
.mov{display:none;position:fixed;inset:0;background:rgba(10,5,9,.97);z-index:1000;flex-direction:column}
.mov.open{display:flex}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:var(--surface);flex-shrink:0}
.mlbl{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--accent);letter-spacing:1.5px;display:flex;align-items:center;gap:7px}
.cbtn{background:none;border:1px solid #ff5252;border-radius:9px;padding:9px 16px;cursor:pointer;color:#ff5252;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;transition:all .2s}
.cbtn:hover{background:rgba(255,82,82,.1);box-shadow:0 0 10px #ff5252}
.mpw{padding:8px 8px 14px;background:var(--surface);border-bottom:1px solid color-mix(in srgb, var(--accent) 20%, transparent);flex-shrink:0}
.mmsgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--accent-deep) var(--surface)}
.mmsgs::-webkit-scrollbar{width:3px}
.mmsgs::-webkit-scrollbar-thumb{background:var(--accent-deep);border-radius:2px}
.miw{padding:10px 12px;background:var(--surface);border-top:1px solid color-mix(in srgb, var(--accent) 20%, transparent);flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--accent),0 0 25px color-mix(in srgb, var(--accent) 27%, transparent)}50%{box-shadow:0 0 20px var(--accent),0 0 50px color-mix(in srgb, var(--accent) 40%, transparent)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dropdown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fingerpop{from{opacity:0;transform:translateX(-50%) scale(.4)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes flicker{0%,94%,97%,100%{opacity:1}95%,98%{opacity:.5}}
.flicker{animation:flicker 6s infinite}
/* ── nav bar ── */
.navbar{display:flex;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));background:color-mix(in srgb, var(--accent) 7%, var(--surface));border-top:1px solid color-mix(in srgb, var(--accent) 13%, transparent);flex-shrink:0;position:relative}
.navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb, var(--accent) 40%, transparent),transparent)}
.navbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;background:transparent;border:1px solid color-mix(in srgb, var(--ink) 5%, transparent);border-radius:12px;cursor:pointer;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.navbtn .nicon{font-size:16px;line-height:1;transition:transform .25s}
.navbtn .nlabel{position:relative;z-index:1}
.navbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--nav-c,var(--accent))22,transparent 60%);opacity:0;transition:opacity .25s}
.navbtn:hover{color:var(--accent-deep);border-color:color-mix(in srgb, var(--ink) 10%, transparent)}
.navbtn:hover .nicon{transform:scale(1.12)}
.navbtn.on{color:var(--accent-deep);border-color:var(--nav-c,var(--accent));background:rgba(var(--accent-rgb),.06);box-shadow:0 0 18px -6px var(--nav-c,var(--accent)),inset 0 0 16px -10px var(--nav-c,var(--accent))}
.navbtn.on::before{opacity:1}
.navbtn.on .nicon{transform:scale(1.1);filter:drop-shadow(0 0 5px var(--nav-c,var(--accent)))}
.navbtn:active{transform:scale(.95)}
/* ── vertical video lessons feed (TikTok-style, one video per screen) ── */
.vidfeed{flex:1;overflow-y:auto;scroll-snap-type:y mandatory;background:#000;scrollbar-width:none}
.vidfeed::-webkit-scrollbar{display:none}
.vidslide{height:100%;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.vidplayer{width:100%;height:100%;object-fit:cover;background:#000;border:none}
@media (min-aspect-ratio:3/4){video.vidplayer{object-fit:contain}}
.vidplaceholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:.25}
.vidmute{position:absolute;right:12px;top:14px;z-index:6;background:rgba(18,8,14,.55);border:1px solid color-mix(in srgb, var(--ink) 16%, transparent);border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.vidpause{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;color:color-mix(in srgb, var(--ink) 84%, transparent);pointer-events:none;text-shadow:0 2px 18px #000}
.vidbar{position:absolute;left:0;right:0;bottom:0;height:3px;background:color-mix(in srgb, var(--ink) 13%, transparent);z-index:7}
.vidbar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#ff5252)}
/* ── TikTok chrome: top fade, right action rail (like / ask / save), floating hearts ── */
.vidtopfade{position:absolute;top:0;left:0;right:0;height:64px;background:linear-gradient(rgba(0,0,0,.42),transparent);pointer-events:none;z-index:3}
/* the app header hides on the video feed — this translucent ☰ keeps navigation reachable */
.vidfab{position:fixed;top:calc(10px + env(safe-area-inset-top,0px));left:10px;z-index:60;width:42px;height:42px;border-radius:50%;background:rgba(18,8,14,.55);border:1px solid color-mix(in srgb, var(--ink) 16%, transparent);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
.vidfab span{display:block;width:17px;height:2px;background:#fff;border-radius:2px}
.vidfab:active{transform:scale(.92)}
.vidrail{position:absolute;right:6px;bottom:92px;display:flex;flex-direction:column;align-items:center;gap:15px;z-index:8}
.vidact{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.vidact-ic{font-size:29px;filter:grayscale(1) brightness(1.9);text-shadow:0 1px 6px rgba(0,0,0,.55);transition:transform .12s;line-height:1}
.vidact:active .vidact-ic{transform:scale(.85)}
.vidact.on .vidact-ic,.vidact.fav .vidact-ic{filter:none;animation:heartpop .32s ease-out}
.vidact-n{font-family:'Rajdhani',sans-serif;font-size:11.5px;font-weight:700;color:#fff;text-shadow:0 1px 4px #000;min-height:13px}
@keyframes heartpop{0%{transform:scale(.55)}55%{transform:scale(1.35)}100%{transform:scale(1)}}
.vidheart{position:absolute;font-size:74px;pointer-events:none;z-index:9;animation:heartfloat .82s ease-out forwards}
@keyframes heartfloat{0%{opacity:0;transform:scale(.4)}18%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:translateY(-110px) scale(1.35)}}
/* ── pathway page (hero + grid) ── */
.pathpage{flex:1;overflow-y:auto;padding:0 0 24px;scrollbar-width:thin;scrollbar-color:var(--accent-deep) var(--surface)}
.pathpage::-webkit-scrollbar{width:4px}
.pathpage::-webkit-scrollbar-thumb{background:var(--accent-deep);border-radius:2px}
.pathhero{position:relative;text-align:center;padding:22px 16px 20px;margin-bottom:8px;overflow:hidden;border-bottom:1px solid color-mix(in srgb, var(--accent) 12%, transparent)}
.pathhero-glow{position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,var(--accent) 0%,transparent 65%);opacity:.1;pointer-events:none}
.pathbadge{position:relative;display:inline-block;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--accent);border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);border-radius:20px;padding:4px 15px;margin-bottom:12px;background:rgba(var(--accent-rgb),.05)}
/* "there's more to do" strip — real lesson/badge counts so finishing the
   visible topic cards below doesn't read as "that's everything" */
.pathprogress{display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px;margin:0 12px 14px;padding:10px 14px;border-radius:13px;background:linear-gradient(135deg,var(--surface-2),var(--surface));border:1px solid color-mix(in srgb, var(--accent) 18%, transparent)}
.pathprogress-stat{font-family:'Rajdhani',sans-serif;font-size:12.5px;font-weight:600;color:var(--muted)}
.pathprogress-stat b{color:var(--accent-soft);font-weight:800}
.pathprogress-next{margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--accent)}
.pathh1{position:relative;font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:#fff;text-shadow:0 0 16px color-mix(in srgb, var(--accent) 47%, transparent);letter-spacing:1px;margin-bottom:13px}
.pathguide{position:relative;font-size:12px;color:#e0a8c6;line-height:1.65;background:linear-gradient(135deg,rgba(var(--accent-rgb),.07),rgba(var(--accent-deep-rgb),.07));border:1px solid color-mix(in srgb, var(--accent) 13%, transparent);border-radius:10px;padding:11px 14px;font-family:'Rajdhani',sans-serif;max-width:430px;margin:0 auto}
.pgroup{padding:0 14px;margin-bottom:22px}
.pgrouphdr{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.pgbar{width:4px;height:34px;border-radius:3px;flex-shrink:0;box-shadow:0 0 10px currentColor}
.pgicon{font-size:21px;line-height:1;flex-shrink:0}
.pginfo{flex:1;min-width:0}
.pglabel{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.2}
.pgdesc{font-size:11px;color:#96788b;font-family:'Rajdhani',sans-serif;margin-top:2px}
.pgstep{font-family:'Share Tech Mono',monospace;font-size:9px;color:#783a5c;letter-spacing:1px;flex-shrink:0}
.pgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
/* ── v12 value pages (Today / Ear gym / Reading / Insights / Report) ── */
.v12hero{text-align:center;padding:16px 12px 12px}
.v12title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--ink);letter-spacing:1px}
.v12sub{font-size:12.5px;color:var(--muted);font-family:'Rajdhani',sans-serif;margin-top:5px;line-height:1.5}
.v12card{background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:14px;padding:14px 13px;margin:0 0 10px}
.tdstep{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:13px;background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);margin-bottom:9px}
.tdstep.done{border-color:color-mix(in srgb, var(--accent) 40%, transparent);background:linear-gradient(160deg,var(--surface-2),var(--surface))}
.tdico{font-size:22px;flex-shrink:0}
.tdtag{font-size:9.5px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:.6px}
.tdlbl{font-size:14px;color:#f0e2ea;font-family:'Rajdhani',sans-serif;font-weight:700;line-height:1.3}
.tdgo{flex-shrink:0;padding:9px 16px;border-radius:10px;border:1px solid color-mix(in srgb, var(--accent) 40%, transparent);background:rgba(var(--accent-rgb),.1);color:var(--accent-soft);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer}
.tdgo.done{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.08);cursor:default}
.tdbar{height:10px;border-radius:6px;background:var(--surface);overflow:hidden;border:1px solid color-mix(in srgb, var(--ink) 7%, transparent)}
.tdfill{height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));transition:width .4s}
.egopt{padding:12px 8px;border-radius:12px;border:1px solid var(--surface-2);background:linear-gradient(160deg,var(--surface-2),var(--surface));color:#f0e2ea;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;text-align:center;line-height:1.25}
.egopt.ok{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.1)}
.egopt.bad{border-color:#ff5252;color:#ff6e91;background:rgba(255,82,82,.08)}
.insbarwrap{display:flex;align-items:flex-end;gap:4px;height:90px;padding:4px 2px 0}
.insbar{flex:1;background:linear-gradient(180deg,var(--accent),var(--accent-deep));border-radius:4px 4px 0 0;min-height:2px}
.instile{flex:1;background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px;padding:11px 6px;text-align:center;min-width:0}
.instile b{display:block;font-family:'Orbitron',sans-serif;font-size:16px;color:var(--accent);margin-bottom:3px}
.instile span{font-size:9.5px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;line-height:1.2;display:block}
.certrow{display:flex;align-items:center;gap:11px;padding:12px;border-radius:13px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:linear-gradient(160deg,var(--surface),var(--surface));margin-bottom:9px}
.certrow.earned{border-color:var(--accent-soft)66;background:linear-gradient(160deg,var(--surface-2),var(--surface))}
.pcard{position:relative;display:flex;flex-direction:column;text-align:left;background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-top:2px solid var(--ac);border-radius:13px;padding:13px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--ink);min-height:152px;width:100%}
.pcardglow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:var(--ac);opacity:.1;transition:opacity .25s;pointer-events:none}
.pcard.done{border-color:color-mix(in srgb, var(--accent) 33%, transparent)}
.pcarddone{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px -2px var(--accent);z-index:3}
.pcard.current{box-shadow:0 0 0 1px var(--ac),0 0 22px -6px var(--ac);animation:currentpulse 1.8s ease-in-out infinite}
@keyframes currentpulse{0%,100%{box-shadow:0 0 0 1px var(--ac),0 0 18px -8px var(--ac)}50%{box-shadow:0 0 0 1px var(--ac),0 0 26px -2px var(--ac)}}
.pcardhere{position:absolute;top:9px;right:9px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:800;letter-spacing:.5px;color:var(--bg);background:var(--ac);border-radius:6px;padding:3px 6px;z-index:3;animation:flamepulse 1s ease-in-out infinite alternate}
.pcard:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 10px 26px -10px var(--ac)}
.pcard:hover .pcardglow{opacity:.22}
.pcard:active{transform:translateY(-1px) scale(.98)}
.pcardlevel{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;color:var(--ac);opacity:.95;margin-bottom:7px}
.pcardicon{font-size:30px;line-height:1;margin-bottom:9px}
.pcardtitle{font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.2px;color:#fff;margin-bottom:4px;line-height:1.3}
.pcardsub{font-size:10.5px;color:#a87e97;line-height:1.4;flex:1;margin-bottom:10px}
.pcardkeys{display:inline-block;align-self:flex-start;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--accent);background:rgba(var(--accent-rgb),.12);border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);border-radius:7px;padding:2px 7px;margin-bottom:8px}
.pcardgo{display:flex;align-items:center;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;color:var(--ac);border-top:1px solid color-mix(in srgb, var(--ink) 6%, transparent);padding-top:9px}
.pcardarrow{font-size:14px;transition:transform .2s}
.pcard:hover .pcardarrow{transform:translateX(4px)}
.pathfoot{text-align:center;font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin:10px 14px 0;padding-top:14px;line-height:1.6;border-top:1px solid color-mix(in srgb, var(--accent) 10%, transparent)}
/* ── inline key picker panel (spans full grid row) ── */

.keypanel{background:linear-gradient(165deg,var(--surface),var(--surface));border:1px solid var(--ac,var(--accent));border-radius:14px;padding:14px 13px;margin-top:10px;position:relative;overflow:hidden;animation:keyexpand .3s cubic-bezier(.2,.9,.3,1)}
.keypanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.6}
@keyframes keyexpand{from{opacity:0;transform:translateY(-8px) scaleY(.9)}to{opacity:1;transform:translateY(0) scaleY(1)}}
.keypanel-head{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid color-mix(in srgb, var(--ink) 6%, transparent)}
.keypanel-icon{font-size:18px;line-height:1}
.keypanel-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.3px;flex:1;min-width:0}

.keybtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 5px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 10%, transparent);border-radius:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.keybtn::after{content:'';position:absolute;inset:0;background:var(--ac,var(--accent));opacity:0;transition:opacity .18s}
.keybtn.black{background:var(--surface-2);border-color:color-mix(in srgb, var(--ink) 13%, transparent)}
.keybtn-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--ink);line-height:1;position:relative;z-index:1}
.keybtn.black .keybtn-name{color:var(--accent-soft)}
.keybtn-sub{font-size:8.5px;font-family:'Rajdhani',sans-serif;font-weight:600;color:var(--muted);line-height:1;position:relative;z-index:1}
.keybtn:hover{transform:translateY(-3px);border-color:var(--ac,var(--accent));box-shadow:0 8px 18px -8px var(--ac,var(--accent))}
.keybtn:hover::after{opacity:.1}
.keybtn:active{transform:translateY(-1px) scale(.95)}
.keypanel-foot{text-align:center;font-size:9.5px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:.5px;line-height:1.5}
/* ── admin page ── */

.admintabs{display:flex;gap:8px;padding:10px 14px 4px;flex-shrink:0}

.admstu-av{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:700;font-size:18px;color:#fff;background:linear-gradient(135deg,#ff5252,var(--accent-deep))}

.admstu-badge{display:inline-block;background:#ff5252;color:#fff;font-size:9px;font-family:'Orbitron',sans-serif;padding:2px 6px;border-radius:6px;vertical-align:middle;margin-left:6px}

.admstu-head{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.admstu-nm{color:var(--ink);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px}

.admstu-lv{color:var(--muted);font-size:11.5px;margin-top:2px}
.admstu-sec{color:var(--accent-soft);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;margin:16px 0 8px}

.admmg{background:var(--surface);border:1px solid #ff525233;border-radius:13px;padding:13px;margin-bottom:14px}
.admmg-h{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;color:var(--accent-soft);margin-bottom:6px}
