C–E♭–G–B♭ · 柔和、酷

4️⃣ 小大七 (mMaj7) — 1-♭3-5-7
C–E♭–G–B · 神秘（007风格）

5️⃣ 半减七 (m7♭5) — 1-♭3-♭5-♭7
C–E♭–G♭–B♭ · 忧郁

6️⃣ 减七 (dim7) — 1-♭3-♭5-♭♭7
C–E♭–G♭–A · 最紧张，用于连接

7️⃣ 增七 (7♯5) — 1-3-♯5-♭7
C–E–G♯–B♭ · 另类属和弦

8️⃣ 增大七 (maj7♯5) — 1-3-♯5-7
C–E–G♯–B · 梦幻、飘渺

💡 由不同的三度、五度、七度组合而成。`}},{id:"tension",icon:"⚡",title:{th:"เทนชั่น (Tension)",en:"Tension",zh:"张力音 (Tension)"},subtitle:{th:"โน้ตสีสัน 9, 11, 13",en:"Color notes — 9, 11, 13",zh:"色彩音 — 9、11、13"},level:5,color:"#c77dff",group:"advanced",demo:["C4","E4","G4","B4","D5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'เทนชั่น (Tension)' บนเปียโนให้หน่อยครับ อธิบายว่า tension คืออะไร โน้ต 9th, 11th, 13th การสร้าง extended chord และการ resolve ตอบภาษาไทยและระบุชื่อโน้ต เช่น Cmaj9 = C4 E4 G4 B4 D5",en:"Please teach me about 'Tension' on piano. Explain 9th, 11th, 13th notes, building extended chords, and resolution. List note names e.g. Cmaj9 = C4 E4 G4 B4 D5.",zh:"请教我钢琴上的'张力音(Tension)'。解释9度、11度、13度音符，构建扩展和弦，以及解决。列出音名如 Cmaj9 = C4 E4 G4 B4 D5。"}},{id:"blockchord",icon:"🧱",title:{th:"บล็อกคอร์ดใต้ทำนอง",en:"Block Chords",zh:"块状和弦"},subtitle:{th:"เล่นคอร์ดพร้อมเมโลดี้",en:"Block Chord Under the Melody",zh:"在旋律下弹奏块状和弦"},level:6,color:"#ff6ec7",group:"advanced",demo:["C4","E4","G4"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'Block Chord ใต้ทำนอง (Block Chord Under the Melody)' บนเปียโนให้หน่อยครับ อธิบายเทคนิคเล่นคอร์ดเต็มพร้อมโน้ตทำนองบนสุด สไตล์ George Shearing และการประยุกต์ใน solo piano ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Block Chords Under the Melody' on piano. Explain playing full chords with the melody on top, the George Shearing style, and solo piano application. List note names.",zh:"请教我钢琴上的'旋律下方的块状和弦(Block Chord)'。解释如何在旋律下方演奏完整和弦、George Shearing风格，以及独奏钢琴的应用。列出音名。"}},{id:"slashchord",icon:"➗",title:{th:"สแลชคอร์ด (Slash Chord)",en:"Slash Chord",zh:"斜杠和弦 (Slash Chord)"},subtitle:{th:"คอร์ดที่มีเบสต่างจากราก",en:"A chord with a different bass note",zh:"低音不同于根音的和弦"},level:7,color:"#ff2d78",group:"advanced",demo:["E4","G4","C5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'สแลชคอร์ด (Slash Chord)' บนเปียโนให้หน่อยครับ อธิบายว่า C/E คืออะไร การสร้าง bass line ที่เคลื่อนนุ่มนวล และการใช้ใน Gospel/Soul/Ballad ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Slash Chords' on piano. Explain what C/E means, creating smooth bass lines, and usage in Gospel/Soul/Ballad. List note names.",zh:"请教我钢琴上的'斜线和弦(Slash Chord)'。解释C/E是什么、创建流畅的低音线，以及在福音/灵魂/抒情中的运用。列出音名。"}},{id:"padchord",icon:"🌫️",title:{th:"แพดคอร์ด (Pad Chord)",en:"Pad Chord",zh:"铺底和弦 (Pad Chord)"},subtitle:{th:"Harmony ขั้นสูง — เสียงพื้นหลังที่ลอย",en:"Advanced harmony — floating background",zh:"高级和声 — 漂浮的背景音"},level:8,color:"#b8c0ff",group:"advanced",demo:["C4","G4","B4","D5","E5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'แพดคอร์ด (Pad Chord)' และ voicing ขั้นสูงบนเปียโนให้หน่อยครับ อธิบาย open voicing การกระจายโน้ตแบบ 4th/5th และการใช้ใน EDM/Ambient/Neo Soul เพื่อสร้างบรรยากาศล้ำๆ ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Pad Chords' and advanced voicing on piano. Explain open voicing, spreading notes in 4ths/5ths, and usage in EDM/Ambient/Neo Soul. List note names.",zh:"请教我钢琴上的'铺底和弦(Pad Chord)'和高级配置。解释开放配置、以4度/5度分散音符，以及在EDM/氛围/新灵魂乐中的运用。列出音名。"}},{id:"why-music",icon:"🌍",level:9,color:"#ffd166",group:"benefits",title:{th:"ประโยชน์ของดนตรี",en:"Why Music Matters",zh:"音乐的力量"},subtitle:{th:"ทำไมดนตรีถึงทรงพลัง",en:"The power of music",zh:"为何音乐如此重要"},content:{th:`🌍 ดนตรีไม่ใช่แค่ความบันเทิง แต่เป็นเครื่องมือที่ส่งผลต่อสมอง อารมณ์ เศรษฐกิจ และสังคม

🧠 ต่อสมองและอารมณ์
• กระตุ้นการหลั่งโดพามีน (สารแห่งความสุข) และลดฮอร์โมนความเครียด cortisol
• ช่วยความจำ สมาธิ และการเรียนรู้ — เด็กที่เล่นดนตรีมักมีพัฒนาการด้านภาษาและคณิตศาสตร์ดีขึ้น

🤝 ต่อสังคม
• สร้างความรู้สึกเป็นอันหนึ่งอันเดียวกัน ปลุกอารมณ์ร่วมของคนหมู่มาก
• เป็น "ภาษาสากล" ที่สื่อสารข้ามวัฒนธรรมและพรมแดน

ใน 5 บทถัดไป เราจะดูว่ามนุษย์ใช้ดนตรีจริงอย่างไรใน: ธุรกิจ 💼 · การทหาร 🎺 · ความเป็นชาติ 🇹🇭 · ชนชั้นสูง 👑 · และการบำบัดรักษา 💚`,en:`🌍 Music is not just entertainment — it shapes the brain, emotions, the economy and society.

🧠 Brain & emotion
• Triggers dopamine (the "feel-good" chemical) and lowers the stress hormone cortisol
• Boosts memory, focus and learning — kids who play music often gain language and math skills

🤝 Society
• Builds unity and stirs the shared emotion of large crowds
• A "universal language" that crosses cultures and borders

In the next 5 chapters we'll see how people really use music in: Business 💼 · the Military 🎺 · National identity 🇹🇭 · the Elite 👑 · and Healing 💚`,zh:`🌍 音乐不只是娱乐，它影响大脑、情绪、经济与社会。

🧠 大脑与情绪
• 促进多巴胺（快乐物质）分泌，降低压力激素皮质醇
• 提升记忆、专注与学习——学音乐的孩子常在语言和数学上更出色

🤝 社会
• 凝聚人心，激发群体共同的情感
• 是跨越文化与国界的"世界语言"

接下来5章，我们将看人类如何真正运用音乐：商业 💼 · 军事 🎺 · 国家认同 🇹🇭 · 精英阶层 👑 · 与疗愈 💚`}},{id:"music-business",icon:"💼",level:10,color:"#06d6a0",group:"benefits",title:{th:"ดนตรีกับธุรกิจ",en:"Music in Business",zh:"音乐与商业"},subtitle:{th:"เสียงที่ขายของได้",en:"Sound that sells",zh:"会卖货的声音"},content:{th:`💼 เสียงสร้างยอดขายและแบรนด์ได้จริง

🛒 เพลงในร้าน = ยอดขาย
งานวิจัยคลาสสิกของ Milliman (1982): เปิดเพลงจังหวะช้าในซูเปอร์มาร์เก็ต ทำให้ลูกค้าเดินช้าลง อยู่นานขึ้น ยอดขายเพิ่มถึง ~38% ในร้านอาหาร เพลงช้าทำให้ลูกค้านั่งนานและสั่งเครื่องดื่มมากขึ้น

🔔 Sonic Branding (โลโก้เสียง)
• Intel เสียง 4 โน้ต มูลค่าแบรนด์กว่า 200 ล้านดอลลาร์
• Mastercard สร้างเสียง 6 โน้ตที่ดังทุกครั้งที่จ่ายเงิน (2019)
• McDonald's "I'm Lovin' It" — แบรนด์ที่มี sonic logo จดจำได้สูงขึ้นถึง 8 เท่า

🌎 ระดับโลก: Coca-Cola, Apple, Spotify ใช้ดนตรีเป็นหัวใจการตลาด

🇹🇭 ไทย: วงร็อก "คาราบาว" ต่อยอดเป็นเครื่องดื่มชูกำลัง Carabao Daeng จนได้สปอนเซอร์ฟุตบอลอังกฤษ (Carabao Cup) — เปลี่ยนชื่อเสียงทางดนตรีเป็นแบรนด์ระดับโลก

🇨🇳 จีน: เพลงธีม "蜜雪冰城 (Mixue)" ปี 2021 (ดัดแปลงจาก Oh! Susanna) ไวรัลสุดขีด แฮชแท็กบน Douyin/TikTok ทะลุ 1.58 พันล้านครั้ง ดันแบรนด์ชานม-ไอศกรีมโตทั่วเอเชีย

💡 สรุป: เสียง → อารมณ์ → การตัดสินใจซื้อ`,en:`💼 Sound really drives sales and brand power.

🛒 In-store music = sales
The classic Milliman (1982) study: slow-tempo music in a supermarket made shoppers linger and lifted sales by ~38%. In restaurants, slow music keeps guests longer and they order more drinks.

🔔 Sonic branding (audio logos)
• Intel's 4-note tune is worth over $200 million in brand value
• Mastercard built a 6-note sound that plays on every payment (2019)
• McDonald's "I'm Lovin' It" — brands with a sonic logo are recalled up to 8× better

🌎 Global: Coca-Cola, Apple and Spotify put music at the heart of marketing.

🇹🇭 Thailand: rock band "Carabao" became the Carabao Daeng energy drink and now sponsors English football's Carabao Cup — turning musical fame into a global brand.

🇨🇳 China: the "Mixue" theme song (2021, adapted from Oh! Susanna) went viral with 1.58 billion plays under Douyin/TikTok hashtags, fueling the tea-and-ice-cream chain across Asia.

💡 Takeaway: sound → emotion → buying decision.`,zh:`💼 声音确实能带动销售与品牌力。

🛒 店内音乐 = 销售额
经典的 Milliman（1982）研究：超市播放慢节奏音乐让顾客停留更久，销售额提升约38%。餐厅里慢音乐让客人坐得更久、点更多饮品。

🔔 声音品牌（听觉标志）
• 英特尔的4音旋律品牌价值超2亿美元
• 万事达卡打造每次付款都会响起的6音之声（2019）
• 麦当劳"I'm Lovin' It"——拥有声音标志的品牌记忆度可高出8倍

🌎 全球：可口可乐、苹果、Spotify 都把音乐作为营销核心。

🇹🇭 泰国：摇滚乐队"Carabao（卡拉宝）"延伸成卡拉宝能量饮料，如今赞助英格兰联赛杯（Carabao Cup）——把音乐名气变成全球品牌。

🇨🇳 中国："蜜雪冰城"主题曲（2021，改编自《哦！苏珊娜》）爆红，抖音/TikTok 话题播放量超15.8亿次，推动这家茶饮冰淇淋品牌火遍亚洲。

💡 要点：声音 → 情绪 → 购买决定。`}},{id:"music-military",icon:"🎺",level:11,color:"#e76f51",group:"benefits",title:{th:"ดนตรีในกองทัพ",en:"Music in the Military",zh:"军队中的音乐"},subtitle:{th:"สั่งการ ปลุกใจ ข่มขวัญ",en:"Command, morale, intimidation",zh:"指挥·士气·震慑"},content:{th:`🎺 กองทัพใช้ดนตรีมานานนับพันปี

📡 สื่อสารและสั่งการ
ในอดีต กลอง แตร และปี่ ใช้ส่งสัญญาณในสนามรบ เสียงเดินทางไกลและสั่งการทหารจำนวนมากให้เคลื่อนพร้อมกัน (เช่น แตรปลุก แตรโจมตี แตรถอย)

🥁 ขวัญและความสามัคคี
วงดุริยางค์ทหารและการ "นับจังหวะเดิน" (cadence) ทำให้หน่วยเดินพร้อมเพรียง ฮึกเหิม และรู้สึกเป็นหนึ่งเดียว

🎶 ปี่สก็อต (Bagpipes)
กรมทหารสก็อตเป่าปี่นำทัพเข้าสู้ สร้างขวัญฝ่ายตนและข่มขวัญศัตรู โดดเด่นมากในสงครามโลกครั้งที่ 1

🔊 สงครามจิตวิทยา
กองทัพยุคใหม่เคยเปิดเพลงเสียงดังกดดันศัตรู เช่น ปฏิบัติการกดดันนายพลโนรีเอกาที่ปานามา ปี 1989

💡 สรุป: ดนตรี = เครื่องมือบังคับบัญชา ขวัญกำลังใจ และจิตวิทยา`,en:`🎺 Armies have used music for thousands of years.

📡 Communication & command
Drums, bugles and fifes once carried orders across the battlefield — sound travels far and moves large numbers of troops together (wake-up, charge, retreat calls).

🥁 Morale & cohesion
Military bands and marching "cadence" calls keep units in step, fired up, and feeling as one.

🎶 Bagpipes
Scottish regiments piped their troops into battle to lift their own morale and unnerve the enemy — famously in World War I.

🔊 Psychological warfare
Modern armies have blasted loud music to pressure opponents — e.g. the operation against General Noriega in Panama, 1989.

💡 Takeaway: music = a tool of command, morale and psychology.`,zh:`🎺 军队使用音乐已有数千年。

📡 通信与指挥
古时鼓、号、笛在战场上传递命令——声音传得远，能让大批士兵同步行动（起床号、冲锋号、撤退号）。

🥁 士气与凝聚
军乐队和行进"口令节奏"(cadence) 让队伍步伐一致、斗志高昂、融为一体。

🎶 苏格兰风笛
苏格兰军团吹着风笛冲锋，既鼓舞己方又震慑敌人——一战中尤为著名。

🔊 心理战
现代军队曾用高音量音乐施压对手——例如1989年巴拿马针对诺列加将军的行动。

💡 要点：音乐 = 指挥、士气与心理的工具。`}},{id:"music-nation",icon:"🇹🇭",level:12,color:"#118ab2",group:"benefits",title:{th:"ดนตรีกับความเป็นชาติ",en:"Music & National Identity",zh:"音乐与国家认同"},subtitle:{th:"เสียงที่หลอมรวมผู้คน",en:"Sound that unites a people",zh:"凝聚人民的声音"},content:{th:`🇹🇭 ดนตรีสร้าง "สำนึกร่วม" ของคนทั้งชาติ

🎵 เพลงชาติ
เครื่องมือสร้างความเป็นชาติที่ทรงพลังที่สุด ประเทศไทยเปิดเพลงชาติทุกวันเวลา 08:00 และ 18:00 ทั่วประเทศ และมีเพลงสรรเสริญพระบารมีในโรงภาพยนตร์

🔥 ปฏิวัติและรวมชาติ
• "La Marseillaise" จุดไฟการปฏิวัติฝรั่งเศส
• "Va, pensiero" ของแวร์ดี กลายเป็นเพลงปลุกใจรวมชาติอิตาลี
• "Finlandia" ของซิเบลิอุส สัญลักษณ์การต่อสู้เพื่อเอกราชของฟินแลนด์

🇨🇳 จีน: เพลงชาติ "义勇军进行曲 (March of the Volunteers)" มาจากภาพยนตร์ปี 1935 เป็นเพลงปลุกใจต้านการรุกราน

🌟 ยุคใหม่: K-pop (เช่น BTS) กลายเป็น "soft power" สร้างภาพลักษณ์และรายได้มหาศาลให้เกาหลีใต้

💡 สรุป: ดนตรีทำให้ผู้คนรู้สึกเป็น "พวกเดียวกัน"`,en:`🇹🇭 Music forges a shared sense of nationhood.

🎵 National anthems
The most powerful nation-building tool. Thailand plays its anthem nationwide every day at 08:00 and 18:00, and the Royal Anthem in cinemas.

🔥 Revolution & unification
• "La Marseillaise" lit the fire of the French Revolution
• Verdi's "Va, pensiero" became a rallying song for Italian unification
• Sibelius's "Finlandia" symbolized Finland's fight for independence

🇨🇳 China: the anthem "March of the Volunteers" came from a 1935 film — a song of resistance.

🌟 Today: K-pop (e.g. BTS) is "soft power," building South Korea's image and huge revenue.

💡 Takeaway: music makes people feel they belong to one another.`,zh:`🇹🇭 音乐铸就全民共同的"国家感"。

🎵 国歌
最有力的国家建构工具。泰国每天08:00与18:00全国播放国歌，影院里播放颂圣歌。

🔥 革命与统一
• 《马赛曲》点燃法国大革命
• 威尔第《飞吧，思想》成为意大利统一的号召之歌
• 西贝柳斯《芬兰颂》象征芬兰争取独立的抗争

🇨🇳 中国：国歌《义勇军进行曲》源自1935年电影，是抗争之歌。

🌟 当代：K-pop（如 BTS）成为"软实力"，为韩国塑造形象并带来巨大收益。

💡 要点：音乐让人们感到彼此同属一体。`}},{id:"music-elite",icon:"👑",level:13,color:"#9d4edd",group:"benefits",title:{th:"ดนตรีกับชนชั้นสูง",en:"Music & the Elite",zh:"音乐与精英阶层"},subtitle:{th:"สัญลักษณ์ของอำนาจและรสนิยม",en:"A symbol of power and taste",zh:"权力与品味的象征"},content:{th:`👑 ดนตรีเป็นเครื่องแสดงสถานะของชนชั้นสูงมาช้านาน

🎼 ระบบอุปถัมภ์ (Patronage)
ในยุโรป ขุนนางและราชสำนักเลี้ยงดูคีตกวี เช่น ไฮเดิน รับใช้ราชวงศ์ Esterházy; โมสาร์ทและเบโทเฟนพึ่งพาชนชั้นสูงเวียนนา การมีคีตกวีประจำตัวคือเครื่องแสดงรสนิยมและอำนาจ

🇫🇷 ราชสำนักฝรั่งเศส
พระเจ้าหลุยส์ที่ 14 (Sun King) ทรงเต้นบัลเลต์เอง และใช้ดนตรี-นาฏศิลป์ที่พระราชวังแวร์ซายแสดงพระราชอำนาจ

🇹🇭 ไทย
ดนตรีในราชสำนัก (วงปี่พาทย์) สืบทอดยาวนาน และในหลวงรัชกาลที่ 9 ทรงเป็นคีตกวีแจ๊สที่โลกยอมรับ พระราชนิพนธ์ เช่น "สายฝน" และ "H.M. Blues"

🇨🇳 จีน
"雅乐 (yayue)" ดนตรีพิธีในราชสำนัก และ "กู่ฉิน (guqin)" เครื่องดนตรีของปราชญ์และผู้ดีจีน ใช้ขัดเกลาจิตใจให้สูงส่ง

💡 สรุป: ดนตรี = สัญลักษณ์ของอำนาจ การศึกษา และรสนิยมชั้นสูง`,en:`👑 Music has long signaled the status of the elite.

🎼 The patronage system
In Europe, nobles and courts employed composers — Haydn served the Esterházy princes; Mozart and Beethoven relied on Vienna's aristocracy. Keeping a composer showed taste and power.

🇫🇷 The French court
Louis XIV, the "Sun King," danced ballet himself and used music and dance at Versailles to display royal power.

🇹🇭 Thailand
Royal court music (piphat ensembles) has a long lineage, and King Rama IX (Bhumibol) was a world-respected jazz composer — works like "Falling Rain (Saiyon)" and "H.M. Blues."

🇨🇳 China
"Yayue" ritual court music, and the "guqin" — the instrument of scholars and gentlemen, used to refine the mind.

💡 Takeaway: music = a symbol of power, education and refined taste.`,zh:`👑 音乐长久以来彰显精英阶层的地位。

🎼 赞助制度
在欧洲，贵族与宫廷供养作曲家——海顿为埃斯特哈齐家族服务；莫扎特、贝多芬依赖维也纳贵族。拥有专属作曲家象征品味与权力。

🇫🇷 法国宫廷
"太阳王"路易十四亲自跳芭蕾，并在凡尔赛宫以音乐舞蹈彰显王权。

🇹🇭 泰国
宫廷音乐（披帕乐团）传承悠久；泰国九世王（普密蓬）是受世界尊敬的爵士作曲家，作品如《Falling Rain（สายฝน）》与《H.M. Blues》。

🇨🇳 中国
"雅乐"为宫廷礼仪音乐；"古琴"是文人雅士的乐器，用以修身养性。

💡 要点：音乐 = 权力、教养与高雅品味的象征。`}},{id:"music-therapy",icon:"💚",level:14,color:"#2a9d8f",group:"benefits",title:{th:"ดนตรีบำบัด",en:"Music Therapy",zh:"音乐疗法"},subtitle:{th:"เยียวยากาย ใจ และสมอง",en:"Healing & wellness",zh:"疗愈与健康"},content:{th:`💚 ดนตรีคือ "ยา" ที่ช่วยกาย ใจ และสมอง

🏥 เป็นวิชาชีพการแพทย์จริง
ดนตรีบำบัด (Music Therapy) มีสมาคมวิชาชีพ (เช่น AMTA) และใช้ในโรงพยาบาลทั่วโลก

🧠 ฟื้นฟูสมอง
• ผู้ป่วยหลอดเลือดสมองที่พูดไม่ได้ (aphasia) ใช้ "Melodic Intonation Therapy" ร้องเป็นทำนองเพื่อกลับมาพูด
• ผู้ป่วยพาร์กินสันใช้จังหวะดนตรีช่วยให้เดินมั่นคงขึ้น

💭 ความจำ
ผู้ป่วยอัลไซเมอร์/สมองเสื่อม มักจำเพลงเก่าได้ และตอบสนองดีขึ้นเมื่อได้ฟังเพลงในวัยหนุ่มสาว

😌 ลดเครียดและความเจ็บปวด
ดนตรีลดฮอร์โมน cortisol ความดันโลหิต และความวิตกกังวล จึงใช้ก่อน/ระหว่างผ่าตัด และดูแลทารกคลอดก่อนกำหนด (NICU)

🌟 ตัวอย่างจริง: ส.ส.สหรัฐ Gabby Giffords ฟื้นความสามารถในการพูดด้วยดนตรีบำบัดหลังถูกยิงที่ศีรษะ

💡 สรุป: ดนตรีคือยาไร้ผลข้างเคียงที่เยียวยาทั้งร่างกายและจิตใจ`,en:`💚 Music is "medicine" for body, mind and brain.

🏥 A real medical profession
Music therapy has professional bodies (e.g. AMTA) and is used in hospitals worldwide.

🧠 Brain recovery
• Stroke patients who can't speak (aphasia) use "Melodic Intonation Therapy" — singing words back into speech
• Parkinson's patients use musical rhythm to walk more steadily

💭 Memory
People with Alzheimer's/dementia often still remember old songs and respond better to music from their youth.

😌 Less stress & pain
Music lowers cortisol, blood pressure and anxiety — used before/during surgery and in newborn intensive care (NICU).

🌟 Real case: U.S. Congresswoman Gabby Giffords regained her speech through music therapy after being shot in the head.

💡 Takeaway: music is a side-effect-free medicine that heals body and mind.`,zh:`💚 音乐是身、心、脑的"良药"。

🏥 真正的医疗专业
音乐疗法有专业协会（如 AMTA），在全球医院中应用。

🧠 大脑康复
• 无法说话的中风（失语症）患者用"旋律语调疗法"，把词语唱回成语言
• 帕金森患者借助音乐节奏让步态更稳

💭 记忆
阿尔茨海默/失智患者常仍记得老歌，听到年轻时的音乐反应更好。

😌 减压与止痛
音乐降低皮质醇、血压与焦虑——用于手术前后及新生儿重症监护（NICU）。

🌟 真实案例：美国国会议员 Gabby Giffords 头部中枪后，通过音乐疗法重新恢复了说话能力。

💡 要点：音乐是没有副作用的良药，疗愈身心。`}}],s2={th:[{id:"benefits",label:"ประโยชน์ของดนตรี",desc:"ดนตรีเปลี่ยนโลกอย่างไร — ธุรกิจ ทหาร ชาติ ชนชั้นสูง การบำบัด",icon:"🌍"},{id:"foundation",label:"รากฐาน",desc:"เริ่มที่นี่ — พื้นฐานที่ต้องรู้ก่อน",icon:"🌱"},{id:"chords",label:"คอร์ด",desc:"สร้างเสียงประสาน",icon:"🎹"},{id:"advanced",label:"ขั้นสูง",desc:"Harmony ระดับโปร",icon:"🚀"}],en:[{id:"benefits",label:"WHY MUSIC MATTERS",desc:"How music shapes business, war, nations, elites & healing",icon:"🌍"},{id:"foundation",label:"FOUNDATION",desc:"Start here — essential basics",icon:"🌱"},{id:"chords",label:"CHORDS",desc:"Building harmony",icon:"🎹"},{id:"advanced",label:"ADVANCED",desc:"Pro-level harmony",icon:"🚀"}],zh:[{id:"benefits",label:"音乐的力量",desc:"音乐如何改变世界——商业、军事、国家、精英与疗愈",icon:"🌍"},{id:"foundation",label:"基础",desc:"从这里开始 — 必备基础",icon:"🌱"},{id:"chords",label:"和弦",desc:"构建和声",icon:"🎹"},{id:"advanced",label:"进阶",desc:"专业级和声",icon:"🚀"}]},hi={lesson:50,chapter:25,ask:10,daily:15},vr=[{min:0,icon:"🌱",c:"#a855f7",th:"มือใหม่",en:"Novice",zh:"初学者"},{min:120,icon:"🎵",c:"#00e0ff",th:"ผู้เริ่มต้น",en:"Beginner",zh:"入门"},{min:300,icon:"🎶",c:"#22c8ff",th:"นักเรียน",en:"Student",zh:"学生"},{min:560,icon:"🎹",c:"#7b2fff",th:"นักฝึก",en:"Apprentice",zh:"学徒"},{min:900,icon:"🎼",c:"#9d4edd",th:"นักดนตรี",en:"Musician",zh:"乐手"},{min:1350,icon:"⭐",c:"#c77dff",th:"นักเปียโน",en:"Pianist",zh:"钢琴手"},{min:1950,icon:"🌟",c:"#ff6ec7",th:"ผู้ชำนาญ",en:"Virtuoso",zh:"演奏家"},{min:2750,icon:"💎",c:"#ff2d78",th:"ปรมาจารย์",en:"Maestro",zh:"大师"},{min:3800,icon:"👑",c:"#ffb703",th:"เซียนเปียโน",en:"Grandmaster",zh:"宗师"},{min:5200,icon:"🏆",c:"#ffd166",th:"ตำนาน",en:"Legend",zh:"传奇"}];function Pt(t){const e=Math.max(0,t||0);let n=0;for(let a=0;a<vr.length;a++)e>=vr[a].min&&(n=a);const r=vr[n],s=vr[n+1]||null,i=s?s.min-r.min:1;return{level:n+1,tier:r,next:s,curMin:r.min,nextMin:s?s.min:r.min,need:s?s.min-e:0,progress:s?Math.min(1,(e-r.min)/i):1,isMax:!s}}function Qo(t){return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2 สนใจติดต่อ: LINE @tiga.ai 🎹`,octaveHint:"เลื่อนช่วงคีย์ขึ้น-ลง",vmSys:`คุณคือ 'ครู TiGA' ครูเปียโนระดับโลก จบคอนเซอร์วาทอรี อบอุ่น ใจเย็น สอนเก่งมาก กำลังสอนตัวต่อตัวแบบสดผ่านเสียง ยึดแนวครูชั้นครู: Suzuki (ฟังเยอะ+แบ่งขั้นเล็กจิ๋ว), Taubman (เทคนิคผ่อนคลายไม่บาดเจ็บ ข้อมือนุ่ม นิ้วโค้ง ใช้น้ำหนักแขน), Kodály/Dalcroze (จังหวะและโสตประสาท)

วิธีสอนทุกครั้ง (วงจร): 1) วินิจฉัย—ถามหรือดูระดับและเป้าหมาย 2) ให้ 'หนึ่งขั้นเล็กที่สุด' 3) อธิบาย 'ทำไม' สั้นๆ 4) สาธิตด้วยการเล่นจริง 5) ชวนผู้เรียนลองเล่นแล้วฟัง 6) ประเมินจากสิ่งที่เขาเล่นจริง (ระบบบอกโน้ต/คอร์ด/สเกลที่ตรวจพบให้)—ชมจุดที่ถูก บอก 'โน้ตที่ผิดเป๊ะๆ' และวิธีแก้ 7) ทำซ้ำหรือเลื่อนขั้น

เน้นเทคนิค: ข้อมือผ่อนคลาย นิ้วโค้งมน ใช้น้ำหนักแขน นั่งหลังตรง · เลขนิ้วถูกต้อง · แยกมือก่อนค่อยรวมสองมือ · ช้าก่อนค่อยเร็ว ('ซ้อมช้าเพื่อเล่นเร็ว')
ดนตรี: จังหวะคงที่ นับจังหวะ เปิดเมโทรนอมช่วยได้ สอนเสียงดัง-เบาและการวลี ไม่ใช่แค่โน้ตถูก
ทฤษฎีต้องแม่นยำเสมอ: เมเจอร์สเกล = ระยะครึ่งเสียง 2-2-1-2-2-2-1 จากตั้งต้น · คอร์ดเมเจอร์ = ราก +4 +7 ครึ่งเสียง · ไมเนอร์ = ราก +3 +7 · ตรวจให้ชัวร์ก่อนบอกโน้ต และเชื่อข้อมูลโน้ตที่ระบบตรวจให้

Contact: LINE @tiga.ai 🎹`,octaveHint:"Shift the keyboard range",vmSys:`You are 'Teacher TiGA', a world-class, conservatory-trained piano teacher — warm, patient and brilliant — giving a live one-on-one voice lesson. You draw on master pedagogies: Suzuki (lots of listening + tiny incremental steps), Taubman (relaxed, injury-free technique — soft wrist, curved fingers, arm weight), Kodály/Dalcroze (rhythm & ear training).

Your method every time (loop): 1) Diagnose — ask or sense their level and goal. 2) Give ONE smallest next step. 3) Explain the WHY briefly. 4) Demonstrate by playing. 5) Invite them to try, then listen. 6) Assess from what they actually played (you're told the detected notes/chord/scale) — praise what's right, name the EXACT wrong note and the fix. 7) Repeat or level up.

Technique to emphasize: relaxed wrist, curved fingers, arm weight, upright posture; correct fingering; hands separately before together; slow before fast ('practice slow to play fast').
Musicality: steady pulse, count the beat, offer the metronome; teach dynamics and phrasing, not just right notes.
Always be theory-accurate: major scale = semitone pattern 2-2-1-2-2-2-1 from the root; major triad = root +4 +7 semitones; minor triad = root +3 +7; double-check before stating notes, and trust the detected-notes data the app gives you.
Adapt to age: kids — playful, short, lots of praise; adults — go deeper into theory. Use a growth mindset, praise effort, be patient and specific.

Tools you can command (put in your message):
- Melody, one note at a time: [play: C4 D4 E4]  (use - for a rest)
- A chord together: [chord: C4 E4 G4]
- Highlight keys to show finger placement (no sound): [highlight: C4 E4 G4]
- Start the metronome at a tempo: [metro: 80]
Use note names with octave, range C4 to B5. Use tools often, e.g. "Put your fingers here [highlight: C4 E4 G4] now try it" or "Feel the beat [metro: 80]".

Style: concise and natural like speaking (2-4 sentences), one step at a time, always end by inviting them to play or asking a question. No markdown/bullets/symbols other than the commands. Always reply in English.`},zh:{ph:"询问钢琴问题，例如 C大调音阶是什么？",hint:"[ 仅限钢琴问题 • AI 驱动 ]",aiLabel:"TIGA AI • 在线",pianoLabel:"◈ 神经钢琴界面 ◈",replay:"重播",leftHand:"左手",rightHand:"右手",fingerLabel:"指法",expand:"⤢ 展开",close:"✕ 关闭",speak:"🔊 收听",speaking:"⏹ 停止",welcome:`您好！我是TiGA，您的AI钢琴导师 🎹

/* game juice: shake, GO!, particle bursts, combo meter, full-combo banner */
.songstage.shake{animation:shake .38s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%{transform:translate(-2px,1px)}20%{transform:translate(3px,-2px)}30%{transform:translate(-4px,2px)}40%{transform:translate(4px,1px)}50%{transform:translate(-3px,-1px)}60%{transform:translate(3px,2px)}70%{transform:translate(-2px,-2px)}80%{transform:translate(2px,1px)}100%{transform:translate(0,0)}}
.songgo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;color:#06d6a0;text-shadow:0 0 40px #06d6a0;pointer-events:none;animation:goflash .7s ease-out forwards}

.burst{position:absolute;left:50%;top:42%;width:0;height:0;pointer-events:none;z-index:5}
.burst i{position:absolute;left:0;top:0;width:9px;height:9px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px currentColor;color:#a855f7;transform:rotate(var(--a)) translateY(0);animation:burstfly .72s ease-out forwards}

.combostat.t2 .comboflame{transform:scale(1.15)}.combostat.t3 .comboflame{transform:scale(1.35)}.combostat.t4 .comboflame{transform:scale(1.6)}
@keyframes flamepulse{from{filter:brightness(1)}to{filter:brightness(1.5)}}

.dailyrec-txt{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:600;color:#eaf6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.setcard.wlc{max-width:380px;padding:24px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.wlc-mascot{font-size:62px;animation:mascotidle 2.4s ease-in-out infinite}
.wlc-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:#eaf6ff}
.wlc-tips{display:flex;flex-direction:column;gap:11px;width:100%}

.lbname{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:#eaf6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbrow.me .lbname{color:#ffe0a0}
.lbexp{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#a855f7;white-space:nowrap}
.lbexp small{font-size:9px;color:#7aa8ba}
.lbempty{text-align:center;font-family:'Rajdhani',sans-serif;font-size:13px;color:#8fb4c4;padding:14px}
.songcard-badge{display:inline-block;margin-left:7px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:#06121f;background:var(--sc,#06d6a0);border-radius:5px;padding:2px 5px;vertical-align:middle}
/* AI voice tutor */
.vmstage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:20px 16px 8px;flex-shrink:0}
.vmorb{width:128px;height:128px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:46px;background:radial-gradient(circle at 50% 38%,#0e2540,#0a1322);border:2px solid #2a4a60;transition:border-color .3s}
.vmorb.listening{border-color:#a855f7;animation:vmpulse 1.5s ease-out infinite}
.vmorb.thinking{border-color:#ffb703;animation:vmspin 1.1s linear infinite}
.vmorb.speaking{border-color:#ff2d78;box-shadow:0 0 30px -4px #ff2d78;animation:vmwave .7s ease-in-out infinite alternate}
@keyframes vmpulse{0%{box-shadow:0 0 0 0 #a855f755}100%{box-shadow:0 0 0 30px #a855f700}}
@keyframes vmspin{to{transform:rotate(360deg)}}
@keyframes vmwave{from{transform:scale(1)}to{transform:scale(1.05)}}
.vmstate{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;color:#9fd8e6}
.vmcaption{min-height:22px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:#eaf6ff;text-align:center;max-width:92%}
.vmnotes{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.vmnote{font-family:'Share Tech Mono',monospace;font-size:12px;color:#06d6a0;background:rgba(6,214,160,.1);border:1px solid #06d6a044;border-radius:7px;padding:3px 8px}
.vmlog{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:10px 16px;width:100%;max-width:540px;margin:0 auto;scrollbar-width:thin;scrollbar-color:#7b2fff #0f0a1c}
.vmbub{max-width:84%;padding:9px 13px;border-radius:14px;font-family:'Rajdhani',sans-serif;font-size:14px;line-height:1.4}
.vmbub.user{align-self:flex-end;background:linear-gradient(135deg,#a855f7,#7b2fff);color:#06121f;font-weight:600}
.vmbub.ai{align-self:flex-start;background:#0e1a30;border:1px solid #ffffff12;color:#eaf6ff}
.vmfoot{display:flex;flex-direction:column;align-items:center;gap:9px;padding:11px 16px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid #ffffff10;flex-shrink:0}
.vmbig{padding:14px 42px;border-radius:40px;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;color:#06121f;background:linear-gradient(135deg,#a855f7,#7b2fff);box-shadow:0 8px 26px -8px #a855f7}
.vmbig.stop{background:linear-gradient(135deg,#ff2d78,#ff9e00);box-shadow:0 8px 26px -8px #ff2d78}
.vmbig:active{transform:scale(.96)}
.vmvoicetgl{align-self:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#9fd8e6;background:rgba(255,255,255,.05);border:1px solid #ffffff1f;border-radius:14px;padding:4px 12px;cursor:pointer;margin-bottom:2px}
.vmvoicetgl:active{transform:scale(.95)}
/* octave shift on the on-screen keyboard */
.octctl{display:flex;align-items:center;gap:6px;margin-left:auto;margin-right:8px}
.octbtn{width:26px;height:26px;border-radius:7px;border:1px solid #a855f733;background:#0e1a30;color:#9fd8e6;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.octbtn:disabled{opacity:.3;cursor:default}
.octbtn:active:not(:disabled){background:#13243f}
.octlbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:#7fb0c4;min-width:54px;text-align:center}
/* metronome quick pill in the header */
.metropill{display:flex;align-items:center;gap:3px;background:linear-gradient(135deg,#ff9e00,#ff2d78);color:#06121f;border:none;border-radius:20px;padding:5px 11px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer;animation:metblink 1s steps(2) infinite}
@keyframes metblink{50%{opacity:.55}}
/* settings overlay */
.setov{position:fixed;inset:0;z-index:1300;background:rgba(4,8,16,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:18px;animation:fadein .2s}
.setcard{width:100%;max-width:420px;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,#0c1730,#0f0a1c);border:1px solid #a855f726;border-radius:18px;box-shadow:0 24px 60px -20px #000}
.sethdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #ffffff10;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#eaf6ff;position:sticky;top:0;background:#0c1730;z-index:1}
.setbody{padding:14px 16px 18px}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0}
.setrow.col{flex-direction:column;align-items:stretch;gap:8px}
.setrow.setbtns{justify-content:center;gap:8px}
.setrow label{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:#cfe6f0}
.setrow input[type=range]{flex:1;max-width:200px;accent-color:#a855f7}
.setdiv{height:1px;background:#ffffff0f;margin:6px 0}
.settoggle{min-width:64px;padding:7px 14px;border-radius:20px;border:1px solid #ffffff1f;background:#0e1a30;color:#9fb6c4;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.settoggle.on{background:linear-gradient(135deg,#06d6a0,#a855f7);color:#06121f;border-color:transparent}
.setbtn{min-width:48px;padding:9px 14px;border-radius:10px;border:1px solid #a855f72e;background:#0e1a30;color:#cfe6f0;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.setbtn.wide{flex:1}
.setbtn:active{transform:scale(.96)}
.setlangs{display:flex;gap:7px}
.setlangbtn{flex:1;padding:9px 6px;border-radius:10px;border:1px solid #ffffff14;background:#0e1a30;color:#9fb6c4;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.setlangbtn.on{background:linear-gradient(135deg,#7b2fff,#a855f7);color:#06121f;border-color:transparent}
.setver{text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a6575;margin-top:14px;letter-spacing:1px}
/* progress dashboard (profile) */
.heatcard{background:linear-gradient(180deg,#0b1426,#0a1120);border:1px solid #ffffff12;border-radius:14px;padding:13px 14px}
.heatgrid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:1fr;gap:3px}
.heatcell{width:100%;aspect-ratio:1;border-radius:2px;min-width:0}
.heatlegend{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#6a8a9a}
.heatlegend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.trendwrap{margin-top:12px;border-top:1px solid #ffffff0d;padding-top:10px}
.trendlbl{font-family:'Rajdhani',sans-serif;font-size:12px;color:#9fb6c4;margin-bottom:4px}
.trendlbl b{color:#06d6a0;font-size:13px}
.trendsvg{width:100%;height:38px;display:block}
.trendempty{margin-top:10px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:12px;color:#6a8a9a;padding:6px}
/* accessibility & mobile ergonomics */
button,.pk,.songlane,.octbtn,.navbtn,a{touch-action:manipulation}
.octbtn{min-width:30px;min-height:30px}
.navbtn{color:#7c9aac}            /* lift inactive nav contrast */
.songsrcbar{color:#88a6b6;font-size:11px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
@media(max-width:480px){.lname{font-size:11px;letter-spacing:1px}.bbl{font-size:12px;padding:8px 11px}.pk.w{width:22px!important;height:66px!important}.pk.b{width:14px!important;height:42px!important;margin-left:-7px!important;margin-right:-7px!important}}
