.statcard{background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:13px;padding:15px 6px;text-align:center}
.statval{font-family:'Orbitron',sans-serif;font-size:23px;font-weight:900;color:#fff;line-height:1}
.statval .em{font-size:15px}
.statlbl{font-size:9.5px;color:#a87e97;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;margin-top:7px}
.profsec{padding:16px 14px 0;max-width:480px;margin:0 auto}
.profsec-h{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--ink);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:9px}
/* ── skill analysis dashboard ── */
.skillcards{display:grid;grid-template-columns:1fr;gap:10px}
.skillcard{background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 18%, transparent);border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 4px 14px -10px color-mix(in srgb, var(--accent) 40%, transparent)}
.skillcards .skillcard{margin-bottom:0}
.skillcard-h{font-family:'Rajdhani',sans-serif;font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin-bottom:8px}
.radarsvg{display:block;width:100%;max-width:270px;margin:0 auto}
.tgauge{padding:4px 2px}
.tgauge-zones{display:flex;justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:4px}
.tgauge-track{position:relative;height:14px;border-radius:8px;background:linear-gradient(90deg,color-mix(in srgb,#d9a23f 34%,var(--surface-2)),color-mix(in srgb,#3f9d63 38%,var(--surface-2)) 50%,color-mix(in srgb,#d9a23f 34%,var(--surface-2)))}
.tgauge-mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:2px;background:color-mix(in srgb, var(--ink) 30%, transparent);border-radius:2px}
.tgauge-needle{position:absolute;top:-4px;width:8px;height:22px;margin-left:-4px;border-radius:4px;background:var(--accent);box-shadow:0 0 8px rgba(var(--accent-rgb),.8);transition:left .4s}
.tgauge-verdict{margin-top:10px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:800;color:var(--ink)}
.tgauge-verdict small{display:block;font-size:10.5px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-weight:400;margin-top:2px}
.wkkeys{display:block;width:100%;max-width:280px;margin:0 auto}
.insightrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid color-mix(in srgb, var(--ink) 7%, transparent)}
.insightrow:first-of-type{border-top:none}
.insight-ico{font-size:19px;flex-shrink:0}
.insight-txt{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.35}
.insightgo{flex-shrink:0;background:var(--accent);border:none;border-radius:11px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:12.5px;font-weight:800;padding:8px 12px;cursor:pointer;box-shadow:0 3px 10px -4px rgba(var(--accent-rgb),.7)}
.insightgo:active{transform:scale(.96)}
.skillempty{background:var(--surface);border:1.5px dashed color-mix(in srgb, var(--accent) 35%, transparent);border-radius:14px;padding:18px 14px;text-align:center}
.skillempty-t{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--muted);line-height:1.45;margin-bottom:12px}
@media (min-width:420px){.skillcards{grid-template-columns:1.25fr 1fr}}
.profsec-h::before{content:'';width:4px;height:18px;border-radius:3px;background:var(--accent-deep);box-shadow:0 0 10px var(--accent-deep)}
.rankrow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;margin-bottom:7px;background:linear-gradient(160deg,var(--surface),var(--surface-2));border:1px solid color-mix(in srgb, var(--ink) 5%, transparent);transition:all .2s}
.rankrow.cur{border-color:var(--lv-c,var(--accent));background:rgba(var(--accent-rgb),.07);box-shadow:0 0 18px -8px var(--lv-c,var(--accent))}
.rankrow.done{opacity:.6}
.rankrow.locked{opacity:.42}
.rankicon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.rankmeta{flex:1;min-width:0}
.rankname{font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:700;color:#f5e8ef}
.rankexp{font-family:'Share Tech Mono',monospace;font-size:9px;color:#96788b;margin-top:2px}
.ranktick{font-size:14px;flex-shrink:0;color:var(--lv-c,var(--accent))}
.contactcard{background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:13px;padding:4px 14px}
.contactrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid color-mix(in srgb, var(--ink) 4%, transparent);font-size:13px}
.contactrow:last-child{border-bottom:none}
.contactico{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.contactval{color:var(--ink);font-family:'Rajdhani',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.contactval.empty{color:var(--muted)}
.profprivacy{width:calc(100% - 28px);max-width:452px;margin:24px auto 0}
.profsignout{display:block;width:calc(100% - 28px);max-width:452px;margin:20px auto 0;padding:13px;border-radius:12px;border:1px solid #ff525244;background:rgba(255,82,82,.08);color:var(--accent-soft);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.profsignout:hover{background:rgba(255,82,82,.16);box-shadow:0 0 14px -4px #ff5252}
.profsignout:active{transform:scale(.98)}
/* exp toast */
.exptoast{position:fixed;top:64px;left:50%;z-index:1200;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:var(--bg);font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;padding:9px 18px;border-radius:22px;box-shadow:0 8px 26px -6px var(--accent),inset 0 0 0 1px color-mix(in srgb, var(--ink) 13%, transparent);animation:exppop 2.2s ease-out forwards;pointer-events:none}
/* generic "something failed, tell the user" toast — reused across pages for
   saves/actions that used to fail silently (catch(e){}) with no feedback */
.errtoast{position:fixed;top:64px;left:50%;z-index:1300;max-width:calc(100% - 40px);display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#7a1f2e,#ff5252);color:#fff;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:700;padding:10px 18px;border-radius:22px;box-shadow:0 8px 26px -6px #ff5252,inset 0 0 0 1px color-mix(in srgb, var(--ink) 13%, transparent);animation:errpop 3.2s ease-out forwards;pointer-events:none;text-align:center}
@keyframes errpop{0%{opacity:0;transform:translateX(-50%) translateY(-14px) scale(.7)}10%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.04)}18%{transform:translateX(-50%) translateY(0) scale(1)}85%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.96)}}
/* one-time "add to home screen" banner, shown after the first real win */
.installbanner{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom,0px));z-index:1300;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--surface-2),var(--surface));border:1px solid color-mix(in srgb, var(--accent) 33%, transparent);border-radius:16px;padding:11px 12px;box-shadow:0 10px 30px -8px #000,0 0 20px -8px color-mix(in srgb, var(--accent) 40%, transparent);animation:installin .3s ease-out}
@keyframes installin{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.installbanner-ic{font-size:26px;flex-shrink:0}
.installbanner-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.installbanner-tx b{font-size:13px;color:var(--ink);font-family:'Rajdhani',sans-serif;font-weight:700;line-height:1.25}
.installbanner-tx span{font-size:11px;color:var(--muted);line-height:1.2}
.installbanner-go{flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;border:none;border-radius:11px;padding:9px 14px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;white-space:nowrap}
.installbanner-x{flex-shrink:0;background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:4px 2px}
@keyframes exppop{0%{opacity:0;transform:translateX(-50%) translateY(-14px) scale(.7)}14%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.06)}26%{transform:translateX(-50%) translateY(0) scale(1)}78%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.96)}}
/* level-up overlay */
.lvup{position:fixed;inset:0;z-index:1300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--scrim);backdrop-filter:blur(4px);animation:fadein .3s;pointer-events:none}
.lvup-burst{font-size:74px;animation:lvbounce .7s cubic-bezier(.2,1.4,.4,1);position:relative;z-index:2}
.lvup-rays{position:absolute;width:480px;height:480px;background:conic-gradient(from 0deg,color-mix(in srgb, var(--ink) 13%, transparent) 0 8deg,transparent 8deg 30deg);border-radius:50%;animation:rayspin 6s linear infinite;pointer-events:none}
@keyframes rayspin{to{transform:rotate(360deg)}}
.lvup .confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.lvup .confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;opacity:.95;animation:conffall 1.8s linear forwards}
@keyframes conffall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(105vh) rotate(540deg)}}
.lvup-title{font-family:'Orbitron',sans-serif;font-size:25px;font-weight:900;color:var(--ink);letter-spacing:3px;text-shadow:0 0 22px var(--accent);margin-top:6px;animation:lvbounce .7s .08s both cubic-bezier(.2,1.4,.4,1)}
.lvup-rank{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-top:12px;border:1px solid color-mix(in srgb, var(--accent) 40%, transparent);border-radius:20px;padding:6px 18px;background:rgba(var(--accent-rgb),.08);animation:lvbounce .7s .16s both cubic-bezier(.2,1.4,.4,1)}
@keyframes lvbounce{0%{opacity:0;transform:scale(.3)}100%{opacity:1;transform:scale(1)}}
/* ── practice mode (listen + check) ──
   this is the single most important action on the default landing page, so it
   gets the same solid high-contrast fill as .vmbig/.snd rather than the washed-
   out tinted-outline look secondary controls use — a pink-only palette still
   needs one button that unmistakably reads as "the one to press" */
.practicebtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:1.5px;cursor:pointer;transition:all .2s;box-shadow:0 8px 22px -8px var(--accent)}
.practicebtn:hover{box-shadow:0 8px 26px -6px var(--accent);transform:translateY(-1px)}
.practicebtn:active{transform:scale(.98)}
.practicebtn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;background:linear-gradient(135deg,rgba(var(--accent-rgb),.14),rgba(var(--accent-deep-rgb),.1));color:var(--accent-soft)}
.practiceov{position:fixed;inset:0;z-index:1100;display:flex;flex-direction:column;background:var(--bg);animation:fadein .25s}
.practicehdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:var(--surface);flex-shrink:0;position:relative;z-index:1}
.practicehtitle{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--accent);letter-spacing:1.5px;display:flex;flex-direction:column;gap:3px}
.practicehtitle small{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:none}
.practicebody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:13px;position:relative;z-index:1}
.practicesrc{text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.5px;padding:8px;border-radius:9px;background:rgba(var(--accent-rgb),.06);border:1px solid color-mix(in srgb, var(--accent) 13%, transparent);color:var(--muted)}
.practicesrc.err{background:rgba(255,82,82,.08);border-color:#ff525233;color:#ff9cc0}
.practicenow{display:flex;align-items:center;justify-content:center;gap:30px;padding:4px 0}
.practicenow-box{text-align:center}
.practicenow-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:5px}
.practicenow-note{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;line-height:1}
.practicenow-note.target{color:var(--accent);text-shadow:0 0 18px color-mix(in srgb, var(--accent) 47%, transparent)}
.practicenow-note.heard{color:var(--muted)}
.practicenow-note.heard.ok{color:var(--accent);text-shadow:0 0 16px color-mix(in srgb, var(--accent) 53%, transparent)}
.practicenow-note.heard.bad{color:#ff5252;text-shadow:0 0 16px #ff525288;animation:shake .3s}
.practicechips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.pchip{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;padding:6px 9px;border-radius:8px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:var(--surface);color:var(--muted);min-width:30px;text-align:center}
.pchip.done{background:rgba(var(--accent-rgb),.16);border-color:var(--accent);color:var(--accent)}
.pchip.cur{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px -3px var(--accent);animation:blink 1.2s infinite}
.practicebar{height:12px;border-radius:7px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);overflow:hidden}
.practicefill{height:100%;background:linear-gradient(90deg,var(--accent-deep),var(--accent));box-shadow:0 0 10px -2px var(--accent);transition:width .25s}
.practicestats{display:flex;justify-content:space-around;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
.practicestats b{font-family:'Orbitron',sans-serif;color:var(--ink);font-size:15px}
.practicetip{text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);line-height:1.6}
.practicefoot{display:flex;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:var(--surface);flex-shrink:0;position:relative;z-index:1}
.practicefoot button{flex:1;padding:12px;border-radius:11px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all .2s;border:1px solid}
.practicerestart{border-color:color-mix(in srgb, var(--accent) 33%, transparent)!important;background:rgba(var(--accent-rgb),.08);color:var(--accent)}
.practiceexit{border-color:#ff525255!important;background:rgba(255,82,82,.08);color:var(--accent-soft)}
/* ── daily quest + achievements ── */
.questcard{background:linear-gradient(135deg,rgba(var(--accent-rgb),.1),rgba(255,82,82,.06));border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);border-radius:13px;padding:14px}
.questcard.done{background:linear-gradient(135deg,rgba(var(--accent-rgb),.12),rgba(var(--accent-rgb),.06));border-color:color-mix(in srgb, var(--accent) 33%, transparent)}
.questrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:8px}
.questname{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
.questrew{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--accent-soft);white-space:nowrap}
.questcard.done .questrew{color:var(--accent)}
.questbar{height:12px;border-radius:7px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);overflow:hidden}
.questfill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),#ff5252);transition:width .5s}
.questcard.done .questfill{background:linear-gradient(90deg,var(--accent-deep),var(--accent))}
.questcount{text-align:right;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px}
.badgegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.badge{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 4px;border-radius:12px;background:linear-gradient(160deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 6%, transparent);text-align:center}
.badge.got{border-color:color-mix(in srgb, var(--accent-soft) 55%, transparent);background:linear-gradient(160deg,rgba(var(--accent-rgb),.12),rgba(var(--accent-deep-rgb),.06));box-shadow:0 0 14px -7px var(--accent-soft)}
.badge-ic{font-size:23px;line-height:1.1;filter:grayscale(1) opacity(.38)}
.badge.got .badge-ic{filter:none}
.badge-nm{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;line-height:1.2;color:var(--muted)}
.badge.got .badge-nm{color:var(--accent-deep)}
/* badge unlock overlay (reuses .lvup container) */
.lvup-badge .lvup-burst{filter:drop-shadow(0 0 18px var(--accent-soft))}
.lvup-badge .lvup-title{color:var(--accent-soft);text-shadow:0 0 22px var(--accent)}
.lvup-badge .lvup-rank{color:var(--accent-soft);border-color:color-mix(in srgb, var(--accent-soft) 40%, transparent);background:rgba(var(--accent-rgb),.1)}
/* ── play-along (falling notes) ── */
.songpage .pathbadge{color:var(--accent);border-color:color-mix(in srgb, var(--accent) 27%, transparent)}
.songgrid{display:flex;flex-direction:column;gap:11px;padding:4px 14px}
.songcard{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;background:linear-gradient(135deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-left:3px solid var(--sc,var(--accent));cursor:pointer;text-align:left;transition:all .2s;font-family:inherit}
.songcard:hover{border-color:var(--sc,var(--accent));box-shadow:0 0 22px -10px var(--sc,var(--accent));transform:translateY(-2px)}
.songcard:active{transform:scale(.99)}
.songcard-ic{font-size:26px;filter:drop-shadow(0 0 8px var(--sc,var(--accent)))}
.songcard-body{flex:1;min-width:0}
.songcard-nm{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--ink)}
.songcard-meta{display:flex;gap:11px;align-items:center;margin-top:3px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
.songdiff{color:var(--accent-soft);letter-spacing:1px}
.songcard-go{font-size:15px;color:var(--sc,var(--accent))}
.songov{position:fixed;inset:0;z-index:1100;display:flex;flex-direction:column;background:radial-gradient(120% 80% at 50% 0%,var(--surface-2),var(--bg) 75%);animation:fadein .25s}
.songhdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid color-mix(in srgb, var(--ink) 6%, transparent);flex-shrink:0}
.songhtitle{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:9px}
.songhtitle small{color:var(--accent-soft);font-size:12px;letter-spacing:1px}
.vmhdrbtns{display:flex;align-items:center;gap:8px}
.songhud{display:flex;justify-content:space-around;gap:8px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted);flex-shrink:0}
.songhud b{font-family:'Orbitron',sans-serif;color:var(--ink);font-size:15px}
.songhud .hot b{color:var(--accent-soft);text-shadow:0 0 10px #ff5252}
.songprog{height:5px;background:var(--surface);flex-shrink:0}
.songprog>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));transition:width .15s}
.songstage{position:relative;flex:1;min-height:0;overflow:hidden}
.songcanvas{width:100%;height:100%;display:block}
.songcount{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:90px;font-weight:900;color:var(--ink);text-shadow:0 0 40px var(--accent);animation:popcount .9s ease-out;pointer-events:none}
.songjudge{position:absolute;left:0;right:0;top:38%;text-align:center;font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;pointer-events:none;animation:judgepop .65s ease-out forwards;text-shadow:0 0 24px currentColor}
.songjudge.perfect{color:var(--accent)}
.songjudge.good{color:var(--accent)}
.songjudge.miss{color:#ff5d7a;font-size:26px}
@keyframes judgepop{0%{transform:scale(.5) translateY(10px);opacity:0}25%{transform:scale(1.15) translateY(0);opacity:1}70%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(.9) translateY(-22px);opacity:0}}
.songnewbest{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;color:var(--accent);text-shadow:0 0 16px color-mix(in srgb, var(--accent) 53%, transparent);animation:popcount .6s ease-out}
/* game juice: shake, GO!, particle bursts, combo meter, full-combo banner */
.songstage.shake{animation:shake .38s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%{transform:translate(-2px,1px)}20%{transform:translate(3px,-2px)}30%{transform:translate(-4px,2px)}40%{transform:translate(4px,1px)}50%{transform:translate(-3px,-1px)}60%{transform:translate(3px,2px)}70%{transform:translate(-2px,-2px)}80%{transform:translate(2px,1px)}100%{transform:translate(0,0)}}
.songgo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;color:var(--accent);text-shadow:0 0 40px var(--accent);pointer-events:none;animation:goflash .7s ease-out forwards}
@keyframes goflash{0%{transform:scale(.4);opacity:0}30%{transform:scale(1.1);opacity:1}70%{transform:scale(1);opacity:1}100%{transform:scale(1.4);opacity:0}}
.burst{position:absolute;left:50%;top:42%;width:0;height:0;pointer-events:none;z-index:5}
.burst i{position:absolute;left:0;top:0;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px currentColor;color:var(--accent);transform:rotate(var(--a)) translateY(0);animation:burstfly .72s ease-out forwards}
.burst.combo i{width:11px;height:11px;background:var(--accent);color:var(--accent)}
@keyframes burstfly{0%{opacity:1;transform:rotate(var(--a)) translateY(0) scale(1)}100%{opacity:0;transform:rotate(var(--a)) translateY(calc(var(--d) * -1)) scale(.3)}}
.combostat b{transition:color .2s}
.combostat .comboflame{display:inline-block;margin-left:2px;animation:flamepulse .6s ease-in-out infinite alternate}
.combostat.t1 b{color:#ffb8d0}.combostat.t2 b{color:var(--accent-soft)}.combostat.t3 b{color:var(--accent-soft)}.combostat.t4 b{color:#ff3d6e;text-shadow:0 0 12px #ff3d6e}
.combostat.t2 .comboflame{transform:scale(1.15)}.combostat.t3 .comboflame{transform:scale(1.35)}.combostat.t4 .comboflame{transform:scale(1.6)}
@keyframes flamepulse{from{filter:brightness(1)}to{filter:brightness(1.5)}}
.songfc{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;color:var(--accent);text-shadow:0 0 20px var(--accent);animation:popcount .7s ease-out}
.songfc.ap{color:var(--accent-soft);text-shadow:0 0 22px var(--accent-soft);background:linear-gradient(90deg,var(--accent),var(--accent-soft),var(--accent-soft));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ghoststat{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700}
.ghoststat.ahead{color:var(--accent)}
.ghoststat.behind{color:#ff7a8a}
@keyframes popcount{from{transform:scale(1.6);opacity:0}30%{opacity:1}to{transform:scale(1);opacity:.9}}
/* page transitions */
.pw,.pathpage,.profpage{animation:pagein .28s ease-out}
@keyframes pagein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* coins pill + daily chest + mascot */
.coinpill{display:flex;align-items:center;gap:3px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--accent);background:var(--surface-2);border:1px solid color-mix(in srgb, var(--accent) 24%, transparent);border-radius:20px;padding:4px 9px}
.probadge{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;color:var(--bg);background:linear-gradient(135deg,var(--accent-soft),var(--accent));border-radius:20px;padding:4px 9px;letter-spacing:.5px;white-space:nowrap}
.probadge.fam{background:linear-gradient(135deg,var(--accent-soft),var(--accent))}
.probadge.max{background:linear-gradient(135deg,#ffb8e0,var(--accent));color:#fff}
.probadge.maxfam{background:linear-gradient(135deg,var(--accent-soft),var(--accent));color:#fff}
.billtoggle{display:flex;gap:8px;background:var(--surface);border-radius:24px;padding:4px;margin-bottom:14px}
.billtog{flex:1;padding:9px;border-radius:20px;background:transparent;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.billtog.on{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff}
.billsave{font-family:'Orbitron',sans-serif;font-size:9px;background:var(--accent);color:var(--surface-2);border-radius:8px;padding:2px 5px}
.pr-yrsave{color:var(--accent);font-size:12px;font-weight:700;margin:-4px 0 8px}
.upbtn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:800;color:var(--bg);background:linear-gradient(135deg,var(--accent-soft),var(--accent));border:none;border-radius:20px;padding:5px 10px;cursor:pointer;animation:flamepulse 1.4s ease-in-out infinite alternate}
.setcard.pricing{max-width:420px}
.pr-sub{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--muted);text-align:center;margin:0 0 14px}
.prtier{border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);border-radius:14px;padding:13px 14px;margin-bottom:11px;background:var(--surface)}
.prtier.hot{border-color:var(--accent);box-shadow:0 0 22px -8px var(--accent);background:linear-gradient(165deg,var(--surface-2),var(--surface))}
.prtier.max{border-color:var(--accent-soft);box-shadow:0 0 22px -8px var(--accent-soft);background:linear-gradient(165deg,var(--surface-2),var(--surface))}
.prtier.max .prtier-price{color:var(--accent-soft)}
.prtier.maxfam{border-color:var(--accent);box-shadow:0 0 26px -8px var(--accent);background:linear-gradient(165deg,var(--surface-2),var(--surface) 70%)}
.prtier.maxfam .prtier-price{color:var(--accent-soft)}
.prtier.cur{outline:2px solid var(--accent);outline-offset:1px}
.prtier.free{opacity:.85}
.prtier-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.prtier-nm{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:800;color:var(--ink)}
.prtier-price{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--accent)}
.prtier-price small{font-size:11px;color:var(--muted);font-weight:600}
.paysum{display:flex;align-items:center;justify-content:space-between;padding:6px 0 12px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:var(--ink)}
.payqr{display:block;width:230px;max-width:74%;margin:4px auto 12px;border-radius:14px;background:#fff;padding:10px}
.payinfo{background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:5px;font-size:13.5px;color:#e8d5e0;margin-bottom:10px}
.payinfo b{color:#fff;font-family:'Share Tech Mono',monospace}
.payok{text-align:center;padding:10px 4px}
.payok-h{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:800;color:var(--accent);margin:6px 0 8px}
.sharebtn{width:100%;padding:12px;border-radius:12px;border:none;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:9px;display:flex;align-items:center;justify-content:center;gap:6px}
.sharebtn.fb{background:#1877f2}
.sharebtn.tk{background:linear-gradient(90deg,#25f4ee,#000,#fe2c55)}
.sharebtn.done{opacity:.7;box-shadow:inset 0 0 0 2px var(--accent)}
.sharebtn:active{transform:scale(.97)}
.adminpay{flex:1;min-height:0;overflow-y:auto;padding:10px 14px 28px}
.adminpay-cfg{background:var(--surface);border:1px solid #ff525233;border-radius:13px;padding:12px;margin-bottom:14px}
.anrow{display:flex;align-items:center;gap:8px;padding:6px 0;font-family:'Rajdhani',sans-serif}
.anrow-rank{color:var(--muted);font-size:11px;font-family:'Orbitron',sans-serif;width:22px;flex-shrink:0}
.anrow-name{color:var(--ink);font-size:13px;flex-shrink:0;width:34%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.anrow-barwrap{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
.anrow-bar{display:block;height:100%;background:linear-gradient(90deg,#ff5252,var(--accent));border-radius:4px}
.anrow-hits{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:12px;width:34px;text-align:right;flex-shrink:0}
.auditrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid color-mix(in srgb, var(--ink) 5%, transparent);font-family:'Rajdhani',sans-serif;font-size:12.5px}
.auditrow:last-child{border-bottom:none}
.auditrow-action{color:var(--accent-soft);font-weight:700;flex-shrink:0}
.auditrow-target{color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;flex:1}
.auditrow-time{color:#6e5866;font-family:'Share Tech Mono',monospace;font-size:10.5px;flex-shrink:0}
.adminpay-cfg input{width:100%;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 9%, transparent);border-radius:9px;padding:9px 11px;color:var(--ink);font-size:13.5px;margin-top:7px;box-sizing:border-box}
.adminpay-row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:13px;padding:11px 13px;margin-bottom:8px;text-align:left;width:100%;cursor:pointer}
.adminpay-row.pending{border-color:color-mix(in srgb, var(--accent) 33%, transparent)}
.adminpay-row.approved{opacity:.6}
.adminpay-badge{font-size:9px;font-family:'Orbitron',sans-serif;padding:3px 7px;border-radius:6px}
.adminpay-badge.pending{background:var(--accent);color:var(--surface-2)}
.adminpay-badge.approved{background:var(--accent);color:var(--surface-2)}
.adminpay-badge.rejected{background:var(--accent-soft);color:var(--surface-2)}
.payslip{width:100%;max-width:320px;display:block;margin:10px auto;border-radius:12px;border:1px solid color-mix(in srgb, var(--ink) 11%, transparent)}
.aibox{background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 33%, transparent);border-radius:11px;padding:10px 12px;font-size:13px;color:var(--ink);white-space:pre-wrap;margin:8px 0}
.prfeat{list-style:none;margin:0 0 11px;padding:0;display:flex;flex-direction:column;gap:5px}
.prfeat li{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--ink)}
.prtier .songbtn{width:100%}
.pr-note{text-align:center;font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--muted);margin:6px 0 12px}
.pr-school{width:100%;padding:11px;border-radius:12px;border:1px dashed color-mix(in srgb, var(--accent) 27%, transparent);background:transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
/* parent dashboard */
.pd-head{font-family:'Rajdhani',sans-serif;font-size:15px;color:var(--ink);text-align:center;margin-bottom:12px}
.pd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:6px}
.pd-stat{background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 6%, transparent);border-radius:10px;padding:9px 4px;text-align:center}
.pd-num{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:800;color:var(--accent)}
.pd-lbl{font-family:'Rajdhani',sans-serif;font-size:9.5px;color:var(--muted);margin-top:2px}
.pd-sec{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin:14px 0 7px}
.pd-tags{display:flex;flex-wrap:wrap;gap:6px}
.pd-tag{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;border-radius:8px;padding:4px 9px}
.pd-tag.focus{color:var(--accent-soft);background:rgba(var(--accent-rgb),.12);border:1px solid color-mix(in srgb, var(--accent) 20%, transparent)}
.pd-tag.good{color:var(--accent);background:rgba(var(--accent-rgb),.1);border:1px solid color-mix(in srgb, var(--accent) 20%, transparent)}
/* exam prep */
.exgrade{border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:13px;padding:12px 13px;margin-bottom:11px;background:var(--surface)}
.exgrade-top{display:flex;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:7px}
.extasks{display:flex;flex-direction:column;gap:5px;margin-top:9px}
.extask{display:flex;align-items:center;gap:8px;text-align:left;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 6%, transparent);border-radius:9px;padding:9px 11px;color:var(--ink);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.extask span{color:#826575;font-weight:800}
.extask.ok{border-color:color-mix(in srgb, var(--accent) 30%, transparent);color:#ffb8d0}
.extask.ok span{color:var(--accent)}
.chestbtn{background:none;border:none;font-size:20px;cursor:pointer;animation:chestwiggle 1.4s ease-in-out infinite;padding:2px 4px}
@keyframes chestwiggle{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-12deg) scale(1.1)}75%{transform:rotate(12deg) scale(1.1)}}
.chestov{position:fixed;inset:0;z-index:1400;background:var(--scrim);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .2s}
/* privacy policy / terms — full-screen so long-form legal text is comfortable
   to read, reachable both pre-login (LoginScreen) and post-login (drawer) */
.legaldoc{position:fixed;inset:0;z-index:1500;background:var(--bg);display:flex;flex-direction:column;animation:fadein .2s}
.legaldoc-hdr{display:flex;align-items:center;gap:10px;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;border-bottom:1px solid color-mix(in srgb, var(--accent) 20%, transparent);flex-shrink:0}
.legaldoc-back{background:none;border:none;color:var(--accent-soft);font-family:'Orbitron',sans-serif;font-size:12px;cursor:pointer;padding:6px 4px}
.legaldoc-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--ink)}
.legaldoc-body{flex:1;overflow-y:auto;padding:8px 20px calc(40px + env(safe-area-inset-bottom,0px));max-width:640px;margin:0 auto;width:100%}
.legaldoc-updated{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin:10px 0 18px}
.legaldoc-sec{margin-bottom:20px}
.legaldoc-sec h4{font-family:Georgia,serif;font-size:14.5px;color:var(--accent-soft);margin:0 0 6px;font-weight:700}
.legaldoc-sec p{font-size:14px;line-height:1.7;color:var(--ink);margin:0}
.loginlegal{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.loginlegal button{background:none;border:none;color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;padding:4px}
.loginlegal span{color:#5c4a56;font-size:11px}
.chestcard{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.chestbig{font-size:96px;filter:drop-shadow(0 0 30px var(--accent))}
.chestbig.opening{animation:chestshake .5s ease-in-out infinite}
.chestbig.open{animation:chestpop .5s ease-out}
@keyframes chestshake{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes chestpop{0%{transform:scale(.6)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
.chesttitle{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:#fff}
.chestrewards{display:flex;gap:18px;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--accent)}
.chestrewards span:last-child{color:var(--accent)}
.cheststreak{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--accent)}
.chesttitle.jackpot{color:var(--accent);font-size:24px;text-shadow:0 0 22px var(--accent);animation:popcount .6s ease-out}
.songbonus{position:absolute;left:0;right:0;top:28%;text-align:center;font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--accent);text-shadow:0 0 18px var(--accent);pointer-events:none;animation:judgepop .9s ease-out forwards;z-index:6}
/* fever mode + flying score popups + combo shouts (dopamine) */
.feverbg{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.5;background:linear-gradient(125deg,#ff5252,var(--accent-soft),var(--accent-soft),var(--accent-soft),var(--accent),var(--accent-deep),#ff5252);background-size:400% 400%;animation:feverflow 2.2s linear infinite;mix-blend-mode:screen}
@keyframes feverflow{0%{background-position:0% 50%}100%{background-position:400% 50%}}
.songstage.fever{box-shadow:inset 0 0 60px -10px #ff5252}
.feverbadge{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--ink);text-shadow:0 0 14px #ff5252;z-index:6;animation:flamepulse .4s ease-in-out infinite alternate;pointer-events:none}
.songpop{position:absolute;top:62%;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:var(--ink);text-shadow:0 2px 6px #000;pointer-events:none;animation:popfly .78s ease-out forwards;z-index:5}
.songpop.perfect{font-size:24px;color:var(--accent);text-shadow:0 0 14px var(--accent)}
@keyframes popfly{0%{opacity:0;transform:translateY(8px) scale(.7)}25%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-60px) scale(1)}}
.songannounce{position:absolute;left:0;right:0;top:20%;text-align:center;font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;letter-spacing:1px;pointer-events:none;z-index:6;background:linear-gradient(90deg,var(--accent),var(--accent-soft),var(--accent-soft));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:announcepop 1.1s ease-out forwards}
@keyframes announcepop{0%{transform:scale(.4) rotate(-8deg);opacity:0}20%{transform:scale(1.2) rotate(3deg);opacity:1}40%{transform:scale(1) rotate(0)}80%{opacity:1}100%{transform:scale(1.1);opacity:0}}
/* daily hook hub (home) */
.dailyhub{display:flex;align-items:stretch;gap:10px;margin:10px 12px 4px;padding:11px 13px;border-radius:15px;background:linear-gradient(135deg,var(--surface-2),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 8%, transparent)}
.dailyhub.atrisk{border-color:color-mix(in srgb, var(--accent) 40%, transparent);box-shadow:0 0 18px -8px var(--accent)}
.dh-streak{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:56px;position:relative}
.dh-flame{font-size:26px;line-height:1;animation:flamepulse .8s ease-in-out infinite alternate}
.dh-streaknum{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--accent);line-height:1;margin-top:-4px}
.dh-streaklbl{font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--muted);letter-spacing:.5px}
.dh-mid{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:5px}
.dh-goal-top{display:flex;justify-content:space-between;align-items:baseline;font-family:'Rajdhani',sans-serif;font-size:12.5px;font-weight:600;color:var(--ink)}
.dailyhub.atrisk .dh-goal-top span{color:var(--accent-soft)}
.dh-goal-top b{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent)}
.dh-goalbar{height:8px;border-radius:5px;background:var(--surface);overflow:hidden}
.dh-goalbar div{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent-deep));transition:width .5s}
.dh-actions{display:flex;gap:8px;align-items:center;min-height:18px}
.dh-freeze{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:#ff7fce}
.dh-buyfreeze{font-family:'Rajdhani',sans-serif;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);border-radius:14px;padding:3px 9px;cursor:pointer}
.dh-buyfreeze:active{transform:scale(.95)}
.dh-chest{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:62px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent-soft),var(--accent));color:var(--bg);font-size:24px;padding:6px}
.dh-chest span{font-family:'Orbitron',sans-serif;font-size:8.5px;font-weight:800;letter-spacing:.3px}
.dh-chest:not(.done){animation:chestwiggle 1.4s ease-in-out infinite}
.dh-chest.done{background:linear-gradient(135deg,var(--accent),var(--accent-deep))}
.dh-chest:active{transform:scale(.95)}
.dailyrec{display:flex;align-items:center;gap:8px;margin:6px 12px 0;padding:9px 13px;width:calc(100% - 24px);border-radius:13px;border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:linear-gradient(135deg,var(--surface-2),var(--surface));cursor:pointer;text-align:left}
.dailyrec:active{transform:scale(.99)}
.dailyrec-lbl{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--accent);flex-shrink:0}
.dailyrec-ic{font-size:18px;flex-shrink:0}
.dailyrec-txt{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dailyrec-go{color:var(--accent);font-weight:800;flex-shrink:0}
/* quick "change key" back button on the Sensei page — returns to Pathway with
   the same topic's key picker already open, instead of a ☰-menu round trip */
.senseiback{display:flex;align-items:center;gap:6px;margin:8px 12px 0;padding:8px 13px;border-radius:20px;border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);background:rgba(var(--accent-rgb),.08);color:var(--accent-soft);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;align-self:flex-start}
.senseiback:active{transform:scale(.97);background:rgba(var(--accent-rgb),.16)}
.senseiback span:first-child{font-size:15px}
.hwbar{display:flex;align-items:center;gap:9px;margin:6px 12px 0;padding:9px 13px;width:calc(100% - 24px);border-radius:13px;border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:linear-gradient(135deg,var(--surface-2),var(--surface))}
.hwbar-ic{font-size:17px;flex-shrink:0}
.hwbar-tx{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hwbar-tx b{color:var(--accent);font-weight:800}
.hwbar-done{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1px solid color-mix(in srgb, var(--accent) 40%, transparent);background:var(--surface);color:var(--accent);font-weight:800;cursor:pointer}
.hwbar-done:active{transform:scale(.9)}
.setcard.wlc{max-width:380px;padding:24px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.wlc-mascot{font-size:62px;animation:mascotidle 2.4s ease-in-out infinite}
.wlc-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:800;color:var(--ink)}
.wlc-tips{display:flex;flex-direction:column;gap:11px;width:100%}
.wlc-tip{display:flex;align-items:center;gap:11px;text-align:left;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px;padding:11px 13px}
.wlc-tip span{font-size:24px;flex-shrink:0}
.wlc-tip b{font-family:'Rajdhani',sans-serif;font-size:13.5px;font-weight:600;color:var(--ink)}
.mascot{position:fixed;right:12px;bottom:84px;z-index:900;cursor:pointer;animation:mascotidle 2.6s ease-in-out infinite;will-change:transform}
.mascot-face{font-size:38px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.mascot.happy{animation:mascothop .5s ease-out}
.mascot.celebrate{animation:mascotcheer .6s ease-out infinite}
.mascot-spark{position:absolute;top:-6px;right:-6px;font-size:18px;animation:flamepulse .5s ease-in-out infinite alternate}
@keyframes mascotidle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes mascothop{0%{transform:translateY(0)}40%{transform:translateY(-16px)}100%{transform:translateY(0)}}
@keyframes mascotcheer{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-12px) rotate(6deg)}}
/* cosmetics shop + key-skins + themes */
.shopsec{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:12px 0 8px}
.shopgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.shopitem{display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 6px;border-radius:12px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:var(--surface);color:var(--ink);cursor:pointer}
.shopitem:active{transform:scale(.96)}
.shopitem.equipped{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 14px -4px var(--accent)}
.shopitem-ic{font-size:24px}
.shopitem-nm{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600}
.shopitem-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent)}
.shopitem.equipped .shopitem-tag{color:var(--accent)}
body[data-skin="sunset"] .pk.w.lit{background:linear-gradient(180deg,#ff9e00,#ff5d3a 40%,#f2dde9);box-shadow:0 0 16px #ff7a3d,0 0 40px #ff7a3d66}
body[data-skin="sunset"] .pk.b.lit{background:linear-gradient(180deg,#ff9e00,#a83200);box-shadow:0 0 14px #ff7a3d}
body[data-skin="neon"] .pk.w.lit{background:linear-gradient(180deg,#06ffa5,#00d488 40%,#f2dde9);box-shadow:0 0 16px #06ffa5,0 0 40px #06ffa566}
body[data-skin="neon"] .pk.b.lit{background:linear-gradient(180deg,#06ffa5,#04694a);box-shadow:0 0 14px #06ffa5}
body[data-skin="candy"] .pk.w.lit{background:linear-gradient(180deg,var(--accent-soft),var(--accent-soft) 40%,#f2dde9);box-shadow:0 0 16px var(--accent-soft),0 0 40px var(--accent-soft)66}
body[data-skin="candy"] .pk.b.lit{background:linear-gradient(180deg,var(--accent-soft),#cc1b7a);box-shadow:0 0 14px var(--accent-soft)}
body[data-skin="gold"] .pk.w.lit{background:linear-gradient(180deg,#ffd23f,#e0a800 40%,#fff6d8);box-shadow:0 0 16px #ffd23f,0 0 40px #ffd23f66}
body[data-skin="gold"] .pk.b.lit{background:linear-gradient(180deg,#ffd23f,#9a7400);box-shadow:0 0 14px #ffd23f}
:root[data-theme="dark"] body[data-theme="aurora"] .tg{background:radial-gradient(120% 90% at 30% 0%,#0b2a3a,#0a1326 60%,#070a16)}
:root[data-theme="dark"] body[data-theme="ember"] .tg{background:radial-gradient(120% 90% at 70% 0%,var(--surface-2),#180b10 55%,#0a0708)}
:root[data-theme="dark"] body[data-theme="forest"] .tg{background:radial-gradient(120% 90% at 40% 0%,#0c2a1c,#0a1a16 60%,#070f0c)}
.songready{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:color-mix(in srgb, var(--bg) 62%, transparent);backdrop-filter:blur(2px);padding:20px;text-align:center}
.songready-info{font-family:'Rajdhani',sans-serif;font-size:15px;color:#ffcfe9}
.songtempo{display:flex;gap:8px}
.songtempobtn{padding:7px 15px;border-radius:10px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 9%, transparent);color:var(--muted);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.songtempobtn.on{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.08)}
.songready-btns{display:flex;gap:11px;flex-wrap:wrap;justify-content:center;align-items:center}
/* kid-first: ONE hero action on the ready screen — START is unmistakably it */
.songready .songready-btns{flex-direction:column;width:100%;max-width:300px}
.songready .songbtn.go{width:100%;padding:17px 22px;font-size:16.5px;border-radius:16px;order:-1}
.songready .songbtn.ghost{padding:9px 18px;font-size:12px}
.songbtn{padding:12px 22px;border-radius:12px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1px solid}
.songbtn.go{background:linear-gradient(135deg,var(--accent),var(--accent-deep));border-color:transparent;color:var(--bg);box-shadow:0 6px 22px -8px var(--accent)}
.songbtn.ghost{background:transparent;border-color:color-mix(in srgb, var(--ink) 13%, transparent);color:var(--ink)}
.songbtn:active{transform:scale(.96)}
.songsrc{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
.songlanes{display:flex;gap:3px;padding:7px 4px;flex-shrink:0;background:var(--surface);border-top:1px solid color-mix(in srgb, var(--accent) 13%, transparent)}
.songlane{flex:1;padding:13px 2px;border-radius:9px;border:1px solid hsla(var(--lh,332),70%,55%,.4);background:hsla(var(--lh,332),70%,50%,.1);color:hsla(var(--lh,332),85%,76%,1);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.songlane:active{background:hsla(var(--lh,332),80%,55%,.35);transform:translateY(1px)}
/* responsive game keyboard — fills full width on any device */
.gpwrap{flex-shrink:0;background:var(--surface);border-top:1px solid color-mix(in srgb, var(--accent) 13%, transparent);padding:4px 0 calc(4px + env(safe-area-inset-bottom,0px))}
.gprow{position:relative;display:flex;gap:2px;width:100%;max-width:1200px;margin:0 auto;padding:0 4px;height:clamp(54px,11vh,140px)}
.gpw{flex:1;min-width:0;height:100%;background:linear-gradient(180deg,#fceef6,#eecfe1);border:1px solid #cc99b5;border-top:none;border-radius:0 0 6px 6px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;cursor:pointer;box-shadow:0 3px 5px rgba(0,0,0,.4);transition:filter .08s,transform .05s;-webkit-tap-highlight-color:transparent}
.gpw span{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.7vw,14px);color:#aa5588;pointer-events:none}
.gpw:active{transform:translateY(2px)}
.gpw.lit{background:linear-gradient(180deg,var(--accent),var(--accent-deep) 45%,#fceef6);box-shadow:0 0 16px var(--accent),0 0 38px color-mix(in srgb, var(--accent) 40%, transparent)}
.gpb{position:absolute;top:0;height:62%;background:linear-gradient(180deg,var(--surface-2),#23201d);border:1px solid var(--surface);border-radius:0 0 5px 5px;z-index:2;cursor:pointer;box-shadow:0 4px 8px rgba(0,0,0,.8);-webkit-tap-highlight-color:transparent}
.gpb:active{transform:translateY(1px)}
.gpb.lit{background:linear-gradient(180deg,var(--accent),var(--accent-deep));box-shadow:0 0 14px var(--accent)}
.gpw.flash{animation:keypop .32s ease-out}
.gpb.flash{animation:keypop .32s ease-out}
/* realistic, slidable keyboard (voice mode): taller keys, swipe to reach octaves */
.gpscroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;scrollbar-width:thin}
.gpscroll::-webkit-scrollbar{height:5px}
.gpscroll::-webkit-scrollbar-thumb{background:color-mix(in srgb, var(--accent) 33%, transparent);border-radius:3px}
.gpscroll .gprow{height:clamp(118px,23vh,188px);gap:2px}
.gpscroll .gpw span{font-size:10px}
/* song library: filters, favorites, continue */
.songfilters{display:flex;gap:7px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none}
.songfilters::-webkit-scrollbar{display:none}
.songfilter{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:var(--surface);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.songfilter.on{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--bg);border-color:transparent}
.drillhint{padding:0 16px 10px;margin:0;color:#b07f9a;font-size:12.5px;line-height:1.45}
.songcontinue{padding:0 14px 4px}
.songcontinue-lbl{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px}
.songcard{position:relative}
.favbtn{position:absolute;top:7px;right:34px;font-size:18px;line-height:1;color:#653a50;background:none;border:none;cursor:pointer;padding:4px;z-index:2}
.favbtn.on{color:var(--accent);text-shadow:0 0 10px color-mix(in srgb, var(--accent) 40%, transparent)}
.songempty{grid-column:1/-1;text-align:center;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;padding:24px}
.aicreate{display:block;width:calc(100% - 28px);margin:0 14px 10px;padding:11px;border-radius:13px;border:1px solid color-mix(in srgb, var(--accent-deep) 33%, transparent);background:linear-gradient(135deg,var(--surface-2),var(--surface));color:#ffc4dd;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.aicreate:active{transform:scale(.99)}
.aicreate-hint{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);margin:0 0 10px;line-height:1.4}
.aicreate-in{width:100%;box-sizing:border-box;padding:11px 13px;border-radius:11px;border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);background:var(--surface);color:var(--ink);font-family:'Rajdhani',sans-serif;font-size:15px}
.aicreate-in:focus{outline:none;border-color:var(--accent-deep)}
.aicreate-err{color:#ff7a8a;font-family:'Rajdhani',sans-serif;font-size:12px;margin-top:8px}
.favbtn.del{color:#ff7a8a;font-size:15px}
.songcard.locked{opacity:.55;filter:grayscale(.5)}
.songcard.locked .songcard-meta span:last-child{color:var(--accent)}
/* record & playback bar (main keyboard) */
.recbar{display:flex;align-items:center;justify-content:center;gap:9px;padding:2px 8px 10px}
.recbtn{padding:8px 18px;border-radius:20px;border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);background:var(--surface);color:var(--ink);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.recbtn.on{background:linear-gradient(135deg,#ff5252,#ff5d3a);color:#fff;border-color:transparent;animation:metblink 1.1s steps(2) infinite}
.recbtn.ghost{background:transparent}
.recbtn.ai{background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:var(--bg);border-color:transparent}
.recbtn:disabled{opacity:.4;cursor:default}
.recbtn:active:not(:disabled){transform:scale(.96)}
.recdot{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff5d7a;font-weight:700}
.songsrcbar{text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);padding:5px;flex-shrink:0}
/* scrolling sheet-music strip in Play Along — reads left-to-right, window
   slides so the current (pink, ▲) note stays near the left third */
.sheetwrap{overflow:hidden;background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 25%, transparent);border-radius:12px;margin:6px 10px 4px;box-shadow:0 4px 16px -8px color-mix(in srgb, var(--accent) 40%, transparent);flex-shrink:0}
.sheetinner{display:flex;flex-direction:column;transition:transform .22s linear;will-change:transform}
.sheetsvg{display:block}
.sheetmodes{display:flex;gap:6px;justify-content:center;padding:6px 8px 2px;background:transparent;flex-shrink:0}
.sheetmodebtn{background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 25%, transparent);border-radius:14px;padding:6px 14px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer}
.sheetmodebtn.on{border-color:var(--accent);color:var(--accent-deep);background:color-mix(in srgb, var(--accent) 14%, var(--surface))}
/* first-run guided tour — one big friendly card per step, kid-simple */
.tourov{position:fixed;inset:0;z-index:1550;background:var(--scrim);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .25s}
.tourcard{width:100%;max-width:400px;background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid color-mix(in srgb, var(--accent) 33%, transparent);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 18px 60px -18px color-mix(in srgb, var(--accent) 53%, transparent)}
.tourico{font-size:56px;margin-bottom:10px;animation:mascotidle 2.4s ease-in-out infinite}
.tourtitle{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:8px}
.tourdesc{font-family:'Rajdhani',sans-serif;font-size:15px;color:var(--ink);line-height:1.6;min-height:72px}
.tourdots{display:flex;gap:6px;justify-content:center;margin:14px 0}
.tourdots i{width:8px;height:8px;border-radius:50%;background:color-mix(in srgb, var(--ink) 13%, transparent)}
.tourdots i.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.tourbtns{display:flex;gap:10px}
.tourbtns .back{flex:1;padding:12px;border-radius:12px;border:1px solid color-mix(in srgb, var(--ink) 13%, transparent);background:transparent;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.tourbtns .next{flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px -6px var(--accent)}
.tourskip{margin-top:10px;background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer}
.songresult{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:24px;text-align:center}
.songstars{font-size:46px;color:var(--accent-soft);letter-spacing:6px;text-shadow:0 0 24px var(--accent);animation:popcount .6s ease-out}
.songresult-acc{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;color:#fff}
.songresult-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;max-width:300px}
.songresult-grid>div{background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px;padding:11px}
.songresult-grid span{display:block;font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--muted)}
.songresult-grid b{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--accent)}
.studioback{position:absolute;left:12px;top:12px;background:rgba(255,255,255,.06);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);color:var(--ink);border-radius:9px;padding:6px 12px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;z-index:2}
/* sight-reading */
.sightov .practicebody{align-items:stretch}
.staffwrap{background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);border-radius:16px;padding:14px 8px;margin:6px 0;transition:box-shadow .2s,border-color .2s}
.staffwrap.ok{border-color:var(--accent);box-shadow:0 0 24px -8px var(--accent)}
.staffwrap.bad{border-color:#ff5252;box-shadow:0 0 24px -8px #ff5252}
.staffsvg{display:block;max-height:175px}
.clefsel{display:flex;gap:8px;justify-content:center;margin:8px 0 2px}
.clefbtn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:11px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:rgba(255,255,255,.03);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.clefbtn .clefgly{font-family:Georgia,'Times New Roman',serif;font-size:16px;line-height:1}
.clefbtn.on{color:#fff;border-color:color-mix(in srgb, var(--accent) 67%, transparent);background:linear-gradient(160deg,rgba(var(--accent-rgb),.16),rgba(var(--accent-rgb),.04));box-shadow:0 0 18px -8px var(--accent)}
.clefbtn:active{transform:scale(.96)}
.sighthint{text-align:center;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--muted);min-height:22px;margin:4px 0 8px}
.sighthint.show{color:var(--accent-soft)}
/* camera coach */
.camov .camstage{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#04070d}
.camvideo,.camcanvas{position:absolute;max-width:100%;height:100%;width:auto;transform:scaleX(-1)}
.camcanvas{pointer-events:none}
.camoverlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:24px;background:rgba(4,8,14,.78);font-family:'Rajdhani',sans-serif;font-size:15px;color:#ffcfe9}
.camoverlay.err{color:#ff9ebd}
.camcoach{position:absolute;left:10px;right:10px;bottom:10px;max-height:55%;overflow-y:auto;background:rgba(8,14,26,.93);border:1px solid color-mix(in srgb, var(--accent-deep) 40%, transparent);border-radius:14px;padding:13px 15px;backdrop-filter:blur(4px)}
.camcoach-load{font-family:'Rajdhani',sans-serif;font-size:14px;color:#ffc4dd;text-align:center;animation:flamepulse .8s ease-in-out infinite alternate}
.camcoach-hd{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:var(--accent-soft);margin-bottom:6px}
.camcoach-tx{font-family:'Rajdhani',sans-serif;font-size:14px;line-height:1.5;color:var(--ink);white-space:pre-wrap;margin-bottom:8px}
.camfoot-btns{display:flex;gap:8px;justify-content:center}
.cammsg{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:#fff;text-shadow:0 2px 10px #000;padding:0 16px}
.camfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,0px));border-top:1px solid color-mix(in srgb, var(--ink) 6%, transparent);flex-shrink:0}
/* leaderboard */
.lbmine{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:400;color:var(--accent-soft)}
.lblist{display:flex;flex-direction:column;gap:5px}
.lbpodium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:12px}
.lbpod{flex:1;max-width:108px;display:flex;flex-direction:column;align-items:center;gap:3px;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px 12px 0 0;padding:10px 6px}
.lbpod.p1{padding-bottom:30px;border-color:color-mix(in srgb, var(--accent) 40%, transparent);box-shadow:0 0 18px -6px var(--accent)}
.lbpod.p2{padding-bottom:18px}
.lbpod.me{border-color:var(--accent-soft);background:linear-gradient(180deg,var(--surface-2),var(--surface))}
.lbpod-medal{font-size:22px}
.lbpod-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--bg);font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center}
.lbpod.p1 .lbpod-ava{width:42px;height:42px;font-size:18px}
.lbpod-nm{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--ink);max-width:96px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbpod-exp{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--accent)}
.lbtonext{text-align:center;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px}
.wkrow{display:flex;align-items:center;gap:11px;padding:9px 4px}
.wkic{font-size:22px;flex-shrink:0}
.wkbody{flex:1;min-width:0}
.wktop{display:flex;justify-content:space-between;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--ink);margin-bottom:4px}
.wktop b{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:11px}
.wkrow.done .wktop b{color:var(--accent)}
.wkbar{height:7px;border-radius:4px;background:var(--surface);overflow:hidden}
.wkbar div{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent-deep));transition:width .4s}
.wkrow.done .wkbar div{background:linear-gradient(90deg,var(--accent-deep),var(--accent))}
.lbrow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 5%, transparent);animation:lbin .3s ease-out both}
@keyframes lbin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.lbrow.me{border-color:var(--accent-soft)66;background:rgba(255,118,216,.08)}
.lbrank{min-width:26px;text-align:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--muted)}
.lbrank.top{font-size:17px}
.lbname{flex:1;min-width:0;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbrow.me .lbname{color:#ffb8d0}
.lbexp{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
.lbexp small{font-size:9px;color:var(--muted)}
.lbempty{text-align:center;font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);padding:14px}
.songcard-badge{display:inline-block;margin-left:7px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;color:var(--bg);background:var(--sc,var(--accent));border-radius:5px;padding:2px 5px;vertical-align:middle}
/* AI voice tutor */
.vmstage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:12px 16px 6px;flex-shrink:0}
.vmorb{position:relative;width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;background:radial-gradient(circle at 50% 38%,var(--surface-2),var(--surface));border:2px solid #602a48;transition:border-color .3s;cursor:pointer;padding:0;color:inherit;-webkit-tap-highlight-color:transparent}
.vmorb.listening{border-color:var(--accent);animation:vmpulse 1.5s ease-out infinite}
.vmorb.thinking{border-color:var(--accent);animation:vmspin 1.1s linear infinite}
.vmorb.speaking{border-color:#ff5252;box-shadow:0 0 30px -4px #ff5252;animation:vmwave .7s ease-in-out infinite alternate}
@keyframes vmpulse{0%{box-shadow:0 0 0 0 color-mix(in srgb, var(--accent) 33%, transparent)}100%{box-shadow:0 0 0 30px color-mix(in srgb, var(--accent) 4%, transparent)}}
@keyframes vmspin{to{transform:rotate(360deg)}}
@keyframes vmwave{from{transform:scale(1)}to{transform:scale(1.05)}}
.vmstate{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--muted)}
.vmcaption{min-height:22px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--ink);text-align:center;max-width:92%}
.vmnotes{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.vmnote{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);background:rgba(var(--accent-rgb),.1);border:1px solid color-mix(in srgb, var(--accent) 27%, transparent);border-radius:7px;padding:3px 8px}
.vminstant{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:900;animation:vminst .65s ease-out forwards;pointer-events:none}
.vminstant.ok{color:var(--accent);text-shadow:0 0 18px var(--accent)}
.vminstant.bad{color:#ff5252;text-shadow:0 0 18px #ff5252}
@keyframes vminst{0%{transform:scale(.5);opacity:0}25%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:0}}
.vmstaff{width:100%;max-width:360px;background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);border-radius:12px;padding:6px 6px 2px;margin:2px auto 0}
.vmstaff .staffsvg{max-height:120px}
.vmtextrow{display:flex;gap:6px;width:100%;max-width:420px;margin:0 auto}
.vmtextin{flex:1;min-width:0;background:rgba(255,255,255,.06);border:1px solid color-mix(in srgb, var(--ink) 13%, transparent);border-radius:12px;padding:9px 13px;color:var(--ink);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none}
.vmtextin:focus{border-color:color-mix(in srgb, var(--accent) 67%, transparent)}
.vmtextsend{flex-shrink:0;width:42px;border-radius:12px;border:1px solid color-mix(in srgb, var(--accent) 67%, transparent);background:linear-gradient(160deg,var(--accent),var(--accent-deep));color:#fff;font-size:15px;cursor:pointer}
.vmtextsend:active{transform:scale(.95)}
.vmlog{flex:1;min-height:118px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:10px 16px;width:100%;max-width:540px;margin:0 auto;scrollbar-width:thin;scrollbar-color:var(--accent-deep) var(--surface);box-sizing:border-box}
.vmbub{max-width:84%;padding:9px 13px;border-radius:14px;font-family:'Rajdhani',sans-serif;font-size:14px;line-height:1.4}
.vmbub.user{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:var(--bg);font-weight:600}
.vmbub.ai{align-self:flex-start;background:var(--surface);border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);color:var(--ink)}
.vmfoot{position:relative;display:flex;flex-direction:column;align-items:center;gap:9px;padding:11px 16px calc(12px + env(safe-area-inset-bottom,0px));border-top:1px solid color-mix(in srgb, var(--ink) 6%, transparent);flex-shrink:0}
/* ── ⋯ voice-settings popover (speed / voice tone / HQ / chord-ear live in here) ── */
.vmmorewrap{position:absolute;right:10px;bottom:calc(100% + 10px);z-index:40}
.vmmore{width:44px;height:44px;border-radius:50%;background:var(--surface-2);border:1px solid color-mix(in srgb, var(--ink) 15%, transparent);color:var(--ink);font-size:22px;font-weight:900;line-height:1;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.vmmore:active{transform:scale(.93)}
.vmmenu{position:absolute;bottom:52px;right:0;background:var(--surface);border:1px solid color-mix(in srgb, var(--accent) 33%, transparent);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;min-width:250px;box-shadow:0 10px 34px rgba(0,0,0,.55);animation:dropdown .18s ease-out}
.vmmenu .vmspeed{justify-content:flex-start}
.vmmenu .vmvoicetgl{align-self:flex-start;margin-bottom:0}
.vmbig{padding:14px 42px;border-radius:40px;font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;color:var(--bg);background:linear-gradient(135deg,var(--accent),var(--accent-deep));box-shadow:0 8px 26px -8px var(--accent)}
.vmbig.stop{background:linear-gradient(135deg,#ff5252,var(--accent));box-shadow:0 8px 26px -8px #ff5252}
.vmbig:active{transform:scale(.96)}
.vmvoicetgl{align-self:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);border-radius:14px;padding:4px 12px;cursor:pointer;margin-bottom:2px}
.vmvoicetgl:active{transform:scale(.95)}
.vmvoicetgl.on{color:#0a1020;background:linear-gradient(90deg,var(--accent-soft),#e65bb0);border-color:transparent}
.vmspeed{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center}
.vmspeed-lbl{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted);margin-right:2px}
.vmspeed-b{font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);border-radius:10px;padding:4px 9px;cursor:pointer;transition:all .15s}
.vmspeed-b.on{color:#fff;border-color:color-mix(in srgb, var(--accent) 67%, transparent);background:linear-gradient(160deg,rgba(var(--accent-rgb),.22),rgba(var(--accent-rgb),.06));box-shadow:0 0 14px -6px var(--accent)}
.vmspeed-b:active{transform:scale(.93)}
/* octave shift on the on-screen keyboard */
.octctl{display:flex;align-items:center;gap:6px;margin-left:auto;margin-right:8px}
.octbtn{width:26px;height:26px;border-radius:7px;border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);background:var(--surface);color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.octbtn:disabled{opacity:.3;cursor:default}
.octbtn:active:not(:disabled){background:var(--surface-2)}
.octlbl{font-family:'Share Tech Mono',monospace;font-size:10px;color:#c47fa8;min-width:54px;text-align:center}
/* metronome quick pill in the header */
.metropill{display:flex;align-items:center;gap:3px;background:linear-gradient(135deg,var(--accent),#ff5252);color:var(--bg);border:none;border-radius:20px;padding:5px 11px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer;animation:metblink 1s steps(2) infinite}
@keyframes metblink{50%{opacity:.55}}
/* settings overlay */
.setov{position:fixed;inset:0;z-index:1300;background:var(--scrim);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:18px;animation:fadein .2s}
.setcard{width:100%;max-width:420px;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--accent) 15%, transparent);border-radius:18px;box-shadow:0 24px 60px -20px #000}
.sethdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid color-mix(in srgb, var(--ink) 6%, transparent);font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--ink);position:sticky;top:0;background:var(--surface);z-index:1}
.setbody{padding:14px 16px 18px}
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0}
.setrow.col{flex-direction:column;align-items:stretch;gap:8px}
.setrow.setbtns{justify-content:center;gap:8px}
.setrow label{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--ink)}
.setrow input[type=range]{flex:1;max-width:200px;accent-color:var(--accent)}
.setdiv{height:1px;background:color-mix(in srgb, var(--ink) 6%, transparent);margin:6px 0}
.settoggle{min-width:64px;padding:7px 14px;border-radius:20px;border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);background:var(--surface);color:var(--muted);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.settoggle.on{background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:var(--bg);border-color:transparent}
.setbtn{min-width:48px;padding:9px 14px;border-radius:10px;border:1px solid color-mix(in srgb, var(--accent) 18%, transparent);background:var(--surface);color:var(--ink);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.setbtn.wide{flex:1}
.setbtn:active{transform:scale(.96)}
.setlangs{display:flex;gap:7px}
.setlangbtn{flex:1;padding:9px 6px;border-radius:10px;border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);background:var(--surface);color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.setlangbtn.on{background:linear-gradient(135deg,var(--accent-deep),var(--accent));color:var(--bg);border-color:transparent}
.setver{text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:#754a5f;margin-top:14px;letter-spacing:1px}
/* progress dashboard (profile) */
.heatcard{background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:14px;padding:13px 14px}
.heatgrid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:1fr;gap:3px}
.heatcell{width:100%;aspect-ratio:1;border-radius:2px;min-width:0}
.heatlegend{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted)}
.heatlegend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.trendwrap{margin-top:12px;border-top:1px solid color-mix(in srgb, var(--ink) 5%, transparent);padding-top:10px}
.trendlbl{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted);margin-bottom:4px}
.trendlbl b{color:var(--accent);font-size:13px}
.trendsvg{width:100%;height:38px;display:block}
.trendempty{margin-top:10px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted);padding:6px}
/* interactive progress dashboard */
.dashranges{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.dashrange{flex:1;min-width:48px;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);border-radius:9px;padding:7px 4px;cursor:pointer;transition:all .15s}
.dashrange.on{color:#fff;border-color:color-mix(in srgb, var(--accent) 67%, transparent);background:linear-gradient(160deg,rgba(var(--accent-rgb),.22),rgba(var(--accent-rgb),.05));box-shadow:0 0 14px -6px var(--accent)}
.dashrange:active{transform:scale(.95)}
.dashcards{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:13px}
.dashcard{background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px;padding:11px 13px;position:relative}
.dashcard-v{font-family:'Orbitron',sans-serif;font-size:21px;font-weight:900;color:var(--ink);line-height:1}
.dashcard-l{font-family:'Rajdhani',sans-serif;font-size:11px;color:#a87e97;margin-top:3px}
.dashcard-d{position:absolute;top:10px;right:11px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700}
.dashcard-d.up{color:var(--accent)}
.dashcard-d.down{color:#ff6b8a}
.dashchart{background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--ink) 7%, transparent);border-radius:12px;padding:11px 13px;margin-bottom:11px}
.dashchart-h{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.dashtip{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent)}
.dashbars{display:flex;align-items:flex-end;gap:2px;height:78px}
.dashbar{flex:1;min-width:0;height:100%;display:flex;align-items:flex-end;background:none;border:none;padding:0;cursor:pointer}
.dashbar>span{display:block;width:100%;min-height:2px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent-deep));transition:height .25s}
.dashbar.sel>span,.dashbar:active>span{background:linear-gradient(180deg,var(--accent),#a8329a);box-shadow:0 0 10px -2px var(--accent)}
.dashline{width:100%;height:46px;display:block}
.dashcards.three{grid-template-columns:repeat(3,1fr)}
.dashdetail{background:linear-gradient(180deg,var(--surface),var(--surface));border:1px solid color-mix(in srgb, var(--accent) 20%, transparent);border-radius:12px;padding:11px 13px;margin-bottom:11px}
.dashdetail-h{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:800;color:var(--accent-soft);margin-bottom:7px}
.dashdetail-stats{display:flex;flex-wrap:wrap;gap:12px;font-family:'Rajdhani',sans-serif;font-size:12px;color:#a87e97}
.dashdetail-stats b{color:var(--ink);font-size:14px}
.dashdetail-games{margin-top:9px;display:flex;flex-direction:column;gap:5px;border-top:1px solid color-mix(in srgb, var(--ink) 6%, transparent);padding-top:8px}
.dashgame-row{display:flex;justify-content:space-between;align-items:center;font-family:'Rajdhani',sans-serif;font-size:12px;color:#eccfe0}
.dashgame-row .dashgame-acc{font-family:'Share Tech Mono',monospace;color:var(--accent);font-weight:700}
.dashgame-x{display:flex;gap:2px;margin-top:5px}
.dashgame-x span{flex:1;text-align:center;font-family:'Share Tech Mono',monospace;font-size:7.5px;color:#885a72;overflow:hidden;white-space:nowrap}
/* accessibility & mobile ergonomics */
button,.pk,.songlane,.octbtn,.navbtn,a{touch-action:manipulation}
.octbtn{min-width:30px;min-height:30px}
.navbtn{color:#ac7c97}            /* lift inactive nav contrast */
.songsrcbar{color:var(--muted);font-size:11px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
