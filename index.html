💡 由不同的三度、五度、七度组合而成。`}},{id:"tension",icon:"⚡",title:{th:"เทนชั่น (Tension)",en:"Tension",zh:"张力音 (Tension)"},subtitle:{th:"โน้ตสีสัน 9, 11, 13",en:"Color notes — 9, 11, 13",zh:"色彩音 — 9、11、13"},level:5,color:"#c77dff",group:"advanced",demo:["C4","E4","G4","B4","D5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'เทนชั่น (Tension)' บนเปียโนให้หน่อยครับ อธิบายว่า tension คืออะไร โน้ต 9th, 11th, 13th การสร้าง extended chord และการ resolve ตอบภาษาไทยและระบุชื่อโน้ต เช่น Cmaj9 = C4 E4 G4 B4 D5",en:"Please teach me about 'Tension' on piano. Explain 9th, 11th, 13th notes, building extended chords, and resolution. List note names e.g. Cmaj9 = C4 E4 G4 B4 D5.",zh:"请教我钢琴上的'张力音(Tension)'。解释9度、11度、13度音符，构建扩展和弦，以及解决。列出音名如 Cmaj9 = C4 E4 G4 B4 D5。"}},{id:"blockchord",icon:"🧱",title:{th:"บล็อกคอร์ดใต้ทำนอง",en:"Block Chords",zh:"块状和弦"},subtitle:{th:"เล่นคอร์ดพร้อมเมโลดี้",en:"Block Chord Under the Melody",zh:"在旋律下弹奏块状和弦"},level:6,color:"#ff6ec7",group:"advanced",demo:["C4","E4","G4"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'Block Chord ใต้ทำนอง (Block Chord Under the Melody)' บนเปียโนให้หน่อยครับ อธิบายเทคนิคเล่นคอร์ดเต็มพร้อมโน้ตทำนองบนสุด สไตล์ George Shearing และการประยุกต์ใน solo piano ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Block Chords Under the Melody' on piano. Explain playing full chords with the melody on top, the George Shearing style, and solo piano application. List note names.",zh:"请教我钢琴上的'旋律下方的块状和弦(Block Chord)'。解释如何在旋律下方演奏完整和弦、George Shearing风格，以及独奏钢琴的应用。列出音名。"}},{id:"slashchord",icon:"➗",title:{th:"สแลชคอร์ด (Slash Chord)",en:"Slash Chord",zh:"斜杠和弦 (Slash Chord)"},subtitle:{th:"คอร์ดที่มีเบสต่างจากราก",en:"A chord with a different bass note",zh:"低音不同于根音的和弦"},level:7,color:"#ff2d78",group:"advanced",demo:["E4","G4","C5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'สแลชคอร์ด (Slash Chord)' บนเปียโนให้หน่อยครับ อธิบายว่า C/E คืออะไร การสร้าง bass line ที่เคลื่อนนุ่มนวล และการใช้ใน Gospel/Soul/Ballad ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Slash Chords' on piano. Explain what C/E means, creating smooth bass lines, and usage in Gospel/Soul/Ballad. List note names.",zh:"请教我钢琴上的'斜线和弦(Slash Chord)'。解释C/E是什么、创建流畅的低音线，以及在福音/灵魂/抒情中的运用。列出音名。"}},{id:"padchord",icon:"🌫️",title:{th:"แพดคอร์ด (Pad Chord)",en:"Pad Chord",zh:"铺底和弦 (Pad Chord)"},subtitle:{th:"Harmony ขั้นสูง — เสียงพื้นหลังที่ลอย",en:"Advanced harmony — floating background",zh:"高级和声 — 漂浮的背景音"},level:8,color:"#b8c0ff",group:"advanced",demo:["C4","G4","B4","D5","E5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'แพดคอร์ด (Pad Chord)' และ voicing ขั้นสูงบนเปียโนให้หน่อยครับ อธิบาย open voicing การกระจายโน้ตแบบ 4th/5th และการใช้ใน EDM/Ambient/Neo Soul เพื่อสร้างบรรยากาศล้ำๆ ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Pad Chords' and advanced voicing on piano. Explain open voicing, spreading notes in 4ths/5ths, and usage in EDM/Ambient/Neo Soul. List note names.",zh:"请教我钢琴上的'铺底和弦(Pad Chord)'和高级配置。解释开放配置、以4度/5度分散音符，以及在EDM/氛围/新灵魂乐中的运用。列出音名。"}},{id:"why-music",icon:"🌍",level:9,color:"#ffd166",group:"benefits",title:{th:"ประโยชน์ของดนตรี",en:"Why Music Matters",zh:"音乐的力量"},subtitle:{th:"ทำไมดนตรีถึงทรงพลัง",en:"The power of music",zh:"为何音乐如此重要"},content:{th:`🌍 ดนตรีไม่ใช่แค่ความบันเทิง แต่เป็นเครื่องมือที่ส่งผลต่อสมอง อารมณ์ เศรษฐกิจ และสังคม

🧠 ต่อสมองและอารมณ์
• กระตุ้นการหลั่งโดพามีน (สารแห่งความสุข) และลดฮอร์โมนความเครียด cortisol
• ช่วยความจำ สมาธิ และการเรียนรู้ — เด็กที่เล่นดนตรีมักมีพัฒนาการด้านภาษาและคณิตศาสตร์ดีขึ้น

🤝 ต่อสังคม
• สร้างความรู้สึกเป็นอันหนึ่งอันเดียวกัน ปลุกอารมณ์ร่วมของคนหมู่มาก
• เป็น "ภาษาสากล" ที่สื่อสารข้ามวัฒนธรรมและพรมแดน

ใน 5 บทถัดไป เราจะดูว่ามนุษย์ใช้ดนตรีจริงอย่างไรใน: ธุรกิจ 💼 · การทหาร 🎺 · ความเป็นชาติ 🇹🇭 · ชนชั้นสูง 👑 · และการบำบัดรักษา 💚`,en:`🌍 Music is not just entertainment — it shapes the brain, emotions, the economy and society.

🧠 Brain & emotion
• Triggers dopamine (the "feel-good" chemical) and lowers the stress hormone cortisol
• Boosts memory, focus and learning — kids who play music often gain language and math skills

🤝 Society
• Builds unity and stirs the shared emotion of large crowds
• A "universal language" that crosses cultures and borders

In the next 5 chapters we'll see how people really use music in: Business 💼 · the Military 🎺 · National identity 🇹🇭 · the Elite 👑 · and Healing 💚`,zh:`🌍 音乐不只是娱乐，它影响大脑、情绪、经济与社会。

🧠 大脑与情绪
• 促进多巴胺（快乐物质）分泌，降低压力激素皮质醇
• 提升记忆、专注与学习——学音乐的孩子常在语言和数学上更出色

🤝 社会
• 凝聚人心，激发群体共同的情感
• 是跨越文化与国界的"世界语言"

接下来5章，我们将看人类如何真正运用音乐：商业 💼 · 军事 🎺 · 国家认同 🇹🇭 · 精英阶层 👑 · 与疗愈 💚`}},{id:"music-business",icon:"💼",level:10,color:"#06d6a0",group:"benefits",title:{th:"ดนตรีกับธุรกิจ",en:"Music in Business",zh:"音乐与商业"},subtitle:{th:"เสียงที่ขายของได้",en:"Sound that sells",zh:"会卖货的声音"},content:{th:`💼 เสียงสร้างยอดขายและแบรนด์ได้จริง

🛒 เพลงในร้าน = ยอดขาย
งานวิจัยคลาสสิกของ Milliman (1982): เปิดเพลงจังหวะช้าในซูเปอร์มาร์เก็ต ทำให้ลูกค้าเดินช้าลง อยู่นานขึ้น ยอดขายเพิ่มถึง ~38% ในร้านอาหาร เพลงช้าทำให้ลูกค้านั่งนานและสั่งเครื่องดื่มมากขึ้น

🔔 Sonic Branding (โลโก้เสียง)
• Intel เสียง 4 โน้ต มูลค่าแบรนด์กว่า 200 ล้านดอลลาร์
• Mastercard สร้างเสียง 6 โน้ตที่ดังทุกครั้งที่จ่ายเงิน (2019)
• McDonald's "I'm Lovin' It" — แบรนด์ที่มี sonic logo จดจำได้สูงขึ้นถึง 8 เท่า

🌎 ระดับโลก: Coca-Cola, Apple, Spotify ใช้ดนตรีเป็นหัวใจการตลาด

🇹🇭 ไทย: วงร็อก "คาราบาว" ต่อยอดเป็นเครื่องดื่มชูกำลัง Carabao Daeng จนได้สปอนเซอร์ฟุตบอลอังกฤษ (Carabao Cup) — เปลี่ยนชื่อเสียงทางดนตรีเป็นแบรนด์ระดับโลก

🇨🇳 จีน: เพลงธีม "蜜雪冰城 (Mixue)" ปี 2021 (ดัดแปลงจาก Oh! Susanna) ไวรัลสุดขีด แฮชแท็กบน Douyin/TikTok ทะลุ 1.58 พันล้านครั้ง ดันแบรนด์ชานม-ไอศกรีมโตทั่วเอเชีย

💡 สรุป: เสียง → อารมณ์ → การตัดสินใจซื้อ`,en:`💼 Sound really drives sales and brand power.

🛒 In-store music = sales
The classic Milliman (1982) study: slow-tempo music in a supermarket made shoppers linger and lifted sales by ~38%. In restaurants, slow music keeps guests longer and they order more drinks.

🔔 Sonic branding (audio logos)
• Intel's 4-note tune is worth over $200 million in brand value
• Mastercard built a 6-note sound that plays on every payment (2019)
• McDonald's "I'm Lovin' It" — brands with a sonic logo are recalled up to 8× better

🌎 Global: Coca-Cola, Apple and Spotify put music at the heart of marketing.

🇹🇭 Thailand: rock band "Carabao" became the Carabao Daeng energy drink and now sponsors English football's Carabao Cup — turning musical fame into a global brand.

🇨🇳 China: the "Mixue" theme song (2021, adapted from Oh! Susanna) went viral with 1.58 billion plays under Douyin/TikTok hashtags, fueling the tea-and-ice-cream chain across Asia.

💡 Takeaway: sound → emotion → buying decision.`,zh:`💼 声音确实能带动销售与品牌力。

🛒 店内音乐 = 销售额
经典的 Milliman（1982）研究：超市播放慢节奏音乐让顾客停留更久，销售额提升约38%。餐厅里慢音乐让客人坐得更久、点更多饮品。

🔔 声音品牌（听觉标志）
• 英特尔的4音旋律品牌价值超2亿美元
• 万事达卡打造每次付款都会响起的6音之声（2019）
• 麦当劳"I'm Lovin' It"——拥有声音标志的品牌记忆度可高出8倍

🌎 全球：可口可乐、苹果、Spotify 都把音乐作为营销核心。

🇹🇭 泰国：摇滚乐队"Carabao（卡拉宝）"延伸成卡拉宝能量饮料，如今赞助英格兰联赛杯（Carabao Cup）——把音乐名气变成全球品牌。

🇨🇳 中国："蜜雪冰城"主题曲（2021，改编自《哦！苏珊娜》）爆红，抖音/TikTok 话题播放量超15.8亿次，推动这家茶饮冰淇淋品牌火遍亚洲。

💡 要点：声音 → 情绪 → 购买决定。`}},{id:"music-military",icon:"🎺",level:11,color:"#e76f51",group:"benefits",title:{th:"ดนตรีในกองทัพ",en:"Music in the Military",zh:"军队中的音乐"},subtitle:{th:"สั่งการ ปลุกใจ ข่มขวัญ",en:"Command, morale, intimidation",zh:"指挥·士气·震慑"},content:{th:`🎺 กองทัพใช้ดนตรีมานานนับพันปี

📡 สื่อสารและสั่งการ
ในอดีต กลอง แตร และปี่ ใช้ส่งสัญญาณในสนามรบ เสียงเดินทางไกลและสั่งการทหารจำนวนมากให้เคลื่อนพร้อมกัน (เช่น แตรปลุก แตรโจมตี แตรถอย)

🥁 ขวัญและความสามัคคี
วงดุริยางค์ทหารและการ "นับจังหวะเดิน" (cadence) ทำให้หน่วยเดินพร้อมเพรียง ฮึกเหิม และรู้สึกเป็นหนึ่งเดียว

🎶 ปี่สก็อต (Bagpipes)
กรมทหารสก็อตเป่าปี่นำทัพเข้าสู้ สร้างขวัญฝ่ายตนและข่มขวัญศัตรู โดดเด่นมากในสงครามโลกครั้งที่ 1

🔊 สงครามจิตวิทยา
กองทัพยุคใหม่เคยเปิดเพลงเสียงดังกดดันศัตรู เช่น ปฏิบัติการกดดันนายพลโนรีเอกาที่ปานามา ปี 1989

💡 สรุป: ดนตรี = เครื่องมือบังคับบัญชา ขวัญกำลังใจ และจิตวิทยา`,en:`🎺 Armies have used music for thousands of years.

📡 Communication & command
Drums, bugles and fifes once carried orders across the battlefield — sound travels far and moves large numbers of troops together (wake-up, charge, retreat calls).

🥁 Morale & cohesion
Military bands and marching "cadence" calls keep units in step, fired up, and feeling as one.

🎶 Bagpipes
Scottish regiments piped their troops into battle to lift their own morale and unnerve the enemy — famously in World War I.

🔊 Psychological warfare
Modern armies have blasted loud music to pressure opponents — e.g. the operation against General Noriega in Panama, 1989.

💡 Takeaway: music = a tool of command, morale and psychology.`,zh:`🎺 军队使用音乐已有数千年。

📡 通信与指挥
古时鼓、号、笛在战场上传递命令——声音传得远，能让大批士兵同步行动（起床号、冲锋号、撤退号）。

🥁 士气与凝聚
军乐队和行进"口令节奏"(cadence) 让队伍步伐一致、斗志高昂、融为一体。

🎶 苏格兰风笛
苏格兰军团吹着风笛冲锋，既鼓舞己方又震慑敌人——一战中尤为著名。

🔊 心理战
现代军队曾用高音量音乐施压对手——例如1989年巴拿马针对诺列加将军的行动。

💡 要点：音乐 = 指挥、士气与心理的工具。`}},{id:"music-nation",icon:"🇹🇭",level:12,color:"#118ab2",group:"benefits",title:{th:"ดนตรีกับความเป็นชาติ",en:"Music & National Identity",zh:"音乐与国家认同"},subtitle:{th:"เสียงที่หลอมรวมผู้คน",en:"Sound that unites a people",zh:"凝聚人民的声音"},content:{th:`🇹🇭 ดนตรีสร้าง "สำนึกร่วม" ของคนทั้งชาติ

🎵 เพลงชาติ
เครื่องมือสร้างความเป็นชาติที่ทรงพลังที่สุด ประเทศไทยเปิดเพลงชาติทุกวันเวลา 08:00 และ 18:00 ทั่วประเทศ และมีเพลงสรรเสริญพระบารมีในโรงภาพยนตร์

🔥 ปฏิวัติและรวมชาติ
• "La Marseillaise" จุดไฟการปฏิวัติฝรั่งเศส
• "Va, pensiero" ของแวร์ดี กลายเป็นเพลงปลุกใจรวมชาติอิตาลี
• "Finlandia" ของซิเบลิอุส สัญลักษณ์การต่อสู้เพื่อเอกราชของฟินแลนด์

🇨🇳 จีน: เพลงชาติ "义勇军进行曲 (March of the Volunteers)" มาจากภาพยนตร์ปี 1935 เป็นเพลงปลุกใจต้านการรุกราน

🌟 ยุคใหม่: K-pop (เช่น BTS) กลายเป็น "soft power" สร้างภาพลักษณ์และรายได้มหาศาลให้เกาหลีใต้

💡 สรุป: ดนตรีทำให้ผู้คนรู้สึกเป็น "พวกเดียวกัน"`,en:`🇹🇭 Music forges a shared sense of nationhood.

🎵 National anthems
The most powerful nation-building tool. Thailand plays its anthem nationwide every day at 08:00 and 18:00, and the Royal Anthem in cinemas.

🔥 Revolution & unification
• "La Marseillaise" lit the fire of the French Revolution
• Verdi's "Va, pensiero" became a rallying song for Italian unification
• Sibelius's "Finlandia" symbolized Finland's fight for independence

🇨🇳 China: the anthem "March of the Volunteers" came from a 1935 film — a song of resistance.

🌟 Today: K-pop (e.g. BTS) is "soft power," building South Korea's image and huge revenue.

💡 Takeaway: music makes people feel they belong to one another.`,zh:`🇹🇭 音乐铸就全民共同的"国家感"。

🎵 国歌
最有力的国家建构工具。泰国每天08:00与18:00全国播放国歌，影院里播放颂圣歌。

🔥 革命与统一
• 《马赛曲》点燃法国大革命
• 威尔第《飞吧，思想》成为意大利统一的号召之歌
• 西贝柳斯《芬兰颂》象征芬兰争取独立的抗争

🇨🇳 中国：国歌《义勇军进行曲》源自1935年电影，是抗争之歌。

🌟 当代：K-pop（如 BTS）成为"软实力"，为韩国塑造形象并带来巨大收益。

💡 要点：音乐让人们感到彼此同属一体。`}},{id:"music-elite",icon:"👑",level:13,color:"#9d4edd",group:"benefits",title:{th:"ดนตรีกับชนชั้นสูง",en:"Music & the Elite",zh:"音乐与精英阶层"},subtitle:{th:"สัญลักษณ์ของอำนาจและรสนิยม",en:"A symbol of power and taste",zh:"权力与品味的象征"},content:{th:`👑 ดนตรีเป็นเครื่องแสดงสถานะของชนชั้นสูงมาช้านาน

🎼 ระบบอุปถัมภ์ (Patronage)
ในยุโรป ขุนนางและราชสำนักเลี้ยงดูคีตกวี เช่น ไฮเดิน รับใช้ราชวงศ์ Esterházy; โมสาร์ทและเบโทเฟนพึ่งพาชนชั้นสูงเวียนนา การมีคีตกวีประจำตัวคือเครื่องแสดงรสนิยมและอำนาจ

🇫🇷 ราชสำนักฝรั่งเศส
พระเจ้าหลุยส์ที่ 14 (Sun King) ทรงเต้นบัลเลต์เอง และใช้ดนตรี-นาฏศิลป์ที่พระราชวังแวร์ซายแสดงพระราชอำนาจ

🇹🇭 ไทย
ดนตรีในราชสำนัก (วงปี่พาทย์) สืบทอดยาวนาน และในหลวงรัชกาลที่ 9 ทรงเป็นคีตกวีแจ๊สที่โลกยอมรับ พระราชนิพนธ์ เช่น "สายฝน" และ "H.M. Blues"

🇨🇳 จีน
"雅乐 (yayue)" ดนตรีพิธีในราชสำนัก และ "กู่ฉิน (guqin)" เครื่องดนตรีของปราชญ์และผู้ดีจีน ใช้ขัดเกลาจิตใจให้สูงส่ง

💡 สรุป: ดนตรี = สัญลักษณ์ของอำนาจ การศึกษา และรสนิยมชั้นสูง`,en:`👑 Music has long signaled the status of the elite.

🎼 The patronage system
In Europe, nobles and courts employed composers — Haydn served the Esterházy princes; Mozart and Beethoven relied on Vienna's aristocracy. Keeping a composer showed taste and power.

🇫🇷 The French court
Louis XIV, the "Sun King," danced ballet himself and used music and dance at Versailles to display royal power.

🇹🇭 Thailand
Royal court music (piphat ensembles) has a long lineage, and King Rama IX (Bhumibol) was a world-respected jazz composer — works like "Falling Rain (Saiyon)" and "H.M. Blues."

🇨🇳 China
"Yayue" ritual court music, and the "guqin" — the instrument of scholars and gentlemen, used to refine the mind.

💡 Takeaway: music = a symbol of power, education and refined taste.`,zh:`👑 音乐长久以来彰显精英阶层的地位。

🎼 赞助制度
在欧洲，贵族与宫廷供养作曲家——海顿为埃斯特哈齐家族服务；莫扎特、贝多芬依赖维也纳贵族。拥有专属作曲家象征品味与权力。

🇫🇷 法国宫廷
"太阳王"路易十四亲自跳芭蕾，并在凡尔赛宫以音乐舞蹈彰显王权。

🇹🇭 泰国
宫廷音乐（披帕乐团）传承悠久；泰国九世王（普密蓬）是受世界尊敬的爵士作曲家，作品如《Falling Rain（สายฝน）》与《H.M. Blues》。

🇨🇳 中国
"雅乐"为宫廷礼仪音乐；"古琴"是文人雅士的乐器，用以修身养性。

💡 要点：音乐 = 权力、教养与高雅品味的象征。`}},{id:"music-therapy",icon:"💚",level:14,color:"#2a9d8f",group:"benefits",title:{th:"ดนตรีบำบัด",en:"Music Therapy",zh:"音乐疗法"},subtitle:{th:"เยียวยากาย ใจ และสมอง",en:"Healing & wellness",zh:"疗愈与健康"},content:{th:`💚 ดนตรีคือ "ยา" ที่ช่วยกาย ใจ และสมอง

🏥 เป็นวิชาชีพการแพทย์จริง
ดนตรีบำบัด (Music Therapy) มีสมาคมวิชาชีพ (เช่น AMTA) และใช้ในโรงพยาบาลทั่วโลก

🧠 ฟื้นฟูสมอง
• ผู้ป่วยหลอดเลือดสมองที่พูดไม่ได้ (aphasia) ใช้ "Melodic Intonation Therapy" ร้องเป็นทำนองเพื่อกลับมาพูด
• ผู้ป่วยพาร์กินสันใช้จังหวะดนตรีช่วยให้เดินมั่นคงขึ้น

💭 ความจำ
ผู้ป่วยอัลไซเมอร์/สมองเสื่อม มักจำเพลงเก่าได้ และตอบสนองดีขึ้นเมื่อได้ฟังเพลงในวัยหนุ่มสาว

😌 ลดเครียดและความเจ็บปวด
ดนตรีลดฮอร์โมน cortisol ความดันโลหิต และความวิตกกังวล จึงใช้ก่อน/ระหว่างผ่าตัด และดูแลทารกคลอดก่อนกำหนด (NICU)

🌟 ตัวอย่างจริง: ส.ส.สหรัฐ Gabby Giffords ฟื้นความสามารถในการพูดด้วยดนตรีบำบัดหลังถูกยิงที่ศีรษะ

💡 สรุป: ดนตรีคือยาไร้ผลข้างเคียงที่เยียวยาทั้งร่างกายและจิตใจ`,en:`💚 Music is "medicine" for body, mind and brain.

🏥 A real medical profession
Music therapy has professional bodies (e.g. AMTA) and is used in hospitals worldwide.

🧠 Brain recovery
• Stroke patients who can't speak (aphasia) use "Melodic Intonation Therapy" — singing words back into speech
• Parkinson's patients use musical rhythm to walk more steadily

💭 Memory
People with Alzheimer's/dementia often still remember old songs and respond better to music from their youth.

😌 Less stress & pain
Music lowers cortisol, blood pressure and anxiety — used before/during surgery and in newborn intensive care (NICU).

🌟 Real case: U.S. Congresswoman Gabby Giffords regained her speech through music therapy after being shot in the head.

💡 Takeaway: music is a side-effect-free medicine that heals body and mind.`,zh:`💚 音乐是身、心、脑的"良药"。

🏥 真正的医疗专业
音乐疗法有专业协会（如 AMTA），在全球医院中应用。

🧠 大脑康复
• 无法说话的中风（失语症）患者用"旋律语调疗法"，把词语唱回成语言
• 帕金森患者借助音乐节奏让步态更稳

💭 记忆
阿尔茨海默/失智患者常仍记得老歌，听到年轻时的音乐反应更好。

😌 减压与止痛
音乐降低皮质醇、血压与焦虑——用于手术前后及新生儿重症监护（NICU）。

🌟 真实案例：美国国会议员 Gabby Giffords 头部中枪后，通过音乐疗法重新恢复了说话能力。

💡 要点：音乐是没有副作用的良药，疗愈身心。`}}],m_={th:[{id:"benefits",label:"ประโยชน์ของดนตรี",desc:"ดนตรีเปลี่ยนโลกอย่างไร — ธุรกิจ ทหาร ชาติ ชนชั้นสูง การบำบัด",icon:"🌍"},{id:"foundation",label:"รากฐาน",desc:"เริ่มที่นี่ — พื้นฐานที่ต้องรู้ก่อน",icon:"🌱"},{id:"chords",label:"คอร์ด",desc:"สร้างเสียงประสาน",icon:"🎹"},{id:"advanced",label:"ขั้นสูง",desc:"Harmony ระดับโปร",icon:"🚀"}],en:[{id:"benefits",label:"WHY MUSIC MATTERS",desc:"How music shapes business, war, nations, elites & healing",icon:"🌍"},{id:"foundation",label:"FOUNDATION",desc:"Start here — essential basics",icon:"🌱"},{id:"chords",label:"CHORDS",desc:"Building harmony",icon:"🎹"},{id:"advanced",label:"ADVANCED",desc:"Pro-level harmony",icon:"🚀"}],zh:[{id:"benefits",label:"音乐的力量",desc:"音乐如何改变世界——商业、军事、国家、精英与疗愈",icon:"🌍"},{id:"foundation",label:"基础",desc:"从这里开始 — 必备基础",icon:"🌱"},{id:"chords",label:"和弦",desc:"构建和声",icon:"🎹"},{id:"advanced",label:"进阶",desc:"专业级和声",icon:"🚀"}]},Xs={lesson:50,chapter:25,ask:10,daily:15},cr=[{min:0,icon:"🌱",c:"#00f5ff",th:"มือใหม่",en:"Novice",zh:"初学者"},{min:120,icon:"🎵",c:"#00e0ff",th:"ผู้เริ่มต้น",en:"Beginner",zh:"入门"},{min:300,icon:"🎶",c:"#22c8ff",th:"นักเรียน",en:"Student",zh:"学生"},{min:560,icon:"🎹",c:"#7b2fff",th:"นักฝึก",en:"Apprentice",zh:"学徒"},{min:900,icon:"🎼",c:"#9d4edd",th:"นักดนตรี",en:"Musician",zh:"乐手"},{min:1350,icon:"⭐",c:"#c77dff",th:"นักเปียโน",en:"Pianist",zh:"钢琴手"},{min:1950,icon:"🌟",c:"#ff6ec7",th:"ผู้ชำนาญ",en:"Virtuoso",zh:"演奏家"},{min:2750,icon:"💎",c:"#ff2d78",th:"ปรมาจารย์",en:"Maestro",zh:"大师"},{min:3800,icon:"👑",c:"#ffb703",th:"เซียนเปียโน",en:"Grandmaster",zh:"宗师"},{min:5200,icon:"🏆",c:"#ffd166",th:"ตำนาน",en:"Legend",zh:"传奇"}];function Gt(t){const e=Math.max(0,t||0);let n=0;for(let a=0;a<cr.length;a++)e>=cr[a].min&&(n=a);const r=cr[n],s=cr[n+1]||null,i=s?s.min-r.min:1;return{level:n+1,tier:r,next:s,curMin:r.min,nextMin:s?s.min:r.min,need:s?s.min-e:0,progress:s?Math.min(1,(e-r.min)/i):1,isMax:!s}}function Oo(t){return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2 @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap');
.tg{font-family:'Rajdhani',sans-serif;background:#050a12;color:#c8f0ff;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.tg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,245,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.035) 1px,transparent 1px);background-size:42px 42px;pointer-events:none;z-index:0}
.tg>*{position:relative;z-index:1}
/* keyboard-only focus ring (WCAG 2.4.7) — visible outline without affecting mouse users */
.tg :focus-visible{outline:2px solid #00f5ff;outline-offset:2px;border-radius:6px}
.tg button:focus-visible,.tg textarea:focus-visible{outline:2px solid #00f5ff;outline-offset:2px}
.scan{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.008) 2px,rgba(0,245,255,.008) 4px)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:linear-gradient(90deg,#070d1a,#0c1830);border-bottom:1px solid #00f5ff33;flex-shrink:0;position:relative;z-index:30}
.logo{display:flex;align-items:center;gap:10px}
.lbox{width:38px;height:38px;border:1.5px solid #00f5ff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;color:#00f5ff;font-weight:900;box-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff44;animation:pulse 2.5s infinite}
.lname{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#00f5ff;text-shadow:0 0 8px #00f5ff;letter-spacing:2px}
.lsub{font-size:8px;color:#4a7a8a;letter-spacing:3px;font-family:'Share Tech Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#00f5ff;box-shadow:0 0 8px #00f5ff;animation:blink 1.5s infinite}
/* flag dropdown */
.flagwrap{position:relative}
.flagbtn{display:flex;align-items:center;gap:4px;background:none;border:1px solid #00f5ff44;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:16px;line-height:1;transition:all .2s}
.flagbtn:hover{border-color:#00f5ff;box-shadow:0 0 8px #00f5ff44;background:rgba(0,245,255,.08)}
.flagbtn .caret{font-size:8px;color:#00f5ff;font-family:'Share Tech Mono',monospace}
.flagmenu{position:absolute;top:calc(100% + 6px);right:0;background:#0a1428;border:1px solid #00f5ff55;border-radius:6px;box-shadow:0 4px 20px rgba(0,245,255,.2);overflow:hidden;z-index:50;min-width:120px;animation:dropdown .18s ease-out}
.flagitem{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:15px;transition:all .15s;border:none;background:none;width:100%;color:#c8f0ff;font-family:'Rajdhani',sans-serif}
.flagitem .fn{font-size:12px;letter-spacing:.5px}
.flagitem:hover{background:rgba(0,245,255,.1)}
.flagitem.active{background:rgba(123,47,255,.18)}
.flagitem.active .fn{color:#00f5ff}
/* piano */
.pw{background:#0c1628;border-bottom:1px solid #00f5ff33;padding:10px 8px 4px;flex-shrink:0}
.plbl{font-family:'Orbitron',sans-serif;font-size:8px;color:#4a7a8a;letter-spacing:3px;text-align:center;margin-bottom:7px}
.kr{display:flex;justify-content:center;align-items:flex-start;gap:1px;overflow-x:auto;padding:0 4px 20px;scrollbar-width:none}
.kr::-webkit-scrollbar{display:none}
.pk{cursor:pointer;border-radius:0 0 4px 4px;transition:all .08s;flex-shrink:0;position:relative;user-select:none}
.pk.w{background:#ddeef8;border:1px solid #99bbcc;z-index:1;box-shadow:0 4px 8px rgba(0,0,0,.5)}
.pk.b{background:#060d1a;border:1px solid #001015;margin-left:-9px;margin-right:-9px;z-index:2;box-shadow:0 4px 12px rgba(0,0,0,.9)}
.pk.w.lit{background:linear-gradient(180deg,#00f5ff,#00c8dd 40%,#ddeef8);box-shadow:0 0 16px #00f5ff,0 0 40px #00f5ff66}
.pk.b.lit{background:linear-gradient(180deg,#00f5ff,#006080);box-shadow:0 0 14px #00f5ff,0 0 30px #00f5ff66}
.pk.w:active{transform:translateY(2px)}
.pk.b:active{transform:translateY(1px)}
.pk.flash{animation:keypop .32s ease-out}
@keyframes keypop{0%{filter:brightness(1.9) saturate(1.3);box-shadow:0 0 18px 4px #00f5ffcc,0 0 36px 6px #00f5ff66}100%{filter:brightness(1)}}
.kn{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:7px;color:#5588aa;font-family:'Share Tech Mono',monospace;pointer-events:none}
/* finger number badge under keys */
.finger{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:#ff2d78;color:#fff;font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px #ff2d7899;animation:fingerpop .2s ease-out;z-index:5}
.fingerrow{height:20px;display:flex;justify-content:center;align-items:center;margin-top:2px}
.fingerhint{font-family:'Share Tech Mono',monospace;font-size:8px;color:#ff2d7899;letter-spacing:1px}
/* piano label row + replay button */

.plblrow .plbl{margin-bottom:0}

/* persistent fingering chart */

.fchart-finger{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:#fff;box-shadow:0 0 8px -2px currentColor}

.handbtn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 120%,#00f5ff 0%,transparent 60%);opacity:0;transition:opacity .25s}

.handsvg.flip{transform:scaleX(-1)}
.handlbl{position:relative;z-index:1}

.handbtn.on{color:#fff;border-color:#00f5ff77;background:linear-gradient(160deg,rgba(0,245,255,.12),rgba(0,245,255,.03));box-shadow:0 0 22px -8px #00f5ff,inset 0 0 18px -12px #00f5ff}
.handbtn.on::before{opacity:.12}

/* chat */

.chdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0d1830;border-bottom:1px solid #00f5ff33;flex-shrink:0}

.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#7b2fff #0a1020}

.msg.a .bbl{background:#0c1628;border:1px solid #00f5ff22;border-radius:2px 8px 8px 8px;color:#c8f0ff}
.atag{font-family:'Orbitron',sans-serif;font-size:8px;color:#00f5ff;letter-spacing:1px;margin-bottom:5px}
.mact{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.spkbtn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(123,47,255,.12),rgba(0,245,255,.06));border:1px solid #7b2fff55;border-radius:20px;padding:6px 14px 6px 12px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .22s;color:#9d6dff}
.spkbtn:hover{border-color:#7b2fff;box-shadow:0 0 14px -4px #7b2fff;background:linear-gradient(135deg,rgba(123,47,255,.2),rgba(0,245,255,.1))}
.spkbtn:active{transform:scale(.95)}
.spkbtn.on{border-color:#ff2d78;color:#ff5e9c;box-shadow:0 0 16px -4px #ff2d78;background:linear-gradient(135deg,rgba(255,45,120,.18),rgba(123,47,255,.1))}
.spkwave{display:flex;align-items:center;gap:2px;height:14px}

.spkbtn.on .spkwave span{opacity:1;animation:wave 1s ease-in-out infinite}
.spkbtn.on .spkwave span:nth-child(1){animation-delay:0s}
.spkbtn.on .spkwave span:nth-child(2){animation-delay:.15s}
.spkbtn.on .spkwave span:nth-child(3){animation-delay:.3s}
.spkbtn.on .spkwave span:nth-child(4){animation-delay:.45s}
@keyframes wave{0%,100%{height:4px}50%{height:13px}}
.spktxt{line-height:1}
@keyframes spkpulse{0%,100%{opacity:1}50%{opacity:.5}}
.playbtn{display:flex;align-items:center;gap:5px;background:none;border:1px solid #00f5ff66;border-radius:4px;padding:4px 11px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .2s;color:#00f5ff}
.playbtn:hover{border-color:#00f5ff;box-shadow:0 0 8px #00f5ff44;background:rgba(0,245,255,.08)}
.nlbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a7a8a}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px}

.tin:focus{border-color:#00f5ff;box-shadow:0 0 0 1px rgba(0,245,255,.15)}

.mhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #00f5ff33;background:#0a1020;flex-shrink:0}
.mlbl{font-family:'Orbitron',sans-serif;font-size:10px;color:#00f5ff;letter-spacing:1.5px;display:flex;align-items:center;gap:7px}
.cbtn{background:none;border:1px solid #ff2d78;border-radius:4px;padding:5px 14px;cursor:pointer;color:#ff2d78;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;transition:all .2s}
.cbtn:hover{background:rgba(255,45,120,.1);box-shadow:0 0 10px #ff2d78}
.mpw{padding:8px 8px 14px;background:#0c1628;border-bottom:1px solid #00f5ff33;flex-shrink:0}
.mmsgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#7b2fff #0a1020}
.mmsgs::-webkit-scrollbar{width:3px}
.mmsgs::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:2px}
.miw{padding:10px 12px;background:#0d1830;border-top:1px solid #00f5ff33;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff44}50%{box-shadow:0 0 20px #00f5ff,0 0 50px #00f5ff66}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dropdown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fingerpop{from{opacity:0;transform:translateX(-50%) scale(.4)}to{opacity:1;transform:translateX(-50%) scale(1)}}

.flicker{animation:flicker 6s infinite}
/* ── nav bar ── */
.navbar{display:flex;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));background:linear-gradient(0deg,#070b14,#0a1322);border-top:1px solid #00f5ff22;flex-shrink:0;position:relative}

.navbtn.on::before{opacity:1}

/* ── pathway page (hero + grid) ── */
.pathpage{flex:1;overflow-y:auto;padding:0 0 24px;scrollbar-width:thin;scrollbar-color:#7b2fff #0a1020}
.pathpage::-webkit-scrollbar{width:4px}

.pathbadge{position:relative;display:inline-block;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:#00f5ff;border:1px solid #00f5ff44;border-radius:20px;padding:4px 15px;margin-bottom:12px;background:rgba(0,245,255,.05)}
.pathh1{position:relative;font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:#fff;text-shadow:0 0 16px #00f5ff77;letter-spacing:1px;margin-bottom:13px}
.pathguide{position:relative;font-size:12px;color:#a8d4e0;line-height:1.65;background:linear-gradient(135deg,rgba(0,245,255,.07),rgba(123,47,255,.07));border:1px solid #00f5ff22;border-radius:10px;padding:11px 14px;font-family:'Rajdhani',sans-serif;max-width:430px;margin:0 auto}
.pgroup{padding:0 14px;margin-bottom:22px}

.pgbar{width:4px;height:34px;border-radius:3px;flex-shrink:0;box-shadow:0 0 10px currentColor}
.pgicon{font-size:21px;line-height:1;flex-shrink:0}
.pginfo{flex:1;min-width:0}

.pcard{position:relative;display:flex;flex-direction:column;text-align:left;background:linear-gradient(160deg,#0e1a30,#0a1322);border:1px solid #ffffff12;border-top:2px solid var(--ac);border-radius:13px;padding:13px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#c8f0ff;min-height:152px;width:100%}

.pcard:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 10px 26px -10px var(--ac)}

.pcardlevel{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;color:var(--ac);opacity:.95;margin-bottom:7px}
.pcardicon{font-size:30px;line-height:1;margin-bottom:9px}
.pcardtitle{font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.2px;color:#fff;margin-bottom:4px;line-height:1.3}

.pcardgo{display:flex;align-items:center;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;color:var(--ac);border-top:1px solid #ffffff10;padding-top:9px}

.pathfoot{text-align:center;font-size:10px;color:#4a7a8a;font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin:10px 14px 0;padding-top:14px;line-height:1.6;border-top:1px solid #00f5ff1a}
/* ── inline key picker panel (spans full grid row) ── */
.pcard.active{border-color:var(--ac);box-shadow:0 0 24px -8px var(--ac);transform:translateY(-2px)}
.keypanel{background:linear-gradient(165deg,#0a1424,#070e1a);border:1px solid var(--ac,#00f5ff);border-radius:14px;padding:14px 13px;margin-top:10px;position:relative;overflow:hidden;animation:keyexpand .3s cubic-bezier(.2,.9,.3,1)}

.keybtn:active{transform:translateY(-1px) scale(.95)}
.keypanel-foot{text-align:center;font-size:9.5px;color:#4a7a8a;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;line-height:1.5}
