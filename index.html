จะถูกลบอัตโนมัติหลังจากผ่านไปประมาณ 18 เดือน สลิปการชำระเงินเก็บไว้เพื่อการตรวจสอบบัญชี/ภาษีตามระยะเวลาที่กฎหมายกำหนด แม้ในกรณีที่บัญชีถูกลบแล้ว"},{h:"เด็กและผู้เยาว์",p:"แอปนี้เปิดให้เด็กใช้งานได้ภายใต้การดูแล/ความยินยอมของผู้ปกครอง หากผู้เรียนอายุต่ำกว่าเกณฑ์ที่กำหนดตอนสมัคร เราจะขอข้อมูลติดต่อผู้ปกครองและเปิดใช้ฟีเจอร์ที่เกี่ยวข้องกับ AI/กล้องเต็มรูปแบบหลังจากยืนยันความยินยอมของผู้ปกครองแล้วเท่านั้น ผู้ปกครองสามารถขอดู แก้ไข หรือลบข้อมูลของบุตรหลานได้ตลอดเวลาโดยติดต่อเราตามช่องทางด้านล่าง"},{h:"สิทธิของคุณ",p:'คุณมีสิทธิขอเข้าถึง/รับสำเนาข้อมูลของคุณ (ปุ่ม "ดาวน์โหลดข้อมูลของฉัน" ในหน้าโปรไฟล์), ขอแก้ไขข้อมูลให้ถูกต้อง (แก้ได้เองในหน้าโปรไฟล์), ขอให้ลบข้อมูล/บัญชี (ปุ่ม "ลบบัญชีของฉัน" ในหน้าโปรไฟล์ หรือแจ้งเรา), ถอนความยินยอมที่ให้ไว้เมื่อใดก็ได้, และร้องเรียนต่อสำนักงานคณะกรรมการคุ้มครองข้อมูลส่วนบุคคล (สคส./PDPC) หากเห็นว่าเราไม่ปฏิบัติตามกฎหมาย'},{h:"ความปลอดภัย",p:"เราจำกัดสิทธิ์การเข้าถึงข้อมูลผู้ใช้ให้เฉพาะผู้ดูแลระบบที่ได้รับอนุญาต บันทึกการเข้าถึง/แก้ไข/ลบข้อมูลของผู้ดูแลระบบทุกครั้ง และเข้ารหัสการเชื่อมต่อทุกจุดด้วย HTTPS"},{h:"คุกกี้และการจัดเก็บข้อมูลในเครื่อง",p:"แอปเก็บสถานะการเข้าสู่ระบบและความคืบหน้าการเรียนบางส่วนไว้ใน local storage ของเบราว์เซอร์เพื่อให้แอปทำงานได้ (ไม่ใช่เพื่อโฆษณา/ติดตามข้ามเว็บไซต์) ข้อมูลเหล่านี้จะถูกล้างอัตโนมัติเมื่อคุณออกจากระบบ"},{h:"การเปลี่ยนแปลงนโยบาย",p:"หากมีการเปลี่ยนแปลงสาระสำคัญ เราจะแจ้งให้ทราบในแอปก่อนมีผลบังคับใช้"}],terms:[{h:"การยอมรับข้อกำหนด",p:"การสมัครและใช้งาน TiGA Piano AI ถือว่าคุณยอมรับข้อกำหนดนี้ หากสมัครในฐานะผู้เยาว์ ต้องได้รับความยินยอมจากผู้ปกครองตามที่ระบุในนโยบายความเป็นส่วนตัว"},{h:"คำอธิบายบริการ",p:"แอปให้บริการสอนเปียโนผ่าน AI แบบทดลองฟรี และแพลนเสียเงินที่ปลดล็อกเนื้อหา/ฟีเจอร์เพิ่มเติม เนื้อหาการสอนเป็นเครื่องมือช่วยเรียน ไม่ใช่การรับประกันผลลัพธ์การเรียนรู้"},{h:"บัญชีผู้ใช้",p:"คุณต้องให้ข้อมูลที่ถูกต้องตอนสมัคร และรับผิดชอบการดูแลบัญชีของตัวเอง"},{h:"แพลนและการชำระเงิน",p:"การชำระเงินผ่าน PromptPay จะได้รับการตรวจสอบก่อนปลดล็อกแพลน หากพบปัญหาการชำระเงินติดต่อเราได้ตามช่องทางด้านล่าง แพลนจะหมดอายุตามระยะเวลาที่ระบุไว้ตอนซื้อ"},{h:"การใช้งานที่ยอมรับได้",p:"ห้ามใช้แอปเพื่อส่งเนื้อหาที่ผิดกฎหมาย ล่วงละเมิด หรือพยายามเข้าถึงข้อมูลของผู้ใช้อื่นโดยไม่ได้รับอนุญาต"},{h:"ทรัพย์สินทางปัญญา",p:"เนื้อหาการสอน แบบฝึกหัด และซอฟต์แวร์เป็นทรัพย์สินของ Tiga Studio ห้ามคัดลอกหรือนำไปใช้เชิงพาณิชย์โดยไม่ได้รับอนุญาต"},{h:"ข้อจำกัดความรับผิด",p:"เราพยายามให้บริการอย่างต่อเนื่อง แต่ไม่รับประกันว่าจะไม่มีข้อผิดพลาดหรือระบบขัดข้อง"},{h:"การระงับ/ยกเลิกบัญชี",p:"เราขอสงวนสิทธิ์ระงับบัญชีที่ละเมิดข้อกำหนดนี้ และคุณสามารถลบบัญชีของตัวเองได้ตลอดเวลาผ่านหน้าโปรไฟล์"},{h:"กฎหมายที่ใช้บังคับ",p:"ข้อกำหนดนี้อยู่ภายใต้กฎหมายไทย"},{h:"ติดต่อเรา",p:za}]},en:{privacyTitle:"Privacy Policy",termsTitle:"Terms of Service",updated:"Last updated: July 2026",privacy:[{h:"Data controller",p:'TiGA Piano AI is operated by Tiga Studio ("we"), an AI piano-teaching app for students of all ages, including children. Contact us about your personal data at '+za},{h:"What we collect",p:"1) Account info: email, name, avatar (from Google), plus LINE ID/phone/Instagram if you choose to add them (optional). 2) Learning data: progress, practiced scales/chords, scores, streaks, and short recordings you make for AI feedback. 3) Chat messages with the AI teacher. 4) Photos you choose to take for the hand/posture-check feature (only when you use it). 5) Payment slip images when you buy a paid plan. 6) General usage data (e.g. which pages you open) to improve the app."},{h:"What we use it for",p:"Running your account and tracking learning progress, powering the AI teacher (answers, feedback, homework), verifying payments, sending reminders to come back and practice (if you enable them), and improving the app."},{h:"Who we share it with",p:"Chat messages, typed/spoken questions, payment-slip images, and hand/posture photos (only when that feature is used) are sent to Google's Gemini API for AI processing. Account and progress data is stored with Supabase (our database provider). Google sign-in uses basic profile info as permitted by Google. Some lesson videos are embedded from Google Drive. We never sell your data."},{h:"International data transfer",p:"The providers above (Google, Supabase) run servers outside Thailand, so using this app means some of your data may be processed abroad, under those providers' own data-protection standards."},{h:"Retention",p:"Account and progress data is kept while your account is active. General usage logs are automatically deleted after about 18 months. Payment slips are kept for accounting/tax purposes for as long as required by law, even if the account is later deleted."},{h:"Children",p:"This app can be used by children under a parent/guardian's supervision and consent. If a learner declares an age under our threshold at signup, we ask for a parent's contact info and only fully enable AI/camera features after parental consent is confirmed. Parents can request access to, correction of, or deletion of their child's data at any time via the contact below."},{h:"Your rights",p:`You can request a copy of your data ("Download my data" in your profile), correct it (edit it directly in your profile), request deletion ("Delete my account" in your profile, or contact us), withdraw consent at any time, and file a complaint with Thailand's Personal Data Protection Committee (PDPC) if you believe we haven't complied with the law.`},{h:"Security",p:"We restrict access to user data to authorized admins only, log every admin view/change/deletion of user data, and encrypt all connections with HTTPS."},{h:"Cookies & local storage",p:"The app stores your sign-in state and some learning progress in your browser's local storage so the app works properly — not for advertising or cross-site tracking. This is cleared automatically when you sign out."},{h:"Changes to this policy",p:"We'll notify you in-app before any material change takes effect."}],terms:[{h:"Acceptance",p:"By creating an account and using TiGA Piano AI you agree to these terms. If you're a minor, a parent/guardian's consent is required as described in the Privacy Policy."},{h:"The service",p:"A free trial plus paid plans that unlock more content/features. Lessons are a learning aid, not a guarantee of learning outcomes."},{h:"Your account",p:"You must provide accurate signup information and are responsible for keeping your account secure."},{h:"Plans & payment",p:"PromptPay payments are verified before a plan is unlocked. Contact us below for payment issues. Plans expire per the duration shown at purchase."},{h:"Acceptable use",p:"Don't use the app to send unlawful or abusive content, or to access other users' data without authorization."},{h:"Intellectual property",p:"Lesson content, exercises, and the software belong to Tiga Studio. Don't copy or commercially reuse them without permission."},{h:"Limitation of liability",p:"We aim for continuous service but don't guarantee it will be error- or outage-free."},{h:"Suspension & termination",p:"We may suspend accounts that violate these terms. You can delete your own account any time from your profile."},{h:"Governing law",p:"These terms are governed by Thai law."},{h:"Contact",p:za}]},zh:{privacyTitle:"隐私政策",termsTitle:"使用条款",updated:"最近更新：2026年7月",privacy:[{h:"数据控制者",p:'TiGA Piano AI 由 Tiga Studio（"我们"）运营，是一款面向各年龄段学员（包括儿童）的 AI 钢琴教学应用。如需咨询个人数据相关事宜，请联系 '+za},{h:"我们收集的信息",p:"1）账号信息：邮箱、姓名、头像（来自 Google），以及您自愿填写的 LINE ID/电话/Instagram（非必填）。2）学习数据：学习进度、练习的音阶/和弦、分数、连续学习天数，以及您为获得 AI 点评而录制的短音频。3）与 AI 老师的聊天内容。4）您主动拍摄用于检查手型/坐姿的照片（仅在您使用该功能时）。5）购买付费套餐时上传的付款凭证图片。6）一般使用数据（如访问的页面），用于改进应用。"},{h:"用途",p:"管理账号并追踪学习进度、驱动 AI 老师（问答、点评、作业批改）、核实付款、发送练习提醒（如您开启此功能），以及改进应用体验。"},{h:"我们会与谁共享",p:"聊天内容、打字/语音提问、付款凭证图片，以及手型/坐姿照片（仅在使用该功能时）会被发送至 Google 的 Gemini API 进行 AI 处理。账号与学习进度数据存储在 Supabase（我们使用的数据库服务商）。Google 登录仅使用 Google 允许范围内的基本资料。部分课程视频通过 Google Drive 嵌入播放。我们绝不出售您的数据。"},{h:"跨境数据传输",p:"上述服务商（Google、Supabase）的服务器位于泰国境外，因此使用本应用意味着您的部分数据可能在境外按其自身的数据保护标准进行处理。"},{h:"数据保留期限",p:"账号与学习进度数据将在账号有效期间保留。一般使用日志会在约 18 个月后自动删除。付款凭证将按法律规定的会计/税务留存期限保留，即使账号已被删除。"},{h:"儿童隐私",p:"本应用允许儿童在家长/监护人监督和同意下使用。若学员在注册时申报年龄低于设定门槛，我们会索取家长联系方式，并仅在确认家长同意后才完全开放 AI/摄像头相关功能。家长可随时通过下方联系方式申请查看、更正或删除其子女的数据。"},{h:"您的权利",p:'您有权申请获取您的数据副本（个人资料页的"下载我的数据"）、更正数据（可在个人资料页直接修改）、申请删除数据/账号（个人资料页的"删除我的账号"，或联系我们）、随时撤回已给予的同意，并在认为我们未依法处理数据时向泰国个人数据保护委员会（PDPC）投诉。'},{h:"安全措施",p:"我们仅允许获得授权的管理员访问用户数据，记录管理员每一次查看/修改/删除用户数据的操作，并对所有连接使用 HTTPS 加密。"},{h:"Cookie 与本地存储",p:"应用会在浏览器本地存储中保存登录状态和部分学习进度，以确保应用正常运行——并非用于广告或跨站追踪。这些数据会在您退出登录时自动清除。"},{h:"政策变更",p:"如有重大变更，我们会在生效前于应用内通知您。"}],terms:[{h:"条款接受",p:"创建账号并使用 TiGA Piano AI 即表示您同意本条款。若您是未成年人，需按隐私政策所述获得家长/监护人同意。"},{h:"服务说明",p:"提供免费试用及可解锁更多内容/功能的付费套餐。课程内容为学习辅助工具，不保证具体学习成果。"},{h:"您的账号",p:"您须在注册时提供准确信息，并对账号安全自行负责。"},{h:"套餐与付款",p:"PromptPay 付款将在解锁套餐前进行核实。付款问题请通过下方联系方式联系我们。套餐将按购买时显示的期限到期。"},{h:"可接受使用范围",p:"禁止使用本应用发送违法或辱骂性内容，或未经授权访问其他用户的数据。"},{h:"知识产权",p:"课程内容、练习及软件归 Tiga Studio 所有，未经许可不得复制或用于商业用途。"},{h:"责任限制",p:"我们致力于持续提供服务，但不保证服务不出现错误或中断。"},{h:"暂停与终止",p:"我们可暂停违反本条款的账号。您可随时在个人资料页删除自己的账号。"},{h:"适用法律",p:"本条款受泰国法律管辖。"},{h:"联系我们",p:za}]}};function cu({lang:t,kind:e,onClose:n}){const r=a1[t]||a1.en,s=e==="terms"?r.termsTitle:r.privacyTitle,a=e==="terms"?r.terms:r.privacy;return i.jsxs("div",{className:"legaldoc",children:[i.jsxs("div",{className:"legaldoc-hdr",children:[i.jsxs("button",{className:"legaldoc-back",onClick:n,children:["‹ ",t==="th"?"กลับ":t==="zh"?"返回":"Back"]}),i.jsx("span",{className:"legaldoc-title",children:s})]}),i.jsxs("div",{className:"legaldoc-body",children:[i.jsx("div",{className:"legaldoc-updated",children:r.updated}),a.map((o,l)=>i.jsxs("div",{className:"legaldoc-sec",children:[i.jsx("h4",{children:o.h}),i.jsx("p",{children:o.p})]},l))]})]})}function nA(){const[t,e]=g.useState(null),n=g.useRef(null),[r,s]=g.useState(null),a=o=>{e(o),clearTimeout(n.current),n.current=setTimeout(()=>e(null),1400)};return r?i.jsx(cu,{lang:"th",kind:r,onClose:()=>s(null)}):i.jsxs("div",{className:"tg",children:[i.jsx("div",{className:"scan"}),i.jsxs("div",{className:"loginhero",children:[i.jsx("div",{className:"lbo
