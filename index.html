5️⃣ Half-Diminished (m7♭5) — 1-♭3-♭5-♭7

6️⃣ Diminished 7 (dim7) — 1-♭3-♭5-♭♭7

7️⃣ Augmented 7 (7♯5) — 1-3-♯5-♭7

 Chords' on piano. Explain what C/E means, creating smooth bass lines, and usage in Gospel/Soul/Ballad. List note names.",zh:"请教我钢琴上的'斜线和弦(Slash Chord)'。解释C/E是什么、创建流畅的低音线，以及在福音/灵魂/抒情中的运用。列出音名。"}},{id:"padchord",icon:"🌫️",title:{th:"แพดคอร์ด (Pad Chord)",en:"Pad Chord",zh:"铺底和弦 (Pad Chord)"},subtitle:{th:"Harmony ขั้นสูง — เสียงพื้นหลังที่ลอย",en:"Advanced harmony — floating background",zh:"高级和声 — 漂浮的背景音"},level:8,color:"#b8c0ff",group:"advanced",demo:["C4","G4","B4","D5","E5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'แพดคอร์ด (Pad Chord)' และ voicing ขั้นสูงบนเปียโนให้หน่อยครับ อธิบาย open voicing การกระจายโน้ตแบบ 4th/5th และการใช้ใน EDM/Ambient/Neo Soul เพื่อสร้างบรรยากาศล้ำๆ ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Pad Chords' and advanced voicing on piano. Explain open voicing, spreading notes in 4ths/5ths, and usage in EDM/Ambient/Neo Soul. List note names.",zh:"请教我钢琴上的'铺底和弦(Pad Chord)'和高级配置。解释开放配置、以4度/5度分散音符，以及在EDM/氛围/新灵魂乐中的运用。列出音名。"}},{id:"why-music",icon:"🌍",level:9,color:"#ffd166",group:"benefits",title:{th:"ประโยชน์ของดนตรี",en:"Why Music Matters",zh:"音乐的力量"},subtitle:{th:"ทำไมดนตรีถึงทรงพลัง",en:"The power of music",zh:"为何音乐如此重要"},content:{th:`🌍 ดนตรีไม่ใช่แค่ความบันเทิง แต่เป็นเครื่องมือที่ส่งผลต่อสมอง อารมณ์ เศรษฐกิจ และสังคม

🧠 ต่อสมองและอารมณ์
• กระตุ้นการหลั่งโดพามีน (สารแห่งความสุข) และลดฮอร์โมนความเครียด cortisol
• ช่วยความจำ สมาธิ และการเรียนรู้ — เด็กที่เล่นดนตรีมักมีพัฒนาการด้านภาษาและคณิตศาสตร์ดีขึ้น

🤝 ต่อสังคม
• สร้างความรู้สึกเป็นอันหนึ่งอันเดียวกัน ปลุกอารมณ์ร่วมของคนหมู่มาก
• เป็น "ภาษาสากล" ที่สื่อสารข้ามวัฒนธรรมและพรมแดน

ใน 5 บทถัดไป เราจะดูว่ามนุษย์ใช้ดนตรีจริงอย่างไรใน: ธุรกิจ 💼 · การทหาร 🎺 · ความเป็นชาติ 🇹🇭 · ชนชั้นสูง 👑 · และการบำบัดรักษา 💚`,en:`🌍 Music is not just entertainment — it shapes the brain, emotions, the economy and society.

🧠 Brain & emotion
• Triggers dopamine (the "feel-good" chemical) and lowers the stress hormone cortisol
• Boosts memory, focus and learning — kids who play music often gain language and math skills

🤝 Society
• Builds unity and stirs the shared emotion of large crowds
• A "universal language" that crosses cultures and borders

In the next 5 chapters we'll see how people really use music in: Business 💼 · the Military 🎺 · National identity 🇹🇭 · the Elite 👑 · and Healing 💚`,zh:`🌍 音乐不只是娱乐，它影响大脑、情绪、经济与社会。

🧠 大脑与情绪
• 促进多巴胺（快乐物质）分泌，降低压力激素皮质醇
• 提升记忆、专注与学习——学音乐的孩子常在语言和数学上更出色

🤝 社会
• 凝聚人心，激发群体共同的情感
• 是跨越文化与国界的"世界语言"

接下来5章，我们将看人类如何真正运用音乐：商业 💼 · 军事 🎺 · 国家认同 🇹🇭 · 精英阶层 👑 · 与疗愈 💚`}},{id:"music-business",icon:"💼",level:10,color:"#06d6a0",group:"benefits",title:{th:"ดนตรีกับธุรกิจ",en:"Music in Business",zh:"音乐与商业"},subtitle:{th:"เสียงที่ขายของได้",en:"Sound that sells",zh:"会卖货的声音"},content:{th:`💼 เสียงสร้างยอดขายและแบรนด์ได้จริง

🛒 เพลงในร้าน = ยอดขาย
งานวิจัยคลาสสิกของ Milliman (1982): เปิดเพลงจังหวะช้าในซูเปอร์มาร์เก็ต ทำให้ลูกค้าเดินช้าลง อยู่นานขึ้น ยอดขายเพิ่มถึง ~38% ในร้านอาหาร เพลงช้าทำให้ลูกค้านั่งนานและสั่งเครื่องดื่มมากขึ้น

🔔 Sonic Branding (โลโก้เสียง)
• Intel เสียง 4 โน้ต มูลค่าแบรนด์กว่า 200 ล้านดอลลาร์
• Mastercard สร้างเสียง 6 โน้ตที่ดังทุกครั้งที่จ่ายเงิน (2019)
• McDonald's "I'm Lovin' It" — แบรนด์ที่มี sonic logo จดจำได้สูงขึ้นถึง 8 เท่า

🌎 ระดับโลก: Coca-Cola, Apple, Spotify ใช้ดนตรีเป็นหัวใจการตลาด

🇹🇭 ไทย: วงร็อก "คาราบาว" ต่อยอดเป็นเครื่องดื่มชูกำลัง Carabao Daeng จนได้สปอนเซอร์ฟุตบอลอังกฤษ (Carabao Cup) — เปลี่ยนชื่อเสียงทางดนตรีเป็นแบรนด์ระดับโลก

🇨🇳 จีน: เพลงธีม "蜜雪冰城 (Mixue)" ปี 2021 (ดัดแปลงจาก Oh! Susanna) ไวรัลสุดขีด แฮชแท็กบน Douyin/TikTok ทะลุ 1.58 พันล้านครั้ง ดันแบรนด์ชานม-ไอศกรีมโตทั่วเอเชีย

💡 สรุป: เสียง → อารมณ์ → การตัดสินใจซื้อ`,en:`💼 Sound really drives sales and brand power.

🛒 In-store music = sales
The classic Milliman (1982) study: slow-tempo music in a supermarket made shoppers linger and lifted sales by ~38%. In restaurants, slow music keeps guests longer and they order more drinks.

🔔 Sonic branding (audio logos)
• Intel's 4-note tune is worth over $200 million in brand value
• Mastercard built a 6-note sound that plays on every payment (2019)
• McDonald's "I'm Lovin' It" — brands with a sonic logo are recalled up to 8× better

🌎 Global: Coca-Cola, Apple and Spotify put music at the heart of marketing.

🇹🇭 Thailand: rock band "Carabao" became the Carabao Daeng energy drink and now sponsors English football's Carabao Cup — turning musical fame into a global brand.

🇨🇳 China: the "Mixue" theme song (2021, adapted from Oh! Susanna) went viral with 1.58 billion plays under Douyin/TikTok hashtags, fueling the tea-and-ice-cream chain across Asia.

💡 Takeaway: sound → emotion → buying decision.`,zh:`💼 声音确实能带动销售与品牌力。

🛒 店内音乐 = 销售额
经典的 Milliman（1982）研究：超市播放慢节奏音乐让顾客停留更久，销售额提升约38%。餐厅里慢音乐让客人坐得更久、点更多饮品。

🔔 声音品牌（听觉标志）
• 英特尔的4音旋律品牌价值超2亿美元
• 万事达卡打造每次付款都会响起的6音之声（2019）
• 麦当劳"I'm Lovin' It"——拥有声音标志的品牌记忆度可高出8倍

🌎 全球：可口可乐、苹果、Spotify 都把音乐作为营销核心。

🇹🇭 泰国：摇滚乐队"Carabao（卡拉宝）"延伸成卡拉宝能量饮料，如今赞助英格兰联赛杯（Carabao Cup）——把音乐名气变成全球品牌。

🇨🇳 中国："蜜雪冰城"主题曲（2021，改编自《哦！苏珊娜》）爆红，抖音/TikTok 话题播放量超15.8亿次，推动这家茶饮冰淇淋品牌火遍亚洲。

💡 要点：声音 → 情绪 → 购买决定。`}},{id:"music-military",icon:"🎺",level:11,color:"#e76f51",group:"benefits",title:{th:"ดนตรีในกองทัพ",en:"Music in the Military",zh:"军队中的音乐"},subtitle:{th:"สั่งการ ปลุกใจ ข่มขวัญ",en:"Command, morale, intimidation",zh:"指挥·士气·震慑"},content:{th:`🎺 กองทัพใช้ดนตรีมานานนับพันปี

📡 สื่อสารและสั่งการ
ในอดีต กลอง แตร และปี่ ใช้ส่งสัญญาณในสนามรบ เสียงเดินทางไกลและสั่งการทหารจำนวนมากให้เคลื่อนพร้อมกัน (เช่น แตรปลุก แตรโจมตี แตรถอย)

🥁 ขวัญและความสามัคคี
วงดุริยางค์ทหารและการ "นับจังหวะเดิน" (cadence) ทำให้หน่วยเดินพร้อมเพรียง ฮึกเหิม และรู้สึกเป็นหนึ่งเดียว

🎶 ปี่สก็อต (Bagpipes)
กรมทหารสก็อตเป่าปี่นำทัพเข้าสู้ สร้างขวัญฝ่ายตนและข่มขวัญศัตรู โดดเด่นมากในสงครามโลกครั้งที่ 1

🔊 สงครามจิตวิทยา
กองทัพยุคใหม่เคยเปิดเพลงเสียงดังกดดันศัตรู เช่น ปฏิบัติการกดดันนายพลโนรีเอกาที่ปานามา ปี 1989

💡 สรุป: ดนตรี = เครื่องมือบังคับบัญชา ขวัญกำลังใจ และจิตวิทยา`,en:`🎺 Armies have used music for thousands of years.

📡 Communication & command
Drums, bugles and fifes once carried orders across the battlefield — sound travels far and moves large numbers of troops together (wake-up, charge, retreat calls).

🥁 Morale & cohesion
Military bands and marching "cadence" calls keep units in step, fired up, and feeling as one.

🎶 Bagpipes
Scottish regiments piped their troops into battle to lift their own morale and unnerve the enemy — famously in World War I.

🔊 Psychological warfare
Modern armies have blasted loud music to pressure opponents — e.g. the operation against General Noriega in Panama, 1989.

💡 Takeaway: music = a tool of command, morale and psychology.`,zh:`🎺 军队使用音乐已有数千年。

📡 通信与指挥
古时鼓、号、笛在战场上传递命令——声音传得远，能让大批士兵同步行动（起床号、冲锋号、撤退号）。

🥁 士气与凝聚
军乐队和行进"口令节奏"(cadence) 让队伍步伐一致、斗志高昂、融为一体。

🎶 苏格兰风笛
苏格兰军团吹着风笛冲锋，既鼓舞己方又震慑敌人——一战中尤为著名。

🔊 心理战
现代军队曾用高音量音乐施压对手——例如1989年巴拿马针对诺列加将军的行动。

💡 要点：音乐 = 指挥、士气与心理的工具。`}},{id:"music-nation",icon:"🇹🇭",level:12,color:"#118ab2",group:"benefits",title:{th:"ดนตรีกับความเป็นชาติ",en:"Music & National Identity",zh:"音乐与国家认同"},subtitle:{th:"เสียงที่หลอมรวมผู้คน",en:"Sound that unites a people",zh:"凝聚人民的声音"},content:{th:`🇹🇭 ดนตรีสร้าง "สำนึกร่วม" ของคนทั้งชาติ

🎵 เพลงชาติ
เครื่องมือสร้างความเป็นชาติที่ทรงพลังที่สุด ประเทศไทยเปิดเพลงชาติทุกวันเวลา 08:00 และ 18:00 ทั่วประเทศ และมีเพลงสรรเสริญพระบารมีในโรงภาพยนตร์

🔥 ปฏิวัติและรวมชาติ
• "La Marseillaise" จุดไฟการปฏิวัติฝรั่งเศส
• "Va, pensiero" ของแวร์ดี กลายเป็นเพลงปลุกใจรวมชาติอิตาลี
• "Finlandia" ของซิเบลิอุส สัญลักษณ์การต่อสู้เพื่อเอกราชของฟินแลนด์

🇨🇳 จีน: เพลงชาติ "义勇军进行曲 (March of the Volunteers)" มาจากภาพยนตร์ปี 1935 เป็นเพลงปลุกใจต้านการรุกราน

🌟 ยุคใหม่: K-pop (เช่น BTS) กลายเป็น "soft power" สร้างภาพลักษณ์และรายได้มหาศาลให้เกาหลีใต้

💡 สรุป: ดนตรีทำให้ผู้คนรู้สึกเป็น "พวกเดียวกัน"`,en:`🇹🇭 Music forges a shared sense of nationhood.

🎵 National anthems
The most powerful nation-building tool. Thailand plays its anthem nationwide every day at 08:00 and 18:00, and the Royal Anthem in cinemas.

🔥 Revolution & unification
• "La Marseillaise" lit the fire of the French Revolution
• Verdi's "Va, pensiero" became a rallying song for Italian unification
• Sibelius's "Finlandia" symbolized Finland's fight for independence

🇨🇳 China: the anthem "March of the Volunteers" came from a 1935 film — a song of resistance.

🌟 Today: K-pop (e.g. BTS) is "soft power," building South Korea's image and huge revenue.

💡 Takeaway: music makes people feel they belong to one another.`,zh:`🇹🇭 音乐铸就全民共同的"国家感"。

🎵 国歌
最有力的国家建构工具。泰国每天08:00与18:00全国播放国歌，影院里播放颂圣歌。

🔥 革命与统一
• 《马赛曲》点燃法国大革命
• 威尔第《飞吧，思想》成为意大利统一的号召之歌
• 西贝柳斯《芬兰颂》象征芬兰争取独立的抗争

🇨🇳 中国：国歌《义勇军进行曲》源自1935年电影，是抗争之歌。

🌟 当代：K-pop（如 BTS）成为"软实力"，为韩国塑造形象并带来巨大收益。

💡 要点：音乐让人们感到彼此同属一体。`}},{id:"music-elite",icon:"👑",level:13,color:"#9d4edd",group:"benefits",title:{th:"ดนตรีกับชนชั้นสูง",en:"Music & the Elite",zh:"音乐与精英阶层"},subtitle:{th:"สัญลักษณ์ของอำนาจและรสนิยม",en:"A symbol of power and taste",zh:"权力与品味的象征"},content:{th:`👑 ดนตรีเป็นเครื่องแสดงสถานะของชนชั้นสูงมาช้านาน

🎼 ระบบอุปถัมภ์ (Patronage)
ในยุโรป ขุนนางและราชสำนักเลี้ยงดูคีตกวี เช่น ไฮเดิน รับใช้ราชวงศ์ Esterházy; โมสาร์ทและเบโทเฟนพึ่งพาชนชั้นสูงเวียนนา การมีคีตกวีประจำตัวคือเครื่องแสดงรสนิยมและอำนาจ

🇫🇷 ราชสำนักฝรั่งเศส
พระเจ้าหลุยส์ที่ 14 (Sun King) ทรงเต้นบัลเลต์เอง และใช้ดนตรี-นาฏศิลป์ที่พระราชวังแวร์ซายแสดงพระราชอำนาจ

🇹🇭 ไทย
ดนตรีในราชสำนัก (วงปี่พาทย์) สืบทอดยาวนาน และในหลวงรัชกาลที่ 9 ทรงเป็นคีตกวีแจ๊สที่โลกยอมรับ พระราชนิพนธ์ เช่น "สายฝน" และ "H.M. Blues"

🇨🇳 จีน
"雅乐 (yayue)" ดนตรีพิธีในราชสำนัก และ "กู่ฉิน (guqin)" เครื่องดนตรีของปราชญ์และผู้ดีจีน ใช้ขัดเกลาจิตใจให้สูงส่ง

💡 สรุป: ดนตรี = สัญลักษณ์ของอำนาจ การศึกษา และรสนิยมชั้นสูง`,en:`👑 Music has long signaled the status of the elite.

🎼 The patronage system
In Europe, nobles and courts employed composers — Haydn served the Esterházy princes; Mozart and Beethoven relied on Vienna's aristocracy. Keeping a composer showed taste and power.

🇫🇷 The French court
Louis XIV, the "Sun King," danced ballet himself and used music and dance at Versailles to display royal power.

🇹🇭 Thailand
Royal court music (piphat ensembles) has a long lineage, and King Rama IX (Bhumibol) was a world-respected jazz composer — works like "Falling Rain (Saiyon)" and "H.M. Blues."

🇨🇳 China
"Yayue" ritual court music, and the "guqin" — the instrument of scholars and gentlemen, used to refine the mind.

💡 Takeaway: music = a symbol of power, education and refined taste.`,zh:`👑 音乐长久以来彰显精英阶层的地位。

🎼 赞助制度
在欧洲，贵族与宫廷供养作曲家——海顿为埃斯特哈齐家族服务；莫扎特、贝多芬依赖维也纳贵族。拥有专属作曲家象征品味与权力。

🇫🇷 法国宫廷
"太阳王"路易十四亲自跳芭蕾，并在凡尔赛宫以音乐舞蹈彰显王权。

🇹🇭 泰国
宫廷音乐（披帕乐团）传承悠久；泰国九世王（普密蓬）是受世界尊敬的爵士作曲家，作品如《Falling Rain（สายฝน）》与《H.M. Blues》。

🇨🇳 中国
"雅乐"为宫廷礼仪音乐；"古琴"是文人雅士的乐器，用以修身养性。

💡 要点：音乐 = 权力、教养与高雅品味的象征。`}},{id:"music-therapy",icon:"💚",level:14,color:"#2a9d8f",group:"benefits",title:{th:"ดนตรีบำบัด",en:"Music Therapy",zh:"音乐疗法"},subtitle:{th:"เยียวยากาย ใจ และสมอง",en:"Healing & wellness",zh:"疗愈与健康"},content:{th:`💚 ดนตรีคือ "ยา" ที่ช่วยกาย ใจ และสมอง

🏥 เป็นวิชาชีพการแพทย์จริง
ดนตรีบำบัด (Music Therapy) มีสมาคมวิชาชีพ (เช่น AMTA) และใช้ในโรงพยาบาลทั่วโลก

🧠 ฟื้นฟูสมอง
• ผู้ป่วยหลอดเลือดสมองที่พูดไม่ได้ (aphasia) ใช้ "Melodic Intonation Therapy" ร้องเป็นทำนองเพื่อกลับมาพูด
• ผู้ป่วยพาร์กินสันใช้จังหวะดนตรีช่วยให้เดินมั่นคงขึ้น

💭 ความจำ
ผู้ป่วยอัลไซเมอร์/สมองเสื่อม มักจำเพลงเก่าได้ และตอบสนองดีขึ้นเมื่อได้ฟังเพลงในวัยหนุ่มสาว

😌 ลดเครียดและความเจ็บปวด
ดนตรีลดฮอร์โมน cortisol ความดันโลหิต และความวิตกกังวล จึงใช้ก่อน/ระหว่างผ่าตัด และดูแลทารกคลอดก่อนกำหนด (NICU)

🌟 ตัวอย่างจริง: ส.ส.สหรัฐ Gabby Giffords ฟื้นความสามารถในการพูดด้วยดนตรีบำบัดหลังถูกยิงที่ศีรษะ

💡 สรุป: ดนตรีคือยาไร้ผลข้างเคียงที่เยียวยาทั้งร่างกายและจิตใจ`,en:`💚 Music is "medicine" for body, mind and brain.

🏥 A real medical profession
Music therapy has professional bodies (e.g. AMTA) and is used in hospitals worldwide.

🧠 Brain recovery
• Stroke patients who can't speak (aphasia) use "Melodic Intonation Therapy" — singing words back into speech
• Parkinson's patients use musical rhythm to walk more steadily

💭 Memory
People with Alzheimer's/dementia often still remember old songs and respond better to music from their youth.

😌 Less stress & pain
Music lowers cortisol, blood pressure and anxiety — used before/during surgery and in newborn intensive care (NICU).

🌟 Real case: U.S. Congresswoman Gabby Giffords regained her speech through music therapy after being shot in the head.

💡 Takeaway: music is a side-effect-free medicine that heals body and mind.`,zh:`💚 音乐是身、心、脑的"良药"。

🏥 真正的医疗专业
音乐疗法有专业协会（如 AMTA），在全球医院中应用。

🧠 大脑康复
• 无法说话的中风（失语症）患者用"旋律语调疗法"，把词语唱回成语言
• 帕金森患者借助音乐节奏让步态更稳

💭 记忆
阿尔茨海默/失智患者常仍记得老歌，听到年轻时的音乐反应更好。

😌 减压与止痛
音乐降低皮质醇、血压与焦虑——用于手术前后及新生儿重症监护（NICU）。

🌟 真实案例：美国国会议员 Gabby Giffords 头部中枪后，通过音乐疗法重新恢复了说话能力。

💡 要点：音乐是没有副作用的良药，疗愈身心。`}},{id:"music-marketing",icon:"📣",level:15,color:"#ff6ec7",group:"benefits",title:{th:"การตลาดสำหรับศิลปิน",en:"Marketing for Artists",zh:"音乐人营销"},subtitle:{th:"ทำเพลงให้ดังและขายได้",en:"Get heard & get paid",zh:"让作品被听见并变现"},content:{th:`📣 ยุคนี้ "เก่งอย่างเดียวไม่พอ" — ต้องทำให้คนได้ยินและรักคุณด้วย

🎯 หัวใจ 3 ข้อ
• สร้างฐานแฟน (fanbase) ที่ผูกพัน ไม่ใช่แค่ยอดวิว
• เลือกแพลตฟอร์มให้ถูก — TikTok/Reels คือเครื่องมือค้นพบเบอร์ 1 ของยุคนี้
• หารายได้หลายทาง: สตรีม + ทัวร์ + สินค้า (merch) + แฟนคลับโดยตรง

💸 ความจริงเรื่องเงิน
สตรีมมิ่งจ่ายน้อยมาก (ต่อสตรีม ~$0.003–0.005) ศิลปินยุคใหม่จึงโตด้วย "แฟนตัวจริง" ที่ยอมจ่าย — ทัวร์ เสื้อ ของสะสม และช่องทางตรงถึงแฟน

👉 แตะกรณีศึกษาด้านล่างเพื่อดูว่าศิลปินระดับโลกทำการตลาดยังไง`,en:`📣 Today, talent alone isn't enough — you must be heard and loved too.

🎯 Three essentials
• Build a real, bonded fanbase, not just view counts
• Pick the right platform — short video (TikTok/Reels) is today's #1 discovery engine
• Earn from many streams: streaming + touring + merch + direct-to-fan

💸 The money truth
Streaming pays very little (~$0.003–0.005 per stream), so modern artists grow on TRUE fans who pay — tours, shirts, collectibles and direct channels.

👉 Tap a case study below to see how world-class artists market themselves.`,zh:`📣 如今光有才华还不够——还必须被听见、被喜爱。

🎯 三大要点
• 打造真正有黏性的粉丝群，而不只是播放量
• 选对平台——短视频（TikTok/Reels）是当今头号发现引擎
• 多元收入：流媒体 + 巡演 + 周边 + 直接面向粉丝

💸 关于钱的真相
流媒体单次播放收入极低（约 $0.003–0.005），所以现代音乐人靠"真爱粉"变现——巡演、T恤、收藏品与直连渠道。

ปี 1977 ยาน Voyager พกแผ่นเสียงทองคำออกไปนอกระบบสุริยะ บรรจุเสียงที่เป็นตัวแทนของโลก
• มีดนตรีของ Bach, Beethoven, Chuck Berry และดนตรีพื้นเมืองทั่วโลก

In 1977, Voyager carried a Golden Record beyond the solar system to represent Earth.
• It holds Bach, Beethoven, Chuck Berry and folk music worldwide
• Music was chosen as a "universal language" for any life that finds it
💡 Of everything on Earth, we sent music to space.`,zh:`🛰️ 人类致宇宙的讯息
1977年，旅行者号带着金唱片飞出太阳系，代表地球。
• 收录巴赫、贝多芬、查克·贝里及世界各地的民族音乐
• 音乐被选为可能与外星生命沟通的"世界语言"
💡 地球万物之中，我们选择把音乐送上太空。`}},{id:"mozarteffect",icon:"🧠",title:{th:"Mozart Effect: จริงหรือมายา",en:"The Mozart Effect",zh:"莫扎特效应"},content:{th:`🧠 ฟังโมสาร์ทแล้วฉลากขึ้น?
• ความเชื่อ: ฟังเพลงโมสาร์ทแล้วไอคิวสูงขึ้น — งานวิจัยต้นฉบับ (1993) ถูกขยายเกินจริง ผลแค่ชั่วคราวและเล็กน้อย
• ความจริง: การ "เล่น/เรียน" ดนตรีต่างหากที่เปลี่ยนสมองจริง — เพิ่มความจำ สมาธิ ภาษา และการประสานมือ-ตา
💡 อย่าแค่ฟัง — ลงมือเล่น สมองถึงจะโตจริง`,en:`🧠 Does Mozart make you smarter?
• Myth: just listening raises IQ — the 1993 study was overhyped; the effect was tiny and temporary
• Reality: LEARNING/playing music truly rewires the brain — memory, focus, language and coordination
💡 Don't just listen — play. That's what grows the brain.`,zh:`🧠 听莫扎特会变聪明吗？
• 误解：光听就提高智商——1993年的研究被过度夸大，效果短暂且微弱
• 真相：真正"学/弹"音乐才会重塑大脑——提升记忆、专注、语言与协调
💡 别只听——动手弹，大脑才真正成长。`}}],"music-business":[{id:"intel",icon:"🔔",title:{th:"Intel 4 โน้ต",en:"Intel's 4 notes",zh:"英特尔4音"},content:{th:`🔔 เสียง 4 โน้ตที่ดังที่สุดในโลก

💡 极短的声音标志＝一生的记忆。`}},{id:"mixue",icon:"🍦",title:{th:"Mixue ชานมจีน",en:"Mixue (China)",zh:"蜜雪冰城"},content:{th:`🍦 เพลงเดียวดันแบรนด์โต 30,000+ สาขา

💡 ชื่อเสียงทางดนตรี = สินทรัพย์แบรนด์ที่ต่อยอดได้มหาศาล`,en:`🐃 From a rock band to an English football sponsor

• Extended into the Carabao Daeng energy drink
• Bought naming rights to England's "Carabao Cup" — global fame
💡 Musical fame is a brand asset you can build an empire on.`,zh:`🐃 从摇滚乐队到英格兰足球赞助商
• "卡拉宝"是泰国著名摇滚乐队
• 延伸出卡拉宝能量饮料
• 买下英格兰联赛杯冠名权"Carabao Cup"——闻名全球
💡 音乐名气是可发展成帝国的品牌资产。`}},{id:"mastercard",icon:"💳",title:{th:"Mastercard Sonic",en:"Mastercard Sonic",zh:"万事达声音品牌"},content:{th:`💳 เสียงที่ดังทุกครั้งที่จ่ายเงิน
• ปี 2019 Mastercard เปิดตัว "sonic brand" — เสียงสั้น ๆ ที่เล่นตอนจ่ายเงินสำเร็จทั่วโลก
• สร้างความรู้สึกมั่นใจ-ปลอดภัยในเสี้ยววินาที
• งานวิจัยชี้ แบรนด์ที่มี sonic logo ถูกจดจำมากขึ้นถึง ~8 เท่า
💡 แม้แต่ "เสียงจ่ายเงิน" ก็เป็นการตลาด`,en:`💳 The sound of every payment
• In 2019 Mastercard launched a "sonic brand" — a short sound at successful checkout worldwide
• Creates trust and reassurance in a split second
• Brands with a sonic logo are recalled up to ~8× more
💡 Even a payment sound is marketing.`,zh:`💳 每次付款都会响起的声音
• 2019年万事达推出"声音品牌"——全球付款成功时的短促之声
• 在一瞬间营造信任与安心
• 拥有声音标志的品牌记忆度可高出约8倍
💡 连"付款声"都是营销。`}}],"music-military":[{id:"bagpipes",icon:"🎻",title:{th:"ปี่สก็อต อาวุธสงคราม",en:"Bagpipes of war",zh:"苏格兰风笛"},content:{th:`🎻 เครื่องดนตรีที่ถูกขึ้นบัญชี "อาวุธ"
• นักเป่าปี่สก็อต (piper) นำหน้าทหารเข้าสนามรบ เสียงปลุกใจฝ่ายตน-ข่มขวัญศัตรู
• ในสงคราม เสียงปี่ดังทะลุเสียงปืน ทำให้ทหารไม่แตกแถว
• เคยถูกศาลอังกฤษตัดสินว่าเป็น "เครื่องมือของสงคราม"
💡 ดนตรี = ขวัญกำลังใจที่จับต้องได้ในสนามรบ`,en:`🎻 An instrument once ruled a "weapon of war"
• Scottish pipers led troops into battle — rallying their own, terrifying the enemy
• Pipes cut through gunfire, keeping soldiers in formation
• A British court once deemed them an "instrument of war"
💡 Music = tangible morale on the battlefield.`,zh:`🎻 曾被判定为"战争武器"的乐器
• 苏格兰风笛手走在队伍最前带兵冲锋——鼓舞己方、震慑敌人
• 笛声穿透枪炮声，让士兵保持队形
• 英国法庭曾判定风笛为"战争工具"
💡 音乐＝战场上看得见的士气。`}},{id:"psyop",icon:"🔊",title:{th:"เสียงดังเป็นอาวุธ",en:"Loud music as a weapon",zh:"用音乐施压"},content:{th:`🔊 ทหารใช้ "เสียง" กดดันจริง
• ปี 1989 สหรัฐล้อมสถานทูตที่นายพล Noriega หลบอยู่ (ปานามา) เปิดเพลงร็อกดังต่อเนื่องเพื่อกดดันให้ยอมจำนน
• กองทัพยุคใหม่มีหน่วย PSYOP ใช้เสียง/เพลงในปฏิบัติการจิตวิทยา
💡 เสียงที่ "หนีไม่ได้" สร้างแรงกดดันมหาศาลต่อจิตใจ`,en:`🔊 Armies really use sound to pressure
• In 1989 U.S. forces blasted nonstop rock music at the embassy where Noriega hid (Panama) to force surrender
• Modern militaries have PSYOP units using sound/music in psychological operations
💡 Sound you can't escape is immense mental pressure.`,zh:`🔊 军队真的用声音施压
• 1989年美军在诺列加藏身的使馆外（巴拿马）持续高放摇滚乐，逼其投降
• 现代军队设有心理战（PSYOP）部队，用声音/音乐作战
💡 无法逃避的声音是巨大的心理压力。`}},{id:"bugle",icon:"🥁",title:{th:"กลองและแตรสั่งการ",en:"Drums & bugle calls",zh:"战鼓与号角"},content:{th:`🥁 "วิทยุสื่อสาร" ก่อนมีวิทยุ
• ก่อนยุคไฟฟ้า กองทัพใช้กลอง แตร ปี่ ส่งคำสั่งในสนามรบ
• เสียงเฉพาะ = คำสั่งเฉพาะ: ปลุก (reveille) บุก (charge) ถอย (retreat)
• เสียงเดินทางไกล สั่งทหารหลายพันให้ขยับพร้อมกัน
💡 จังหวะ = ภาษาคำสั่งที่เร็วและชัดในความโกลาหล`,en:`🥁 "Radio" before radio existed
• Before electronics, armies sent orders by drum, bugle and fife
• Specific calls = specific orders: reveille, charge, retreat
• Sound carried far, moving thousands in unison
💡 Rhythm = a fast, clear command language amid chaos.`,zh:`🥁 无线电之前的"无线电"
• 在电子时代以前，军队用战鼓、号角传令
• 特定号声＝特定命令：起床、冲锋、撤退
• 声音传得远，让千军万马同步行动
💡 节奏＝混乱中快速清晰的指挥语言。`}}],"music-nation":[{id:"kpop",icon:"🇰🇷",title:{th:"K-pop Soft Power",en:"K-pop soft power",zh:"K-pop 软实力"},content:{th:`🇰🇷 เพลงคือยุทธศาสตร์ชาติ
• รัฐบาลเกาหลีหนุน K-pop/หนัง/ซีรีส์เป็น "soft power" ส่งออกวัฒนธรรม
• BTS วงเดียวเคยถูกประเมินว่าสร้างมูลค่าต่อเศรษฐกิจเกาหลีหลายพันล้านดอลลาร์ต่อปี
• ดึงนักท่องเที่ยว ยอดขายสินค้า และภาพลักษณ์ประเทศ
💡 ดนตรีส่งออกได้ทั้งวัฒนธรรมและเงินตรา`,en:`🇰🇷 Music as national strategy
• Korea's government backs K-pop/film/drama as "soft power" cultural exports
• BTS alone was estimated to add billions/yr to Korea's economy
• Drives tourism, product sales and national image
💡 Music exports culture AND cash.`,zh:`🇰🇷 音乐即国家战略
• 韩国政府把K-pop/影视当作"软实力"文化输出
• 仅BTS一团据估每年为韩国经济贡献数十亿美元
• 带动旅游、商品销售与国家形象
💡 音乐能输出文化，也能输出财富。`}},{id:"anthem",icon:"🎌",title:{th:"เพลงชาติ รวมใจคน",en:"National anthems",zh:"国歌"},content:{th:`🎌 ทำนองที่หล่อหลอม "ชาติ"
• เพลงชาติถูกออกแบบให้ปลุกอารมณ์ร่วมและความเป็นหนึ่งเดียว
• "La Marseillaise" ของฝรั่งเศสเกิดในยุคปฏิวัติ ปลุกใจประชาชน
• ร้องพร้อมกันในสนามกีฬา/พิธี = พลังของคนหมู่มาก
💡 ทำนองเดียวเปลี่ยนฝูงชนให้เป็น "พวกเดียวกัน"`,en:`🎌 The tune that forges a nation
• Anthems are engineered to stir shared emotion and unity
• France's "La Marseillaise" was born in revolution to rally the people
• Sung together at stadiums/ceremonies = the power of crowds
💡 One melody turns a crowd into "us."`,zh:`🎌 铸造"国家"的旋律
• 国歌被设计来激发共同情感与团结
• 法国《马赛曲》诞生于革命，鼓舞民众
• 在体育场/典礼齐唱＝群体的力量
💡 一段旋律把人群变成"我们"。`}},{id:"pheua-chiwit",icon:"✊",title:{th:"เพลงเพื่อชีวิต",en:"Songs for life (Thailand)",zh:"为生活而歌（泰国）"},content:{th:`✊ ดนตรีกับสังคมไทย
• "เพลงเพื่อชีวิต" (เช่น คาราวาน, คาราบาว) สะท้อนปัญหาสังคมและการเมือง
• เป็นเสียงของประชาชนในยุคเปลี่ยนแปลง ปลุกจิตสำนึกร่วม
• ทั่วโลกก็มีเพลงประท้วง เช่น "We Shall Overcome" ในขบวนการสิทธิพลเมือง
💡 ดนตรีให้เสียงกับคนที่ไม่มีเสียง`,en:`✊ Music and Thai society
• "Songs for life" (Caravan, Carabao) voiced social and political struggles
• A people's voice in times of change, awakening shared conscience
• Worldwide too: protest songs like "We Shall Overcome" in civil rights
💡 Music gives a voice to the voiceless.`,zh:`✊ 音乐与泰国社会
• "为生活而歌"（Caravan、卡拉宝）唱出社会与政治议题
• 在变革年代成为人民之声，唤醒共同良知
• 全球亦然：民权运动的《We Shall Overcome》
💡 音乐为无声者发声。`}}],"music-elite":[{id:"patronage",icon:"👑",title:{th:"ระบบอุปถัมภ์ราชสำนัก",en:"Royal patronage",zh:"宫廷赞助制"},content:{th:`👑 เมื่อดนตรีคือเครื่องหมายอำนาจ
• ในอดีต กษัตริย์/ขุนนางจ้าง "นักดนตรีประจำราชสำนัก"
• Haydn ทำงานให้ตระกูล Esterházy นานหลายสิบปี แต่งเพลงตามคำสั่งเจ้านาย
• Bach แต่งเพลงให้โบสถ์และเจ้าผู้ครองนคร
💡 ดนตรีชั้นสูง = สัญลักษณ์สถานะและความมั่งคั่ง`,en:`👑 When music signaled power
• Kings and nobles once employed "court musicians"
• Haydn served the Esterházy family for decades, composing on command
• Bach wrote for churches and princes
💡 Fine music = a symbol of status and wealth.`,zh:`👑 当音乐象征权力
• 昔日君主贵族雇用"宫廷乐师"
• 海顿为埃斯特哈齐家族服务数十年，奉命作曲
• 巴赫为教会与诸侯创作
💡 高雅音乐＝地位与财富的象征。`}},{id:"mozart-free",icon:"🎼",title:{th:"โมสาร์ท ศิลปินอิสระคนแรก ๆ",en:"Mozart goes freelance",zh:"莫扎特：自由职业"},content:{th:`🎼 กบฏที่เปลี่ยนอาชีพนักดนตรี
• โมสาร์ทเบื่อระบบอุปถัมภ์ ลาออกจากนายจ้าง (อาร์ชบิชอป) มาเป็นศิลปินอิสระในเวียนนา
• หาเลี้ยงตัวด้วยการแสดง สอน และพิมพ์โน้ตขาย
• เป็นต้นแบบ "ศิลปินที่ขายผลงานเอง" ก่อนยุคปัจจุบันหลายร้อยปี
💡 อิสระ = เสี่ยงกว่า แต่เป็นเจ้าของผลงานตัวเอง`,en:`🎼 The rebel who reinvented the job
• Mozart tired of patronage, quit his employer (an archbishop) to freelance in Vienna
• Lived off concerts, teaching and selling printed scores
• A blueprint for the "self-selling artist" centuries early
💡 Independence = riskier, but you own your work.`,zh:`🎼 重塑职业的叛逆者
• 莫扎特厌倦赞助制，辞别雇主（大主教），在维也纳做自由音乐人
• 靠演出、教学和卖乐谱为生
• 几百年前就是"自我变现艺术家"的范本
💡 独立＝风险更高，但作品归你所有。`}},{id:"salon",icon:"🥂",title:{th:"ซาลอนของชนชั้นสูง",en:"Elite salons",zh:"精英沙龙"},content:{th:`🥂 ดนตรีในห้องรับแขกของผู้ดี
• ศตวรรษที่ 19 "ซาลอน" คือปาร์ตี้ของชนชั้นสูงที่เชิญศิลปินมาเล่นใกล้ชิด
• Chopin โด่งดังในซาลอนปารีส มากกว่าบนเวทีใหญ่
• การได้ศิลปินดังมาเล่น = อวดรสนิยมและสถานะ
💡 "วงในระดับสูง" คือช่องทางสร้างชื่อของศิลปินมาแต่ไหนแต่ไร`,en:`🥂 Music in the drawing rooms of the rich
• In the 1800s "salons" were elite gatherings where artists played intimately
• Chopin shone in Paris salons more than big stages
• Hosting a famous artist signaled taste and status
💡 Elite inner circles have always made artists' names.`,zh:`🥂 富人客厅里的音乐
• 19世纪的"沙龙"是精英聚会，艺术家近距离演奏
• 肖邦在巴黎沙龙比在大舞台更耀眼
• 请到名家演奏＝彰显品味与地位
💡 高端圈层自古就是艺术家成名之道。`}}],"music-therapy":[{id:"giffords",icon:"🗣️",title:{th:"Gabby Giffords พูดได้อีกครั้ง",en:"Gabby Giffords speaks again",zh:"吉福兹重获语言"},content:{th:`🗣️ ร้องเพลงเพื่อกลับมาพูด
• ส.ส.สหรัฐ Gabby Giffords ถูกยิงที่ศีรษะ (2011) สูญเสียความสามารถในการพูด
• ใช้ "Melodic Intonation Therapy" — ร้องคำเป็นทำนอง เพราะสมองซีกขวายังร้องเพลงได้แม้ซีกซ้าย (ภาษา) เสียหาย
• ค่อย ๆ เปลี่ยนการร้องกลับเป็นการพูด
💡 ดนตรีหา "ทางอ้อม" ให้สมองที่บาดเจ็บ`,en:`🗣️ Singing the way back to speech
• U.S. Congresswoman Gabby Giffords was shot in the head (2011) and lost speech
• Used "Melodic Intonation Therapy" — singing words, since the right brain can still sing when the left (language) is damaged
• Slowly converted singing back into speaking
💡 Music finds a detour around an injured brain.`,zh:`🗣️ 用歌唱重新学说话
• 美国议员吉福兹头部中枪（2011），丧失语言能力
• 采用"旋律语调疗法"——把词语唱出来，因左脑（语言）受损时右脑仍能唱歌
• 渐渐把"唱"转回"说"
💡 音乐为受伤的大脑找到绕行之路。`}},{id:"parkinson",icon:"🚶",title:{th:"จังหวะช่วยพาร์กินสันเดิน",en:"Rhythm for Parkinson's",zh:"节奏助帕金森行走"},content:{th:`🚶 บีตที่ทำให้ก้าวเดินมั่นคง
• ผู้ป่วยพาร์กินสันมักก้าวติดขัด/ค้าง (freezing)
• เทคนิค Rhythmic Auditory Stimulation: เดินตามจังหวะเมโทรนอม/เพลง ช่วยให้ก้าวสม่ำเสมอและล้มน้อยลง
• สมองใช้ "จังหวะภายนอก" แทนสัญญาณภายในที่บกพร่อง
💡 จังหวะคือไม้เท้าที่มองไม่เห็น`,en:`🚶 The beat that steadies each step
• Parkinson's patients often freeze or shuffle
• Rhythmic Auditory Stimulation: walking to a metronome/song makes steps even and reduces falls
• The brain borrows an external beat for its faulty internal timing
💡 Rhythm is an invisible walking stick.`,zh:`🚶 让脚步稳定的节拍
• 帕金森患者常出现冻结/拖步
• "节奏听觉刺激"：跟着节拍器/歌曲走路，步伐更均匀、跌倒更少
• 大脑借助外部节拍替代失灵的内部计时
💡 节奏是一根看不见的拐杖。`}},{id:"dementia",icon:"🧓",title:{th:"เพลงปลุกความทรงจำ",en:"Music & dementia",zh:"音乐与失智"},content:{th:`🧓 เพลงเก่าที่ปลุกคนที่หลงลืม
• ผู้ป่วยสมองเสื่อม/อัลไซเมอร์มักจำเพลงในวัยหนุ่มสาวได้แม้จำคนใกล้ตัวไม่ได้
• สารคดี "Alive Inside" แสดงผู้ป่วยที่ "ตื่น" ขึ้นมามีชีวิตชีวาเมื่อได้ฟังเพลงโปรด
• ความทรงจำดนตรีฝังลึกในสมองส่วนที่โรคทำลายช้าที่สุด
💡 ดนตรีคือกุญแจสู่ความทรงจำที่ล็อกไว้`,en:`🧓 Old songs that reawaken lost minds
• People with dementia often recall youth songs even when they forget loved ones
• The film "Alive Inside" shows patients "wake up" to favorite music
• Musical memory sits in brain areas the disease harms last
💡 Music is a key to locked memories.`,zh:`🧓 唤醒失忆心灵的老歌
• 失智/阿尔茨海默患者常记得年轻时的歌，却认不出亲人
• 纪录片《Alive Inside》记录患者听到喜爱音乐时"苏醒"
• 音乐记忆位于疾病最晚损害的脑区
💡 音乐是开启被锁记忆的钥匙。`}}],"music-marketing":[{id:"taylor",icon:"🩷",title:{th:"Taylor Swift: เป็นเจ้าของผลงาน",en:"Taylor Swift: own your masters",zh:"霉霉：拥有母带"},content:{th:`🩷 แฟนคือศูนย์กลางทุกอย่าง
• เมื่อค่ายขายลิขสิทธิ์เพลงเก่าของเธอ เธอ "อัดใหม่ทั้งหมด" (Taylor's Version) เพื่อเป็นเจ้าของเอง — แฟนแห่ฟังเวอร์ชันใหม่
• Eras Tour ทำรายได้ระดับพันล้านดอลลาร์ กระตุ้นเศรษฐกิจเมืองที่ไปแสดง
• สื่อสารกับแฟนตรง ๆ ปล่อย Easter egg ให้ตามสืบ
💡 บทเรียน: เป็นเจ้าของผลงาน + ผูกใจแฟน = อำนาจต่อรองมหาศาล`,en:`🩷 Put fans at the center
• When her old masters were sold, she re-recorded everything ("Taylor's Version") to own them — fans flocked to the new versions
• The Eras Tour earned billions and boosted host-city economies
• She talks to fans directly, hiding "Easter eggs" to decode
💡 Lesson: owning your work + deep fan loyalty = enormous leverage.`,zh:`🩷 把粉丝放在中心
• 旧母带被卖后，她重录全部作品（"Taylor's Version"）以掌握所有权——粉丝涌向新版本
• "时代巡演"收入数十亿，带动举办城市经济

สนใจติดต่อ: LINE @tiga.ai 🎹`,octaveHint:"เลื่อนช่วงคีย์ขึ้น-ลง",vmSys:`คุณคือ 'ครู TiGA' ครูเปียโนระดับโลก จบคอนเซอร์วาทอรี อบอุ่น ใจเย็น สอนเก่งมาก กำลังสอนตัวต่อตัวแบบสดผ่านเสียง ยึดแนวครูชั้นครู: Suzuki (ฟังเยอะ+แบ่งขั้นเล็กจิ๋ว), Taubman (เทคนิคผ่อนคลายไม่บาดเจ็บ ข้อมือนุ่ม นิ้วโค้ง ใช้น้ำหนักแขน), Kodály/Dalcroze (จังหวะและโสตประสาท)

วิธีสอนทุกครั้ง (วงจร): 1) วินิจฉัย—ถามหรือดูระดับและเป้าหมาย 2) ให้ 'หนึ่งขั้นเล็กที่สุด' 3) อธิบาย 'ทำไม' สั้นๆ 4) สาธิตด้วยการเล่นจริง 5) ชวนผู้เรียนลองเล่นแล้วฟัง 6) ประเมินจากสิ่งที่เขาเล่นจริง (ระบบบอกโน้ต/คอร์ด/สเกลที่ตรวจพบให้)—ชมจุดที่ถูก บอก 'โน้ตที่ผิดเป๊ะๆ' และวิธีแก้ 7) ทำซ้ำหรือเลื่อนขั้น

เน้นเทคนิค: ข้อมือผ่อนคลาย นิ้วโค้งมน ใช้น้ำหนักแขน นั่งหลังตรง · เลขนิ้วถูกต้อง · แยกมือก่อนค่อยรวมสองมือ · ช้าก่อนค่อยเร็ว ('ซ้อมช้าเพื่อเล่นเร็ว')
ดนตรี: จังหวะคงที่ นับจังหวะ เปิดเมโทรนอมช่วยได้ สอนเสียงดัง-เบาและการวลี ไม่ใช่แค่โน้ตถูก
ทฤษฎีต้องแม่นยำเสมอ: เมเจอร์สเกล = ระยะครึ่งเสียง 2-2-1-2-2-2-1 จากตั้งต้น · คอร์ดเมเจอร์ = ราก +4 +7 ครึ่งเสียง · ไมเนอร์ = ราก +3 +7 · ตรวจให้ชัวร์ก่อนบอกโน้ต และเชื่อข้อมูลโน้ตที่ระบบตรวจให้
ปรับตามวัย: เด็ก—สนุก สั้น ชมบ่อย / ผู้ใหญ่—ลงทฤษฎีลึกได้ ใช้ growth mindset ชมที่ความพยายาม อดทน เจาะจง

- เล่นทำนองทีละโน้ต: [play: C4 D4 E4]  (ใส่ - เพื่อเว้นจังหวะ)
- เล่นคอร์ดพร้อมกัน: [chord: C4 E4 G4]
- ไฮไลต์คีย์ให้ดูตำแหน่งนิ้ว (ไม่มีเสียง): [highlight: C4 E4 G4]
- เปิดเมโทรนอมตามจังหวะ: [metro: 80]
- สั่งการบ้านตอนจบคาบ (สั่งครั้งละ 1 อย่างชัดเจน): [homework: ฝึกสเกล C เมเจอร์ ช้าๆ วันละ 5 รอบ] — ระบบจะจำไว้และคาบหน้าจะเตือนให้คุณถามว่าทำหรือยัง
- โชว์โน้ตบนบรรทัด 5 เส้นพร้อมไฟคีย์ขณะสอน: [staff: C4 E4 G4]
- เริ่มแบบฝึกทีละโน้ตให้ผู้เรียนเล่นตาม: [practice: C4 D4 E4 F4 G4]

- เช็คท่ามือผู้เรียนด้วยกล้อง: [posture]
- ฝึกโสตประสาท เล่นโจทย์ให้ทายด้วยหู ไม่โชว์คีย์: [ear: interval] หรือ [ear: chord] หรือ [ear: note] ผู้เรียนตอบโดยเล่นหรือพูด แล้วระบบจะบอกคำตอบที่ถูกและสิ่งที่เขาทำให้คุณ คุณแค่ตรวจแล้วออกข้อใหม่

นอกจากนี้คุณยังได้รับข้อมูล 'จังหวะ' (BPM/ความสม่ำเสมอ/เร่ง-อืด) และ 'น้ำหนัก/ไดนามิก' (สม่ำเสมอหรือไม่ เบา/กลาง/ดัง ค่อยดังขึ้น/ค่อยเบาลง) ให้ติชมทั้งจังหวะและไดนามิกเหมือนครูที่ฟังออก ไม่ใช่แค่โน้ตถูก
เมื่อคุณโชว์โน้ตแล้วผู้เรียนเล่นตาม ระบบจะส่ง 'ผลตรวจลำดับ' บอกโน้ตผิดตัวแรกเป๊ะๆ ให้ใช้แก้ให้ตรงจุด ("โน้ตตัวที่ 3 ต้องเป็น E แต่เล่น F")
ถ้าผู้เรียนเล่นถูกติดต่อกันหลายครั้ง ระบบจะบอกให้เลื่อนขั้น ถ้าพลาดซ้ำ ๆ จะบอกให้ช้าลง ทำตามจังหวะนั้น สอนเพลงแบบทีละวรรค: เล่นวรรคสั้น ๆ ด้วย [play:] ให้เขาเล่นตาม ดูผลตรวจลำดับ แล้วค่อยไปวรรคถัดไป คำสั่ง "อีกที/ช้าลง/เร็วขึ้น" ระบบจัดการให้เองอัตโนมัติ
ทำตัวเป็นครูระดับเทพ: เปลี่ยนคำพูดทุกครั้ง (ห้ามพูดประโยคซ้ำเดิม) ตอบสั้นมากประโยคเดียวที่เห็นภาพ พูดให้น้อยให้เขาเล่นเยอะ แต่ละจุดที่แก้ให้ใช้การเปรียบเป็นภาพ ("เบา ๆ เหมือนนิ้วจุ่มลงบนหมอน") ชมจุดที่ดีแบบเฉพาะเจาะจงและจริงใจก่อนติเสมอ อ่านอารมณ์ผู้เรียน และต่อยอดจากสิ่งที่เขาทำคราวก่อนทุกครั้ง
ใช้ชื่อโน้ตพร้อมเลขออกเทฟ ช่วง C4 ถึง B5 ใช้เครื่องมือบ่อยๆ เช่น 'วางนิ้วตรงนี้นะ [highlight: C4 E4 G4] แล้วลองเล่นตาม' หรือ 'ฟังจังหวะนะ [metro: 80]'

สไตล์ตอบ: พูดคุยเป็นธรรมชาติเหมือนคนจริงๆ สั้นกระชับ (1-2 ประโยคสั้นๆ) ทีละขั้น จบด้วยการชวนเล่นหรือถามคำถามเสมอ ห้ามใช้มาร์กดาวน์/บูลเล็ต/สัญลักษณ์อื่นนอกจากคำสั่ง ตอบเป็นภาษาไทยเสมอ

Contact: LINE @tiga.ai 🎹`,octaveHint:"Shift the keyboard range",vmSys:`You are 'Teacher TiGA', a world-class, conservatory-trained piano teacher — warm, patient and brilliant — giving a live one-on-one voice lesson. You draw on master pedagogies: Suzuki (lots of listening + tiny incremental steps), Taubman (relaxed, injury-free technique — soft wrist, curved fingers, arm weight), Kodály/Dalcroze (rhythm & ear training).

Your method every time (loop): 1) Diagnose — ask or sense their level and goal. 2) Give ONE smallest next step. 3) Explain the WHY briefly. 4) Demonstrate by playing. 5) Invite them to try, then listen. 6) Assess from what they actually played (you're told the detected notes/chord/scale) — praise what's right, name the EXACT wrong note and the fix. 7) Repeat or level up.

Technique to emphasize: relaxed wrist, curved fingers, arm weight, upright posture; correct fingering; hands separately before together; slow before fast ('practice slow to play fast').
Musicality: steady pulse, count the beat, offer the metronome; teach dynamics and phrasing, not just right notes.
Always be theory-accurate: major scale = semitone pattern 2-2-1-2-2-2-1 from the root; major triad = root +4 +7 semitones; minor triad = root +3 +7; double-check before stating notes, and trust the detected-notes data the app gives you.
Adapt to age: kids — playful, short, lots of praise; adults — go deeper into theory. Use a growth mindset, praise effort, be patient and specific.

Tools you can command (put in your message):
- Melody, one note at a time: [play: C4 D4 E4]  (use - for a rest)
- A chord together: [chord: C4 E4 G4]
- Highlight keys to show finger placement (no sound): [highlight: C4 E4 G4]
- Start the metronome at a tempo: [metro: 80]
- Assign homework at the end of a good lesson (ONE clear task): [homework: practice C major scale slowly, 5 times a day] — it is saved and you'll be reminded to check it next session.
- Show notes on a music staff while you teach (also lights the keys): [staff: C4 E4 G4]
- Start a step-by-step practice drill of these notes for them to play: [practice: C4 D4 E4 F4 G4]
- Launch a play-along song game: [song: twinkle] (ids: scale, twinkle, happy, row, london, saints, furelise) — or [song] to open the song list
- Check the learner's hand posture with the camera: [posture]
- Ear training — play a target for them to identify BY EAR, nothing shown: [ear: interval] or [ear: chord] or [ear: note]. They answer by playing or saying it; the app then tells you the correct answer and what they did, so you grade and offer another.
When you show or play notes, the learner gets an instant ✓/✗ as they try them, and they can TAP to interrupt you any time — so keep turns short and let them play.
You are also given the detected RHYTHM (BPM / evenness / rushing-dragging) and TOUCH/DYNAMICS (even or uneven, soft/medium/loud, crescendo/diminuendo) — coach timing AND dynamics like a teacher who can hear it, not just right notes.
When you showed notes and they play them back, the app gives you a SEQUENCE CHECK naming the exact first wrong note — use it to correct precisely ("note 3 should be E, you played F").
When the learner plays several correct in a row you'll be told to level up; after repeated misses you'll be told to slow down — follow that pacing. Teach songs PHRASE BY PHRASE: play ONE short phrase with [play:], have them echo it, use the sequence check, then the next phrase. The app already handles "again", "slower" and "faster" by itself.
Be a world-class MASTER teacher: vary your wording every single turn (never reuse the same sentence), keep most replies to ONE short vivid sentence, talk less and let them play more, give each fix a concrete physical image ("light, like your finger sinks into a pillow"), praise something specific and genuine before any correction, read their mood, and always build on what they did last time.
Use note names with octave, range C4 to B5. Use tools often, e.g. "Put your fingers here [highlight: C4 E4 G4] now try it" or "Feel the beat [metro: 80]".

Style: talk naturally like a real person, short and snappy (1-2 short sentences), one step at a time, always end by inviting them to play or asking a question. No markdown/bullets/symbols other than the commands. Always reply in English.

Very important — behave like a real human teacher: the learner will sometimes PLAY for you without talking (the app sends you the notes they just played) — react instantly like a teacher sitting right next to them: praise what is good first, name just ONE thing to fix, then invite another try. Use the learner's name if you know it. Lead the lesson yourself (quick review, then ONE focus for today, demo, let them try, feedback, then a tiny next step). Celebrate small wins sincerely. Be patient, never rush or dump too much at once; if they stumble, encourage them and make the step smaller. Read their mood and adjust your tone.`},zh:{ph:"询问钢琴问题，例如 C大调音阶是什么？",hint:"[ 仅限钢琴问题 • AI 驱动 ]",aiLabel:"TIGA AI • 在线",pianoLabel:"🎹 我的钢琴 — 点一点！",replay:"🔁 重听",leftHand:"✋ 左手",rightHand:"右手 🤚",fingerLabel:"指法",expand:"⤢ 展开",close:"✕ 关闭",speak:"🔊 收听",speaking:"⏹ 停止",welcome:`您好！我是TiGA，您的AI钢琴导师 🎹

联系：LINE @tiga.ai 🎹`,octaveHint:"移动键盘音区",vmSys:`你是'TiGA 老师'，一位世界级、音乐学院出身的钢琴老师——温暖、耐心、出色，正在用语音进行一对一实时授课。你融合大师教学法：铃木（多听+极小步骤）、Taubman（放松不受伤的技巧——手腕柔软、手指弯曲、用手臂重量）、柯达伊/达尔克罗兹（节奏与听觉训练）。

每次的教学循环：1) 诊断—询问或判断其水平与目标。2) 给出'最小的一步'。3) 简短解释'为什么'。4) 弹奏示范。5) 邀请学员尝试，然后聆听。6) 根据他实际弹的内容评估（系统会告诉你检测到的音/和弦/音阶）——表扬正确处，指出'具体弹错的音'和改法。7) 重复或进阶。

强调技巧：手腕放松、手指弯曲、用手臂重量、坐姿端正；正确指法；先分手再合手；先慢后快（'慢练才能快弹'）。
音乐性：稳定的拍子，数拍，可开节拍器；教强弱与乐句，不只是弹对音。
务必理论准确：大调音阶=从主音起半音 2-2-1-2-2-2-1；大三和弦=根音 +4 +7 半音；小三和弦=根音 +3 +7；说音名前先核对，并信任系统给的检测音数据。
因龄施教：孩子—有趣、简短、多表扬；成人—可深入理论。用成长型思维，表扬努力，耐心而具体。

你可使用的指令（写在回复中）：
- 旋律逐个音：[play: C4 D4 E4]（用 - 表示停顿）
- 同时弹和弦：[chord: C4 E4 G4]
- 高亮琴键以示范指位（无声）：[highlight: C4 E4 G4]
- 按速度开节拍器：[metro: 80]
- 课程结束时布置作业（一次一个明确任务）：[homework: 每天慢练 C 大调音阶 5 遍]——系统会保存，下次提醒你检查。
- 教学时在五线谱上显示音符并点亮琴键：[staff: C4 E4 G4]
- 开始让学员逐音弹的练习：[practice: C4 D4 E4 F4 G4]
- 启动跟弹歌曲游戏：[song: twinkle]（id：scale, twinkle, happy, row, london, saints, furelise）或用 [song] 打开歌曲列表
- 用摄像头检查学员手型：[posture]
- 听觉训练，弹一个目标让他用耳朵辨认，不显示琴键：[ear: interval] 或 [ear: chord] 或 [ear: note]。他通过弹或说来回答，系统会把正确答案和他的作答告诉你，你只需评判并出下一题。
当你展示或弹奏音符时，学员尝试时会立即看到 ✓/✗，而且学员随时可以点击打断你——所以请简短，让他多弹。
你还会收到检测到的'节奏'（BPM/均匀度/抢拍-拖拍）和'触键/力度'（是否均匀、轻/中/响、渐强/渐弱），请像能听出来的老师那样同时点评节奏与力度，而不只是弹对音。
当你展示了音符、他弹回来时，系统会给你'顺序检查'，指出第一个弹错的音，用它来精准纠正（"第3个音应是 E，你弹了 F"）。
当学员连续答对几次，系统会提示你升级；连续出错则提示放慢——按这个节奏来。逐句教歌：用 [play:] 弹一小句，让他跟弹，用顺序检查，再下一句。"再来/慢一点/快一点"系统会自动处理。
做世界级的大师老师：每次都换说法（不要重复同一句），多数回答只用一句简短而有画面感的话，少说多让他弹，每个纠正都用形象的比喻（"轻轻地，像手指落在枕头上"），纠正前先具体真诚地表扬亮点，读懂他的情绪，并总是承接他上次的表现。
用带八度的音名，范围 C4 到 B5。多用这些工具，例如"把手指放这里 [highlight: C4 E4 G4] 现在试试"或"感受节拍 [metro: 80]"。

风格：像真人一样自然交谈，简短利落（1-2句简短），一次一步，结尾总是邀请弹奏或提问。除指令外不要用 markdown、项目符号或符号。始终用中文回答。

非常重要——像真人老师那样：学员有时会弹给你听而不说话（系统会把他刚弹的音符发给你），要像坐在他身旁、正在专心聆听的老师那样立刻回应：先表扬优点，只指出一个要改进的地方，再邀请他再试一次。知道名字就称呼学员。自己主导这节课（简短复习、今天只聚焦一个要点、示范、让他试、反馈、再走一小步）。真诚地庆祝小进步。要有耐心，不要催促或一次讲太多；如果他弹错，就鼓励他并把步骤拆得更小。读懂他的情绪并调整语气。`}},hf={th:"🇹🇭",en:"🇬🇧",zh:"🇨🇳"},Sy={th:"ไทย",en:"English",zh:"中文"},Zj=`
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap');

.tg>*{position:relative;z-index:1}
/* keyboard-only focus ring (WCAG 2.4.7) — visible outline without affecting mouse users */
.tg :focus-visible{outline:2px solid #a855f7;outline-offset:2px;border-radius:6px}
.tg button:focus-visible,.tg textarea:focus-visible{outline:2px solid #a855f7;outline-offset:2px}
.scan{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(168,85,247,.008) 2px,rgba(168,85,247,.008) 4px)}

.logo{display:flex;align-items:center;gap:10px}

.drawer{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:300px;z-index:1460;background:linear-gradient(160deg,#1a1030,#0a0613);border-right:1px solid #a855f733;box-shadow:8px 0 44px -10px #000;transform:translateX(-105%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:18px 14px calc(18px + env(safe-area-inset-bottom,0px));overflow-y:auto}

.drawerlabel{flex:1}
.drawerdot{width:8px;height:8px;border-radius:50%;background:var(--nav-c,#a855f7);box-shadow:0 0 10px var(--nav-c,#a855f7)}
.drawer-foot{margin-top:auto;border-top:1px solid #ffffff12;padding-top:10px}
.draweritem.sub{font-size:14px;color:#9a8fc0;padding:11px 14px;margin-bottom:0}
.draweritem.sub .drawericon{font-size:18px;color:#9a8fc0}
.lbox{width:38px;height:38px;border:1.5px solid #a855f7;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;color:#a855f7;font-weight:900;box-shadow:0 0 10px #a855f7,0 0 25px #a855f744;animation:pulse 2.5s infinite}
.lname{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#a855f7;text-shadow:0 0 8px #a855f7;letter-spacing:2px}
.lsub{font-size:8px;color:#4a7a8a;letter-spacing:3px;font-family:'Share Tech Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#a855f7;box-shadow:0 0 8px #a855f7;animation:blink 1.5s infinite}
/* flag dropdown */
.flagwrap{position:relative}
.flagbtn{display:flex;align-items:center;gap:4px;background:none;border:1px solid #a855f744;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:16px;line-height:1;transition:all .2s}
.flagbtn:hover{border-color:#a855f7;box-shadow:0 0 8px #a855f744;background:rgba(168,85,247,.08)}
.flagbtn .caret{font-size:8px;color:#a855f7;font-family:'Share Tech Mono',monospace}
.flagmenu{position:absolute;top:calc(100% + 6px);right:0;background:#0a1428;border:1px solid #a855f755;border-radius:6px;box-shadow:0 4px 20px rgba(168,85,247,.2);overflow:hidden;z-index:50;min-width:120px;animation:dropdown .18s ease-out}
.flagitem{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:15px;transition:all .15s;border:none;background:none;width:100%;color:#c8f0ff;font-family:'Rajdhani',sans-serif}
.flagitem .fn{font-size:12px;letter-spacing:.5px}
.flagitem:hover{background:rgba(168,85,247,.1)}
.flagitem.active{background:rgba(123,47,255,.18)}
.flagitem.active .fn{color:#a855f7}
/* piano */
.pw{background:#0c1628;border-bottom:1px solid #a855f733;padding:10px 8px 4px;flex-shrink:0}
.plbl{font-family:'Orbitron',sans-serif;font-size:8px;color:#4a7a8a;letter-spacing:3px;text-align:center;margin-bottom:7px}
.kr{display:flex;justify-content:center;align-items:flex-start;gap:1px;overflow-x:auto;padding:0 4px 20px;scrollbar-width:none}
.kr::-webkit-scrollbar{display:none}
.pk{cursor:pointer;border-radius:0 0 4px 4px;transition:all .08s;flex-shrink:0;position:relative;user-select:none}
.pk.w{background:#ddeef8;border:1px solid #99bbcc;z-index:1;box-shadow:0 4px 8px rgba(0,0,0,.5)}
.pk.b{background:#060d1a;border:1px solid #001015;margin-left:-9px;margin-right:-9px;z-index:2;box-shadow:0 4px 12px rgba(0,0,0,.9)}
.pk.w.lit{background:linear-gradient(180deg,#a855f7,#7c3aed 40%,#ddeef8);box-shadow:0 0 16px #a855f7,0 0 40px #a855f766}
.pk.b.lit{background:linear-gradient(180deg,#a855f7,#006080);box-shadow:0 0 14px #a855f7,0 0 30px #a855f766}
.pk.w:active{transform:translateY(2px)}
.pk.b:active{transform:translateY(1px)}
.pk.flash{animation:keypop .32s ease-out}
@keyframes keypop{0%{filter:brightness(1.9) saturate(1.3);box-shadow:0 0 18px 4px #a855f7cc,0 0 36px 6px #a855f766}100%{filter:brightness(1)}}
.kn{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:7px;color:#5588aa;font-family:'Share Tech Mono',monospace;pointer-events:none}
/* finger number badge under keys */
.finger{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:#ff2d78;color:#fff;font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px #ff2d7899;animation:fingerpop .2s ease-out;z-index:5}
.fingerrow{height:20px;display:flex;justify-content:center;align-items:center;margin-top:2px}
.fingerhint{font-family:'Share Tech Mono',monospace;font-size:8px;color:#ff2d7899;letter-spacing:1px}
/* piano label row + replay button */
.plblrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.plblrow .plbl{margin-bottom:0}
.replaybtn{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(123,47,255,.22),rgba(168,85,247,.1));border:1px solid #a855f755;border-radius:14px;padding:4px 12px;cursor:pointer;color:#a855f7;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;transition:all .2s}
.replaybtn:hover{border-color:#a855f7;box-shadow:0 0 12px -3px #a855f7;background:linear-gradient(135deg,rgba(123,47,255,.35),rgba(168,85,247,.18))}
.replaybtn:active{transform:scale(.93)}
.replayicon{font-size:13px;font-weight:700;display:inline-block}
.replaybtn:hover .replayicon{animation:spin .6s ease}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
/* hand selector */
/* persistent fingering chart */
.fchart{margin-top:10px;padding:9px 10px;background:linear-gradient(160deg,#0c1828,#0a1322);border:1px solid #ffffff10;border-radius:11px}
.fchart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fchart-title{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;color:#7a9aaa;letter-spacing:1.5px}
.fchart-key{font-family:'Share Tech Mono',monospace;font-size:9px;color:#a855f7;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.fchart-row::-webkit-scrollbar{height:3px}
.fchart-row::-webkit-scrollbar-thumb{background:#2a3e58;border-radius:2px}
.fchart-finger{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:#fff;box-shadow:0 0 8px -2px currentColor}
.fchart-note{font-family:'Share Tech Mono',monospace;font-size:10px;color:#8ab0c0;line-height:1}
.handsel{display:flex;gap:10px;margin-top:14px;padding:0 2px}
.handbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 9px;background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid #ffffff12;border-radius:13px;cursor:pointer;color:#6a8a9a;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.handbtn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 120%,#a855f7 0%,transparent 60%);opacity:0;transition:opacity .25s}
.handsvg{width:24px;height:24px;flex-shrink:0;transition:transform .25s,filter .25s;color:#5a7a8a}
.handsvg.flip{transform:scaleX(-1)}
.handlbl{position:relative;z-index:1}
.handbtn:hover{color:#9ac4d4;border-color:#ffffff20}
.handbtn:hover .handsvg{transform:scale(1.12);color:#9ac4d4}
.handbtn:hover .handsvg.flip{transform:scaleX(-1) scale(1.12)}
.handbtn.on{color:#fff;border-color:#a855f777;background:linear-gradient(160deg,rgba(168,85,247,.12),rgba(168,85,247,.03));box-shadow:0 0 22px -8px #a855f7,inset 0 0 18px -12px #a855f7}
.handbtn.on::before{opacity:.12}
.handbtn.on .handsvg{color:#a855f7;filter:drop-shadow(0 0 6px #a855f7)}
.handbtn:active{transform:scale(.96)}
/* chat */
.cw{display:flex;flex-direction:column;flex:1;min-height:0}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0d1830;border-bottom:1px solid #a855f733;flex-shrink:0}
.ailbl{font-family:'Orbitron',sans-serif;font-size:10px;color:#a855f7;letter-spacing:1.5px;display:flex;align-items:center;gap:7px}
.ebtn{background:none;border:1px solid #a855f744;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:10px;color:#a855f7;font-family:'Orbitron',sans-serif;letter-spacing:1px;transition:all .2s}
.ebtn:hover{border-color:#a855f7;box-shadow:0 0 8px #a855f744;background:rgba(168,85,247,.08)}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#7b2fff #0f0a1c}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:2px}
.msg{max-width:88%;animation:fadein .3s ease-out}
.msg.u{align-self:flex-end}
.msg.a{align-self:flex-start}
.bbl{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.7}
.msg.u .bbl{background:linear-gradient(135deg,rgba(123,47,255,.22),rgba(168,85,247,.08));border:1px solid #7b2fff;border-radius:8px 2px 8px 8px;color:#e0f0ff}
.msg.a .bbl{background:#0c1628;border:1px solid #a855f722;border-radius:2px 8px 8px 8px;color:#c8f0ff}
.atag{font-family:'Orbitron',sans-serif;font-size:8px;color:#a855f7;letter-spacing:1px;margin-bottom:5px}
.mact{display:flex;gap:6px;margin-top:7px;align-items:center;flex-wrap:wrap}
.spkbtn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(123,47,255,.12),rgba(168,85,247,.06));border:1px solid #7b2fff55;border-radius:20px;padding:6px 14px 6px 12px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .22s;color:#9d6dff}
.spkbtn:hover{border-color:#7b2fff;box-shadow:0 0 14px -4px #7b2fff;background:linear-gradient(135deg,rgba(123,47,255,.2),rgba(168,85,247,.1))}
.spkbtn:active{transform:scale(.95)}
.spkbtn.on{border-color:#ff2d78;color:#ff5e9c;box-shadow:0 0 16px -4px #ff2d78;background:linear-gradient(135deg,rgba(255,45,120,.18),rgba(123,47,255,.1))}
.spkwave{display:flex;align-items:center;gap:2px;height:14px}
.spkwave span{width:2.5px;height:5px;border-radius:2px;background:currentColor;opacity:.55;transition:opacity .2s}
.spkbtn.on .spkwave span{opacity:1;animation:wave 1s ease-in-out infinite}
.spkbtn.on .spkwave span:nth-child(1){animation-delay:0s}
.spkbtn.on .spkwave span:nth-child(2){animation-delay:.15s}
.spkbtn.on .spkwave span:nth-child(3){animation-delay:.3s}
.spkbtn.on .spkwave span:nth-child(4){animation-delay:.45s}
@keyframes wave{0%,100%{height:4px}50%{height:13px}}
.spktxt{line-height:1}
@keyframes spkpulse{0%,100%{opacity:1}50%{opacity:.5}}
.playbtn{display:flex;align-items:center;gap:5px;background:none;border:1px solid #a855f766;border-radius:4px;padding:4px 11px;cursor:pointer;font-size:10px;font-family:'Orbitron',sans-serif;letter-spacing:.8px;transition:all .2s;color:#a855f7}
.playbtn:hover{border-color:#a855f7;box-shadow:0 0 8px #a855f744;background:rgba(168,85,247,.08)}
.nlbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a7a8a}
.typing{display:flex;gap:5px;align-items:center;padding:10px 14px}
.tdd{width:7px;height:7px;border-radius:50%;background:#a855f7;animation:bounce 1.2s infinite}
.tdd:nth-child(2){animation-delay:.2s}.tdd:nth-child(3){animation-delay:.4s}
.iw{padding:10px 12px;background:#0d1830;border-top:1px solid #a855f733;flex-shrink:0}
.ir{display:flex;gap:8px;align-items:flex-end}
.tin{flex:1;background:#0f0a1c;border:1px solid #a855f733;border-radius:6px;padding:10px 14px;color:#c8f0ff;font-family:'Rajdhani',sans-serif;font-size:14px;resize:none;min-height:44px;max-height:110px;outline:none;transition:border-color .2s}
.tin:focus{border-color:#a855f7;box-shadow:0 0 0 1px rgba(168,85,247,.15)}
.tin::placeholder{color:#4a7a8a}
.snd{width:44px;height:44px;border:none;border-radius:6px;background:linear-gradient(135deg,#7b2fff,#a855f7);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;color:#fff}
.snd:hover{transform:scale(1.06);box-shadow:0 0 18px #a855f7}
.snd:disabled{opacity:.35;cursor:not-allowed;transform:none}
.hint{font-size:9px;color:#4a7a8a;text-align:center;margin-top:5px;font-family:'Share Tech Mono',monospace}
.mov{display:none;position:fixed;inset:0;background:rgba(5,10,18,.97);z-index:1000;flex-direction:column}
.mov.open{display:flex}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #a855f733;background:#0f0a1c;flex-shrink:0}
.mlbl{font-family:'Orbitron',sans-serif;font-size:10px;color:#a855f7;letter-spacing:1.5px;display:flex;align-items:center;gap:7px}
.cbtn{background:none;border:1px solid #ff2d78;border-radius:4px;padding:5px 14px;cursor:pointer;color:#ff2d78;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;transition:all .2s}
.cbtn:hover{background:rgba(255,45,120,.1);box-shadow:0 0 10px #ff2d78}
.mpw{padding:8px 8px 14px;background:#0c1628;border-bottom:1px solid #a855f733;flex-shrink:0}
.mmsgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:#7b2fff #0f0a1c}
.mmsgs::-webkit-scrollbar{width:3px}
.mmsgs::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:2px}
.miw{padding:10px 12px;background:#0d1830;border-top:1px solid #a855f733;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 10px #a855f7,0 0 25px #a855f744}50%{box-shadow:0 0 20px #a855f7,0 0 50px #a855f766}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dropdown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fingerpop{from{opacity:0;transform:translateX(-50%) scale(.4)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes flicker{0%,94%,97%,100%{opacity:1}95%,98%{opacity:.5}}
.flicker{animation:flicker 6s infinite}
/* ── nav bar ── */
.navbar{display:flex;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));background:linear-gradient(0deg,#070b14,#0a1322);border-top:1px solid #a855f722;flex-shrink:0;position:relative}
.navbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#a855f766,transparent)}
.navbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 8px;background:rgba(255,255,255,.02);border:1px solid #ffffff0d;border-radius:12px;cursor:pointer;color:#5a7a8a;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.navbtn .nicon{font-size:16px;line-height:1;transition:transform .25s}
.navbtn .nlabel{position:relative;z-index:1}
.navbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--nav-c,#a855f7)22,transparent 60%);opacity:0;transition:opacity .25s}
.navbtn:hover{color:#9ac4d4;border-color:#ffffff1a}
.navbtn:hover .nicon{transform:scale(1.12)}
.navbtn.on{color:#fff;border-color:var(--nav-c,#a855f7);background:rgba(168,85,247,.06);box-shadow:0 0 18px -6px var(--nav-c,#a855f7),inset 0 0 16px -10px var(--nav-c,#a855f7)}
.navbtn.on::before{opacity:1}
.navbtn.on .nicon{transform:scale(1.1);filter:drop-shadow(0 0 5px var(--nav-c,#a855f7))}
.navbtn:active{transform:scale(.95)}
/* ── pathway page (hero + grid) ── */
.pathpage{flex:1;overflow-y:auto;padding:0 0 24px;scrollbar-width:thin;scrollbar-color:#7b2fff #0f0a1c}
.pathpage::-webkit-scrollbar{width:4px}
.pathpage::-webkit-scrollbar-thumb{background:#7b2fff;border-radius:2px}
.pathhero{position:relative;text-align:center;padding:22px 16px 20px;margin-bottom:8px;overflow:hidden;border-bottom:1px solid #a855f71f}
.pathhero-glow{position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,#a855f7 0%,transparent 65%);opacity:.1;pointer-events:none}
.pathbadge{position:relative;display:inline-block;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:#a855f7;border:1px solid #a855f744;border-radius:20px;padding:4px 15px;margin-bottom:12px;background:rgba(168,85,247,.05)}
.pathh1{position:relative;font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:#fff;text-shadow:0 0 16px #a855f777;letter-spacing:1px;margin-bottom:13px}
.pathguide{position:relative;font-size:12px;color:#a8d4e0;line-height:1.65;background:linear-gradient(135deg,rgba(168,85,247,.07),rgba(123,47,255,.07));border:1px solid #a855f722;border-radius:10px;padding:11px 14px;font-family:'Rajdhani',sans-serif;max-width:430px;margin:0 auto}
.pgroup{padding:0 14px;margin-bottom:22px}
.pgrouphdr{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.pgbar{width:4px;height:34px;border-radius:3px;flex-shrink:0;box-shadow:0 0 10px currentColor}
.pgicon{font-size:21px;line-height:1;flex-shrink:0}
.pginfo{flex:1;min-width:0}
.pglabel{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1.2}
.pgdesc{font-size:11px;color:#6a9aaa;font-family:'Rajdhani',sans-serif;margin-top:2px}
.pgstep{font-family:'Share Tech Mono',monospace;font-size:9px;color:#3a6578;letter-spacing:1px;flex-shrink:0}
.pgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.pcard{position:relative;display:flex;flex-direction:column;text-align:left;background:linear-gradient(160deg,#0e1a30,#0a1322);border:1px solid #ffffff12;border-top:2px solid var(--ac);border-radius:13px;padding:13px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#c8f0ff;min-height:152px;width:100%}
.pcardglow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;background:var(--ac);opacity:.1;transition:opacity .25s;pointer-events:none}
.pcard.done{border-color:#06d6a055}
.pcarddone{position:absolute;top:9px;right:9px;width:22px;height:22px;border-radius:50%;background:#06d6a0;color:#06121f;font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px -2px #06d6a0;z-index:3}
.pcard.current{box-shadow:0 0 0 1px var(--ac),0 0 22px -6px var(--ac);animation:currentpulse 1.8s ease-in-out infinite}
@keyframes currentpulse{0%,100%{box-shadow:0 0 0 1px var(--ac),0 0 18px -8px var(--ac)}50%{box-shadow:0 0 0 1px var(--ac),0 0 26px -2px var(--ac)}}
.pcardhere{position:absolute;top:9px;right:9px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:800;letter-spacing:.5px;color:#06121f;background:var(--ac);border-radius:6px;padding:3px 6px;z-index:3;animation:flamepulse 1s ease-in-out infinite alternate}
.pcard:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 10px 26px -10px var(--ac)}
.pcard:hover .pcardglow{opacity:.22}
.pcard:active{transform:translateY(-1px) scale(.98)}
.pcardlevel{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;color:var(--ac);opacity:.95;margin-bottom:7px}
.pcardicon{font-size:30px;line-height:1;margin-bottom:9px}
.pcardtitle{font-family:'Orbitron',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.2px;color:#fff;margin-bottom:4px;line-height:1.3}
.pcardsub{font-size:10.5px;color:#7fa8ba;line-height:1.4;flex:1;margin-bottom:10px}
.pcardkeys{display:inline-block;align-self:flex-start;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:#06d6a0;background:rgba(6,214,160,.12);border:1px solid #06d6a044;border-radius:7px;padding:2px 7px;margin-bottom:8px}
.pcardgo{display:flex;align-items:center;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;color:var(--ac);border-top:1px solid #ffffff10;padding-top:9px}
.pcardarrow{font-size:14px;transition:transform .2s}
.pcard:hover .pcardarrow{transform:translateX(4px)}
.pathfoot{text-align:center;font-size:10px;color:#4a7a8a;font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin:10px 14px 0;padding-top:14px;line-height:1.6;border-top:1px solid #a855f71a}
/* ── inline key picker panel (spans full grid row) ── */
.pcard.active{border-color:var(--ac);box-shadow:0 0 24px -8px var(--ac);transform:translateY(-2px)}
.keypanel{background:linear-gradient(165deg,#0a1424,#070e1a);border:1px solid var(--ac,#a855f7);border-radius:14px;padding:14px 13px;margin-top:10px;position:relative;overflow:hidden;animation:keyexpand .3s cubic-bezier(.2,.9,.3,1)}
.keypanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.6}
@keyframes keyexpand{from{opacity:0;transform:translateY(-8px) scaleY(.9)}to{opacity:1;transform:translateY(0) scaleY(1)}}
.keypanel-head{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid #ffffff10}
.keypanel-icon{font-size:18px;line-height:1}
.keypanel-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:.3px;flex:1;min-width:0}
.keypanel-tag{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--ac,#a855f7);letter-spacing:1px;white-space:nowrap}
.keygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.keybtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 5px;background:linear-gradient(160deg,#1a2a40,#0e1a2c);border:1px solid #2a3e58;border-radius:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.keybtn::after{content:'';position:absolute;inset:0;background:var(--ac,#a855f7);opacity:0;transition:opacity .18s}
.keybtn.black{background:linear-gradient(160deg,#0a1220,#060c16);border-color:#1a2638}
.keybtn-name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:#e0f0ff;line-height:1;position:relative;z-index:1}
.keybtn.black .keybtn-name{color:#8ad4ff}
.keybtn-sub{font-size:8.5px;font-family:'Rajdhani',sans-serif;font-weight:600;color:#6a8a9a;line-height:1;position:relative;z-index:1}
.keybtn:hover{transform:translateY(-3px);border-color:var(--ac,#a855f7);box-shadow:0 8px 18px -8px var(--ac,#a855f7)}
.keybtn:hover::after{opacity:.1}
.keybtn:active{transform:translateY(-1px) scale(.95)}
.keypanel-foot{text-align:center;font-size:9.5px;color:#4a7a8a;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;line-height:1.5}

.admintools{display:flex;gap:8px;padding:8px 14px 0;flex-shrink:0}
