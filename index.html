5️⃣ Half-Diminished (m7♭5) — 1-♭3-♭5-♭7

7️⃣ Augmented 7 (7♯5) — 1-3-♯5-♭7

 Chords' on piano. Explain what C/E means, creating smooth bass lines, and usage in Gospel/Soul/Ballad. List note names.",zh:"请教我钢琴上的'斜线和弦(Slash Chord)'。解释C/E是什么、创建流畅的低音线，以及在福音/灵魂/抒情中的运用。列出音名。"}},{id:"padchord",icon:"🌫️",title:{th:"แพดคอร์ด (Pad Chord)",en:"Pad Chord",zh:"铺底和弦 (Pad Chord)"},subtitle:{th:"Harmony ขั้นสูง — เสียงพื้นหลังที่ลอย",en:"Advanced harmony — floating background",zh:"高级和声 — 漂浮的背景音"},level:8,color:"#d97757",group:"advanced",demo:["C4","G4","B4","D5","E5"],demoMode:"chord",learn:{th:"ช่วยสอนเรื่อง 'แพดคอร์ด (Pad Chord)' และ voicing ขั้นสูงบนเปียโนให้หน่อยครับ อธิบาย open voicing การกระจายโน้ตแบบ 4th/5th และการใช้ใน EDM/Ambient/Neo Soul เพื่อสร้างบรรยากาศล้ำๆ ตอบภาษาไทยและระบุชื่อโน้ต",en:"Please teach me about 'Pad Chords' and advanced voicing on piano. Explain open voicing, spreading notes in 4ths/5ths, and usage in EDM/Ambient/Neo Soul. List note names.",zh:"请教我钢琴上的'铺底和弦(Pad Chord)'和高级配置。解释开放配置、以4度/5度分散音符，以及在EDM/氛围/新灵魂乐中的运用。列出音名。"}},{id:"why-music",icon:"🌍",level:9,color:"#d97757",group:"benefits",title:{th:"ประโยชน์ของดนตรี",en:"Why Music Matters",zh:"音乐的力量"},subtitle:{th:"ทำไมดนตรีถึงทรงพลัง",en:"The power of music",zh:"为何音乐如此重要"},content:{th:`🌍 ดนตรีไม่ใช่แค่ความบันเทิง แต่เป็นเครื่องมือที่ส่งผลต่อสมอง อารมณ์ เศรษฐกิจ และสังคม

🧠 ต่อสมองและอารมณ์
• กระตุ้นการหลั่งโดพามีน (สารแห่งความสุข) และลดฮอร์โมนความเครียด cortisol
• ช่วยความจำ สมาธิ และการเรียนรู้ — เด็กที่เล่นดนตรีมักมีพัฒนาการด้านภาษาและคณิตศาสตร์ดีขึ้น

🤝 ต่อสังคม
• สร้างความรู้สึกเป็นอันหนึ่งอันเดียวกัน ปลุกอารมณ์ร่วมของคนหมู่มาก
• เป็น "ภาษาสากล" ที่สื่อสารข้ามวัฒนธรรมและพรมแดน

ใน 5 บทถัดไป เราจะดูว่ามนุษย์ใช้ดนตรีจริงอย่างไรใน: ธุรกิจ 💼 · การทหาร 🎺 · ความเป็นชาติ 🇹🇭 · ชนชั้นสูง 👑 · และการบำบัดรักษา 💚`,en:`🌍 Music is not just entertainment — it shapes the brain, emotions, the economy and society.

🧠 Brain & emotion
• Triggers dopamine (the "feel-good" chemical) and lowers the stress hormone cortisol
• Boosts memory, focus and learning — kids who play music often gain language and math skills

🤝 Society
• Builds unity and stirs the shared emotion of large crowds
• A "universal language" that crosses cultures and borders

In the next 5 chapters we'll see how people really use music in: Business 💼 · the Military 🎺 · National identity 🇹🇭 · the Elite 👑 · and Healing 💚`,zh:`🌍 音乐不只是娱乐，它影响大脑、情绪、经济与社会。

🧠 大脑与情绪
• 促进多巴胺（快乐物质）分泌，降低压力激素皮质醇
• 提升记忆、专注与学习——学音乐的孩子常在语言和数学上更出色

🤝 社会
• 凝聚人心，激发群体共同的情感
• 是跨越文化与国界的"世界语言"

接下来5章，我们将看人类如何真正运用音乐：商业 💼 · 军事 🎺 · 国家认同 🇹🇭 · 精英阶层 👑 · 与疗愈 💚`}},{id:"music-business",icon:"💼",level:10,color:"#d97757",group:"benefits",title:{th:"ดนตรีกับธุรกิจ",en:"Music in Business",zh:"音乐与商业"},subtitle:{th:"เสียงที่ขายของได้",en:"Sound that sells",zh:"会卖货的声音"},content:{th:`💼 เสียงสร้างยอดขายและแบรนด์ได้จริง

🛒 เพลงในร้าน = ยอดขาย
งานวิจัยคลาสสิกของ Milliman (1982): เปิดเพลงจังหวะช้าในซูเปอร์มาร์เก็ต ทำให้ลูกค้าเดินช้าลง อยู่นานขึ้น ยอดขายเพิ่มถึง ~38% ในร้านอาหาร เพลงช้าทำให้ลูกค้านั่งนานและสั่งเครื่องดื่มมากขึ้น

🔔 Sonic Branding (โลโก้เสียง)
• Intel เสียง 4 โน้ต มูลค่าแบรนด์กว่า 200 ล้านดอลลาร์
• Mastercard สร้างเสียง 6 โน้ตที่ดังทุกครั้งที่จ่ายเงิน (2019)
• McDonald's "I'm Lovin' It" — แบรนด์ที่มี sonic logo จดจำได้สูงขึ้นถึง 8 เท่า

🌎 ระดับโลก: Coca-Cola, Apple, Spotify ใช้ดนตรีเป็นหัวใจการตลาด

🇹🇭 ไทย: วงร็อก "คาราบาว" ต่อยอดเป็นเครื่องดื่มชูกำลัง Carabao Daeng จนได้สปอนเซอร์ฟุตบอลอังกฤษ (Carabao Cup) — เปลี่ยนชื่อเสียงทางดนตรีเป็นแบรนด์ระดับโลก

🇨🇳 จีน: เพลงธีม "蜜雪冰城 (Mixue)" ปี 2021 (ดัดแปลงจาก Oh! Susanna) ไวรัลสุดขีด แฮชแท็กบน Douyin/TikTok ทะลุ 1.58 พันล้านครั้ง ดันแบรนด์ชานม-ไอศกรีมโตทั่วเอเชีย

💡 สรุป: เสียง → อารมณ์ → การตัดสินใจซื้อ`,en:`💼 Sound really drives sales and brand power.

🛒 In-store music = sales
The classic Milliman (1982) study: slow-tempo music in a supermarket made shoppers linger and lifted sales by ~38%. In restaurants, slow music keeps guests longer and they order more drinks.

🔔 Sonic branding (audio logos)
• Intel's 4-note tune is worth over $200 million in brand value
• Mastercard built a 6-note sound that plays on every payment (2019)
• McDonald's "I'm Lovin' It" — brands with a sonic logo are recalled up to 8× better

🌎 Global: Coca-Cola, Apple and Spotify put music at the heart of marketing.

🇹🇭 Thailand: rock band "Carabao" became the Carabao Daeng energy drink and now sponsors English football's Carabao Cup — turning musical fame into a global brand.

🇨🇳 China: the "Mixue" theme song (2021, adapted from Oh! Susanna) went viral with 1.58 billion plays under Douyin/TikTok hashtags, fueling the tea-and-ice-cream chain across Asia.

💡 Takeaway: sound → emotion → buying decision.`,zh:`💼 声音确实能带动销售与品牌力。

🛒 店内音乐 = 销售额
经典的 Milliman（1982）研究：超市播放慢节奏音乐让顾客停留更久，销售额提升约38%。餐厅里慢音乐让客人坐得更久、点更多饮品。

🔔 声音品牌（听觉标志）
• 英特尔的4音旋律品牌价值超2亿美元
• 万事达卡打造每次付款都会响起的6音之声（2019）
• 麦当劳"I'm Lovin' It"——拥有声音标志的品牌记忆度可高出8倍

🌎 全球：可口可乐、苹果、Spotify 都把音乐作为营销核心。

🇹🇭 泰国：摇滚乐队"Carabao（卡拉宝）"延伸成卡拉宝能量饮料，如今赞助英格兰联赛杯（Carabao Cup）——把音乐名气变成全球品牌。

🇨🇳 中国："蜜雪冰城"主题曲（2021，改编自《哦！苏珊娜》）爆红，抖音/TikTok 话题播放量超15.8亿次，推动这家茶饮冰淇淋品牌火遍亚洲。

💡 要点：声音 → 情绪 → 购买决定。`}},{id:"music-military",icon:"🎺",level:11,color:"#d97757",group:"benefits",title:{th:"ดนตรีในกองทัพ",en:"Music in the Military",zh:"军队中的音乐"},subtitle:{th:"สั่งการ ปลุกใจ ข่มขวัญ",en:"Command, morale, intimidation",zh:"指挥·士气·震慑"},content:{th:`🎺 กองทัพใช้ดนตรีมานานนับพันปี

📡 สื่อสารและสั่งการ
ในอดีต กลอง แตร และปี่ ใช้ส่งสัญญาณในสนามรบ เสียงเดินทางไกลและสั่งการทหารจำนวนมากให้เคลื่อนพร้อมกัน (เช่น แตรปลุก แตรโจมตี แตรถอย)

🥁 ขวัญและความสามัคคี
วงดุริยางค์ทหารและการ "นับจังหวะเดิน" (cadence) ทำให้หน่วยเดินพร้อมเพรียง ฮึกเหิม และรู้สึกเป็นหนึ่งเดียว

🎶 ปี่สก็อต (Bagpipes)
กรมทหารสก็อตเป่าปี่นำทัพเข้าสู้ สร้างขวัญฝ่ายตนและข่มขวัญศัตรู โดดเด่นมากในสงครามโลกครั้งที่ 1

🔊 สงครามจิตวิทยา
กองทัพยุคใหม่เคยเปิดเพลงเสียงดังกดดันศัตรู เช่น ปฏิบัติการกดดันนายพลโนรีเอกาที่ปานามา ปี 1989

💡 สรุป: ดนตรี = เครื่องมือบังคับบัญชา ขวัญกำลังใจ และจิตวิทยา`,en:`🎺 Armies have used music for thousands of years.

📡 Communication & command
Drums, bugles and fifes once carried orders across the battlefield — sound travels far and moves large numbers of troops together (wake-up, charge, retreat calls).

🥁 Morale & cohesion
Military bands and marching "cadence" calls keep units in step, fired up, and feeling as one.

🎶 Bagpipes
Scottish regiments piped their troops into battle to lift their own morale and unnerve the enemy — famously in World War I.

🔊 Psychological warfare
Modern armies have blasted loud music to pressure opponents — e.g. the operation against General Noriega in Panama, 1989.

💡 Takeaway: music = a tool of command, morale and psychology.`,zh:`🎺 军队使用音乐已有数千年。

📡 通信与指挥
古时鼓、号、笛在战场上传递命令——声音传得远，能让大批士兵同步行动（起床号、冲锋号、撤退号）。

🥁 士气与凝聚
军乐队和行进"口令节奏"(cadence) 让队伍步伐一致、斗志高昂、融为一体。

🎶 苏格兰风笛
苏格兰军团吹着风笛冲锋，既鼓舞己方又震慑敌人——一战中尤为著名。

🔊 心理战
现代军队曾用高音量音乐施压对手——例如1989年巴拿马针对诺列加将军的行动。

💡 要点：音乐 = 指挥、士气与心理的工具。`}},{id:"music-nation",icon:"🇹🇭",level:12,color:"#d97757",group:"benefits",title:{th:"ดนตรีกับความเป็นชาติ",en:"Music & National Identity",zh:"音乐与国家认同"},subtitle:{th:"เสียงที่หลอมรวมผู้คน",en:"Sound that unites a people",zh:"凝聚人民的声音"},content:{th:`🇹🇭 ดนตรีสร้าง "สำนึกร่วม" ของคนทั้งชาติ

🎵 เพลงชาติ
เครื่องมือสร้างความเป็นชาติที่ทรงพลังที่สุด ประเทศไทยเปิดเพลงชาติทุกวันเวลา 08:00 และ 18:00 ทั่วประเทศ และมีเพลงสรรเสริญพระบารมีในโรงภาพยนตร์

🔥 ปฏิวัติและรวมชาติ
• "La Marseillaise" จุดไฟการปฏิวัติฝรั่งเศส
• "Va, pensiero" ของแวร์ดี กลายเป็นเพลงปลุกใจรวมชาติอิตาลี
• "Finlandia" ของซิเบลิอุส สัญลักษณ์การต่อสู้เพื่อเอกราชของฟินแลนด์

🇨🇳 จีน: เพลงชาติ "义勇军进行曲 (March of the Volunteers)" มาจากภาพยนตร์ปี 1935 เป็นเพลงปลุกใจต้านการรุกราน

🌟 ยุคใหม่: K-pop (เช่น BTS) กลายเป็น "soft power" สร้างภาพลักษณ์และรายได้มหาศาลให้เกาหลีใต้

💡 สรุป: ดนตรีทำให้ผู้คนรู้สึกเป็น "พวกเดียวกัน"`,en:`🇹🇭 Music forges a shared sense of nationhood.

🎵 National anthems
The most powerful nation-building tool. Thailand plays its anthem nationwide every day at 08:00 and 18:00, and the Royal Anthem in cinemas.

🔥 Revolution & unification
• "La Marseillaise" lit the fire of the French Revolution
• Verdi's "Va, pensiero" became a rallying song for Italian unification
• Sibelius's "Finlandia" symbolized Finland's fight for independence

🇨🇳 China: the anthem "March of the Volunteers" came from a 1935 film — a song of resistance.

🌟 Today: K-pop (e.g. BTS) is "soft power," building South Korea's image and huge revenue.

💡 Takeaway: music makes people feel they belong to one another.`,zh:`🇹🇭 音乐铸就全民共同的"国家感"。

🎵 国歌
最有力的国家建构工具。泰国每天08:00与18:00全国播放国歌，影院里播放颂圣歌。

🔥 革命与统一
• 《马赛曲》点燃法国大革命
• 威尔第《飞吧，思想》成为意大利统一的号召之歌
• 西贝柳斯《芬兰颂》象征芬兰争取独立的抗争

🇨🇳 中国：国歌《义勇军进行曲》源自1935年电影，是抗争之歌。

🌟 当代：K-pop（如 BTS）成为"软实力"，为韩国塑造形象并带来巨大收益。

💡 要点：音乐让人们感到彼此同属一体。`}},{id:"music-elite",icon:"👑",level:13,color:"#d97757",group:"benefits",title:{th:"ดนตรีกับชนชั้นสูง",en:"Music & the Elite",zh:"音乐与精英阶层"},subtitle:{th:"สัญลักษณ์ของอำนาจและรสนิยม",en:"A symbol of power and taste",zh:"权力与品味的象征"},content:{th:`👑 ดนตรีเป็นเครื่องแสดงสถานะของชนชั้นสูงมาช้านาน

🎼 ระบบอุปถัมภ์ (Patronage)
ในยุโรป ขุนนางและราชสำนักเลี้ยงดูคีตกวี เช่น ไฮเดิน รับใช้ราชวงศ์ Esterházy; โมสาร์ทและเบโทเฟนพึ่งพาชนชั้นสูงเวียนนา การมีคีตกวีประจำตัวคือเครื่องแสดงรสนิยมและอำนาจ

🇫🇷 ราชสำนักฝรั่งเศส
พระเจ้าหลุยส์ที่ 14 (Sun King) ทรงเต้นบัลเลต์เอง และใช้ดนตรี-นาฏศิลป์ที่พระราชวังแวร์ซายแสดงพระราชอำนาจ

🇹🇭 ไทย
ดนตรีในราชสำนัก (วงปี่พาทย์) สืบทอดยาวนาน และในหลวงรัชกาลที่ 9 ทรงเป็นคีตกวีแจ๊สที่โลกยอมรับ พระราชนิพนธ์ เช่น "สายฝน" และ "H.M. Blues"

🇨🇳 จีน
"雅乐 (yayue)" ดนตรีพิธีในราชสำนัก และ "กู่ฉิน (guqin)" เครื่องดนตรีของปราชญ์และผู้ดีจีน ใช้ขัดเกลาจิตใจให้สูงส่ง

💡 สรุป: ดนตรี = สัญลักษณ์ของอำนาจ การศึกษา และรสนิยมชั้นสูง`,en:`👑 Music has long signaled the status of the elite.

🎼 The patronage system
In Europe, nobles and courts employed composers — Haydn served the Esterházy princes; Mozart and Beethoven relied on Vienna's aristocracy. Keeping a composer showed taste and power.

🇫🇷 The French court
Louis XIV, the "Sun King," danced ballet himself and used music and dance at Versailles to display royal power.

🇹🇭 Thailand
Royal court music (piphat ensembles) has a long lineage, and King Rama IX (Bhumibol) was a world-respected jazz composer — works like "Falling Rain (Saiyon)" and "H.M. Blues."

🇨🇳 China
"Yayue" ritual court music, and the "guqin" — the instrument of scholars and gentlemen, used to refine the mind.

💡 Takeaway: music = a symbol of power, education and refined taste.`,zh:`👑 音乐长久以来彰显精英阶层的地位。

🎼 赞助制度
在欧洲，贵族与宫廷供养作曲家——海顿为埃斯特哈齐家族服务；莫扎特、贝多芬依赖维也纳贵族。拥有专属作曲家象征品味与权力。

🇫🇷 法国宫廷
"太阳王"路易十四亲自跳芭蕾，并在凡尔赛宫以音乐舞蹈彰显王权。

🇹🇭 泰国
宫廷音乐（披帕乐团）传承悠久；泰国九世王（普密蓬）是受世界尊敬的爵士作曲家，作品如《Falling Rain（สายฝน）》与《H.M. Blues》。

🇨🇳 中国
"雅乐"为宫廷礼仪音乐；"古琴"是文人雅士的乐器，用以修身养性。

💡 要点：音乐 = 权力、教养与高雅品味的象征。`}},{id:"music-therapy",icon:"💚",level:14,color:"#d97757",group:"benefits",title:{th:"ดนตรีบำบัด",en:"Music Therapy",zh:"音乐疗法"},subtitle:{th:"เยียวยากาย ใจ และสมอง",en:"Healing & wellness",zh:"疗愈与健康"},content:{th:`💚 ดนตรีคือ "ยา" ที่ช่วยกาย ใจ และสมอง

🏥 เป็นวิชาชีพการแพทย์จริง
ดนตรีบำบัด (Music Therapy) มีสมาคมวิชาชีพ (เช่น AMTA) และใช้ในโรงพยาบาลทั่วโลก

🧠 ฟื้นฟูสมอง
• ผู้ป่วยหลอดเลือดสมองที่พูดไม่ได้ (aphasia) ใช้ "Melodic Intonation Therapy" ร้องเป็นทำนองเพื่อกลับมาพูด
• ผู้ป่วยพาร์กินสันใช้จังหวะดนตรีช่วยให้เดินมั่นคงขึ้น

💭 ความจำ
ผู้ป่วยอัลไซเมอร์/สมองเสื่อม มักจำเพลงเก่าได้ และตอบสนองดีขึ้นเมื่อได้ฟังเพลงในวัยหนุ่มสาว

😌 ลดเครียดและความเจ็บปวด
ดนตรีลดฮอร์โมน cortisol ความดันโลหิต และความวิตกกังวล จึงใช้ก่อน/ระหว่างผ่าตัด และดูแลทารกคลอดก่อนกำหนด (NICU)

🌟 ตัวอย่างจริง: ส.ส.สหรัฐ Gabby Giffords ฟื้นความสามารถในการพูดด้วยดนตรีบำบัดหลังถูกยิงที่ศีรษะ

💡 สรุป: ดนตรีคือยาไร้ผลข้างเคียงที่เยียวยาทั้งร่างกายและจิตใจ`,en:`💚 Music is "medicine" for body, mind and brain.

🏥 A real medical profession
Music therapy has professional bodies (e.g. AMTA) and is used in hospitals worldwide.

🧠 Brain recovery
• Stroke patients who can't speak (aphasia) use "Melodic Intonation Therapy" — singing words back into speech
• Parkinson's patients use musical rhythm to walk more steadily

💭 Memory
People with Alzheimer's/dementia often still remember old songs and respond better to music from their youth.

😌 Less stress & pain
Music lowers cortisol, blood pressure and anxiety — used before/during surgery and in newborn intensive care (NICU).

🌟 Real case: U.S. Congresswoman Gabby Giffords regained her speech through music therapy after being shot in the head.

💡 Takeaway: music is a side-effect-free medicine that heals body and mind.`,zh:`💚 音乐是身、心、脑的"良药"。

🏥 真正的医疗专业
音乐疗法有专业协会（如 AMTA），在全球医院中应用。

🧠 大脑康复
• 无法说话的中风（失语症）患者用"旋律语调疗法"，把词语唱回成语言
• 帕金森患者借助音乐节奏让步态更稳

💭 记忆
阿尔茨海默/失智患者常仍记得老歌，听到年轻时的音乐反应更好。

😌 减压与止痛
音乐降低皮质醇、血压与焦虑——用于手术前后及新生儿重症监护（NICU）。

🌟 真实案例：美国国会议员 Gabby Giffords 头部中枪后，通过音乐疗法重新恢复了说话能力。

💡 要点：音乐是没有副作用的良药，疗愈身心。`}},{id:"music-marketing",icon:"📣",level:15,color:"#d97757",group:"benefits",title:{th:"การตลาดสำหรับศิลปิน",en:"Marketing for Artists",zh:"音乐人营销"},subtitle:{th:"ทำเพลงให้ดังและขายได้",en:"Get heard & get paid",zh:"让作品被听见并变现"},content:{th:`📣 ยุคนี้ "เก่งอย่างเดียวไม่พอ" — ต้องทำให้คนได้ยินและรักคุณด้วย

🎯 หัวใจ 3 ข้อ
• สร้างฐานแฟน (fanbase) ที่ผูกพัน ไม่ใช่แค่ยอดวิว
• เลือกแพลตฟอร์มให้ถูก — TikTok/Reels คือเครื่องมือค้นพบเบอร์ 1 ของยุคนี้
• หารายได้หลายทาง: สตรีม + ทัวร์ + สินค้า (merch) + แฟนคลับโดยตรง

💸 ความจริงเรื่องเงิน
สตรีมมิ่งจ่ายน้อยมาก (ต่อสตรีม ~$0.003–0.005) ศิลปินยุคใหม่จึงโตด้วย "แฟนตัวจริง" ที่ยอมจ่าย — ทัวร์ เสื้อ ของสะสม และช่องทางตรงถึงแฟน

👉 แตะกรณีศึกษาด้านล่างเพื่อดูว่าศิลปินระดับโลกทำการตลาดยังไง`,en:`📣 Today, talent alone isn't enough — you must be heard and loved too.

🎯 Three essentials
• Build a real, bonded fanbase, not just view counts
• Pick the right platform — short video (TikTok/Reels) is today's #1 discovery engine
• Earn from many streams: streaming + touring + merch + direct-to-fan

💸 The money truth
Streaming pays very little (~$0.003–0.005 per stream), so modern artists grow on TRUE fans who pay — tours, shirts, collectibles and direct channels.

👉 Tap a case study below to see how world-class artists market themselves.`,zh:`📣 如今光有才华还不够——还必须被听见、被喜爱。

🎯 三大要点
• 打造真正有黏性的粉丝群，而不只是播放量
• 选对平台——短视频（TikTok/Reels）是当今头号发现引擎
• 多元收入：流媒体 + 巡演 + 周边 + 直接面向粉丝

💸 关于钱的真相
流媒体单次播放收入极低（约 $0.003–0.005），所以现代音乐人靠"真爱粉"变现——巡演、T恤、收藏品与直连渠道。

 mysterious, floating",zh:"奇特、神秘、飘忽",formula:"1–3–♯5"}},zv={maj7:{th:"หรูหรา นุ่มนวล ฟังสบาย",en:"lush and smooth — easy on the ear",zh:"华丽、柔顺、悦耳",formula:"1–3–5–7"},dom7:{th:"อยากคลี่คลายลงไป มักใช้ในบลูส์/แจ๊ส",en:"wants to resolve — a staple of blues and jazz",zh:"渴望解决，是蓝调与爵士的常客",formula:"1–3–5–♭7"},min7:{th:"นุ่ม เท่ ผ่อนคลาย",en:"soft, cool, and relaxed",zh:"柔和、酷、放松",formula:"1–♭3–5–♭7"},minmaj7:{th:"ลึกลับ สไตล์ธีมสายลับ",en:"mysterious — classic spy-movie sound",zh:"神秘，经典间谍片音色",formula:"1–♭3–5–7"},halfdim:{th:"หม่นเศร้า ตึงเครียดเบา ๆ",en:"melancholy, gently tense",zh:"忧郁，略带紧张",formula:"1–♭3–♭5–♭7"},dim7:{th:"ตึงที่สุดในกลุ่มนี้ ใช้เชื่อมคอร์ดได้อย่างนุ่มนวล",en:"the tensest of the group — a smooth connector between chords",zh:"此组中最紧张，是和弦间的圆滑过渡",formula:"1–♭3–♭5–♭♭7"},aug7:{th:"โดมินันต์แปลกๆ อยากคลี่คลายแบบมีสีสัน",en:"an edgy dominant that resolves with extra color",zh:"另类属和弦，带着色彩感解决",formula:"1–3–♯5–♭7"},augmaj7:{th:"ฝันลอย ล้ำสมัย",en:"dreamy and futuristic",zh:"梦幻、前卫",formula:"1–3–♯5–7"}};function ko(t,e){return(e==="th"?["ราก (Root)","3rd","5th","7th"]:e==="zh"?["根音 (Root)","三音","五音","七音"]:["Root","3rd","5th","7th"])[t]||`#${t+1}`}function HT(t,e,n,r,s,a,l){const o=s.join(" ");if(t.demoMode==="scale"&&!t.types){const c={th:`🎼 ${a} · ${n}

ปี 1975 José Antonio Abreu นักเศรษฐศาสตร์และนักดนตรีชาวเวเนซุเอลา รวมเด็ก 11 คนในโรงจอดรถร้างกลางกรุงการากัส เริ่มซ้อมดนตรีด้วยกัน เขาเรียกแนวคิดนี้ว่า 'ดนตรีเพื่อการเปลี่ยนแปลงทางสังคม' — และที่สำคัญคือให้กระทรวง 'สวัสดิการสังคม' เป็นผู้สนับสนุนงบ ไม่ใช่กระทรวงศิลปวัฒนธรรม ความตั้งใจชัดเจนตั้งแต่วันแรก: นี่ไม่ใช่โครงการปั้นนักเปียโนคอนเสิร์ต แต่เป็นการมอบสิ่งที่กล่องไวโอลินเก็บไว้ได้ แต่แก๊งอันธพาลแย่งไปไม่ได้ — วินัย ความรู้สึกเป็นส่วนหนึ่ง และเหตุผลให้มาโรงเรียนทุกวัน

ผ่านไป 50 ปี El Sistema (ชื่อทางการ FESNOJIV) เข้าถึงเด็กราว 1.2 ล้านคนทั่วเวเนซุเอลา จากที่มีเพียง 60,000 คนตอน Eduardo Méndez เข้ารับตำแหน่งผู้อำนวยการบริหารปี 2008 ศิษย์เก่าที่โด่งดังที่สุดคือ Gustavo Dudamel ผู้เริ่มเล่นไวโอลินตั้งแต่เด็กใน El Sistema และปัจจุบันเป็นผู้อำนวยการดนตรีของทั้ง LA Philharmonic และวง Simón Bolívar Symphony Orchestra ของเวเนซุเอลาเอง — วงเดียวกับที่ระบบนี้ปั้นเขาขึ้นมา ภายหลัง Dudamel ยังสร้าง YOLA (Youth Orchestra Los Angeles) ในสหรัฐฯ นำโมเดลของ El Sistema — แจกเครื่องดนตรีฟรี ซ้อมกลุ่มทุกวัน รุ่นพี่สอนรุ่นน้อง — ไปปลูกในย่านยากจนที่สุดของ LA

แนวคิดนี้ถูกนำไปใช้ทั่วโลก ปัจจุบันมีโครงการที่ได้แรงบันดาลใจจาก El Sistema ในกว่า 70 ประเทศ รวมถึงอย่างน้อย 80 โครงการแยกกันในสหรัฐฯ เพียงประเทศเดียว

💡 บทเรียน: El Sistema ไม่ได้สำเร็จเพราะสอนทฤษฎีดนตรีเร็วกว่าใคร แต่สำเร็จเพราะการเล่นดนตรีเป็นวง — การมาให้ตรงเวลา ฟังเพื่อนร่วมวง เล่นส่วนของตัวเองให้วงทั้งหมดฟังดี — สอนทักษะสังคมที่ชุมชนยากไร้ต้องการที่สุดโดยไม่รู้ตัว (วินัย การทำงานเป็นทีม คุณค่าในตัวเอง) สิ่งที่ Abreu คิดค้นจริงๆ ไม่ใช่หลักสูตร แต่คือการทำให้ดนตรีเป็น 'นโยบายสังคม' ไม่ใช่แค่ 'นโยบายศิลปะ'`,en:`🇻🇪 El Sistema — from a garage to 1.2 million children

In 1975, Venezuelan economist, musician and activist José Antonio Abreu gathered just 11 students in an abandoned parking garage in Caracas and started rehearsing. He called his idea 'Music for Social Change' — and, crucially, had it funded not by the ministry of arts, but by the ministry of social welfare. The message was clear from day one: this was never really about producing concert pianists. It was about giving Venezuela's poorest children something a violin case can hold that a rival gang can't take away — discipline, belonging, and a reason to show up every single day.

Fifty years later, El Sistema (formally FESNOJIV) reaches an estimated 1.2 million children across Venezuela, up from about 60,000 when Eduardo Méndez became executive director in 2008. Its most famous graduate is Gustavo Dudamel, who started on the violin as a boy in El Sistema and now serves as Music & Artistic Director of both the Los Angeles Philharmonic and Venezuela's own Simón Bolívar Symphony Orchestra — the very orchestra the program built him toward. Dudamel later built YOLA (Youth Orchestra Los Angeles) in the US, transplanting El Sistema's model — free instruments, daily group rehearsal, older students teaching younger ones — into some of LA's poorest neighborhoods.

The idea proved exportable: comparable 'El Sistema-inspired' programs now operate in more than 70 countries, including at least 80 separate programs across the United States alone.

💡 Lesson: El Sistema didn't succeed by teaching music theory faster. It succeeded because ensemble music — showing up, listening to each other, playing your part so the whole group sounds right — quietly teaches the exact social skills (discipline, teamwork, self-worth) struggling communities need most. Abreu's real invention wasn't a curriculum; it was funding music as social policy, not art policy.`,zh:`🇻🇪 El Sistema——从废弃车库到120万儿童

1975年，委内瑞拉经济学家兼音乐家何塞·安东尼奥·阿布雷乌（José Antonio Abreu）在加拉加斯一个废弃停车场里召集了11名学生，开始一起排练。他把这个构想称为"音乐促进社会变革"——关键在于，资助它的不是文化艺术部，而是社会福利部。从第一天起，目标就很清楚：这从来不是要培养音乐会钢琴家，而是给委内瑞拉最贫困的孩子一样帮派抢不走的东西——纪律、归属感，以及每天都愿意出现的理由。

五十年后，El Sistema（正式名称FESNOJIV）覆盖委内瑞拉全国约120万儿童，而2008年Eduardo Méndez就任执行主任时这个数字仅约6万。最著名的毕业生是古斯塔沃·杜达梅尔（Gustavo Dudamel），他幼年在El Sistema学习小提琴，如今身兼洛杉矶爱乐乐团与委内瑞拉西蒙·玻利瓦尔交响乐团（正是培养他的那支乐团）的音乐总监。后来杜达梅尔在美国创立YOLA（洛杉矶青年管弦乐团），把El Sistema的模式——免费乐器、每日集体排练、高年级教低年级——移植到洛杉矶最贫困的社区。

这个理念被证明可以输出：如今全球70多个国家都有受El Sistema启发的类似项目，仅美国一地就有至少80个独立项目。

💡 启示：El Sistema的成功不是因为教乐理教得更快，而是因为合奏音乐——准时到场、倾听同伴、弹好自己的声部让整体听起来和谐——在不知不觉中教会了贫困社区最需要的社会技能（纪律、协作、自我价值感）。阿布雷乌真正的创造不是一套课程，而是把音乐当作"社会政策"而非"艺术政策"来投入资金。`}},{id:"voyager",icon:"🛰️",title:{th:"แผ่นทองคำ Voyager",en:"NASA Golden Record",zh:"旅行者金唱片"},content:{th:`🛰️ แผ่นเสียงทองคำ — เมื่อมนุษย์เลือก "ดนตรี" เป็นตัวแทนตัวเอง

ปี 1977 แผ่นเสียงทองแดงชุบทองคำที่เหมือนกันสองแผ่นถูกติดไว้ข้างยานอวกาศ Voyager 1 และ Voyager 2 ของนาซาก่อนปล่อยออกไปยังขอบระบบสุริยะ คณะกรรมการที่มีนักดาราศาสตร์ Carl Sagan เป็นประธาน — พร้อมด้วยผู้กำกับศิลป์ Ann Druyan, โปรดิวเซอร์ Timothy Ferris, นักชาติพันธุ์ดนตรีวิทยา Robert E. Brown และ Alan Lomax และวิศวกรเสียงหนุ่มชื่อ Jimmy Iovine (ผู้ภายหลังร่วมก่อตั้งค่าย Interscope Records และแบรนด์ Beats) — ต้องตัดสินใจภายในไม่กี่เดือนว่าอะไรคือตัวแทนที่ดีที่สุดของมวลมนุษยชาติ สำหรับใครก็ตามที่อาจพบแผ่นนี้สักวันหนึ่ง ที่ไหนสักแห่ง

พวกเขาเลือกภาพ 116 ภาพ เสียงธรรมชาติอย่างลมและเสียงวาฬ คำทักทายใน 55 ภาษา — และหัวใจของแผ่นเสียงคือดนตรีความยาวราว 90 นาที รวม 27 เพลง ตั้งแต่ Bach และ Beethoven ไปจนถึงบทสวดกลางคืนของชาวนาวาโฮ จังหวะเพอร์คัสชันจากเซเนกัล ปี่แพนของเปรู และเพลงชากูฮาจิของญี่ปุ่น เพลงที่ถกเถียงกันมากที่สุดคือ "Johnny B. Goode" ของ Chuck Berry — Lomax แย้งว่าร็อกแอนด์โรลนั้น "เป็นแค่ของวัยรุ่น" ไม่ควรอยู่ในนั้น แต่คำตอบของ Sagan กลายเป็นหนึ่งในประโยคที่ถูกอ้างอิงมากที่สุดของโครงการนี้: "ในดาวเคราะห์ดวงนี้มีวัยรุ่นเยอะแยะนะ" ริฟฟ์กีตาร์ของ Berry จึงได้ไปต่อ

อีกหนึ่งรายละเอียดที่คนไม่ค่อยพูดถึง: ทีมงานบันทึกคลื่นสมองและการเต้นของหัวใจของ Ann Druyan ผู้กำกับศิลป์เป็นเวลาราวหนึ่งชั่วโมง ขณะที่เธอคิดถึงประวัติศาสตร์โลก อารยธรรมต่างๆ และการตกหลุมรัก — แล้วบีบอัดชั่วโมงนั้นให้เหลือเสียงราวหนึ่งนาที บรรจุไว้ในแผ่นเดียวกัน

💡 บทเรียน: จากทุกสิ่งที่มนุษย์เคยสร้างมา ทีมงานไม่ได้เลือกส่งสูตรคณิตศาสตร์หรือตำราปรัชญาไปเป็นบัตรแนะนำตัวของมนุษยชาติ พวกเขาเลือกส่ง "ดนตรี" — เพราะเชื่อว่านี่คือสิ่งเดียวที่อาจข้ามผ่านกำแพงภาษาที่อาจไม่ต้องใช้ภาษาเลยด้วยซ้ำ`,en:`🛰️ The Golden Record — humanity picked music to speak for us

In 1977, two identical gold-plated copper phonograph records were bolted to the sides of NASA's Voyager 1 and Voyager 2 spacecraft before they launched toward, and eventually past, the edge of the solar system. A committee chaired by astronomer Carl Sagan — including creative director Ann Druyan, producer Timothy Ferris, ethnomusicologists Robert E. Brown and Alan Lomax, and a young sound engineer named Jimmy Iovine (who'd later co-found Interscope Records and Beats Electronics) — had to decide, in a few months, what best represented the entire human species to whoever might find it, someday, somewhere.

They chose 116 images, natural sounds like wind and whale song, spoken greetings in 55 languages — and, at the emotional center of the record, roughly 90 minutes of music: 27 tracks spanning Bach and Beethoven to a Navajo night chant, Senegalese percussion, Peruvian panpipes, and a Japanese shakuhachi piece. The most-debated inclusion was Chuck Berry's 'Johnny B. Goode.' Lomax argued rock and roll was 'adolescent' and didn't belong; Sagan's answer became one of the most quoted lines in the whole project: 'There are a lot of adolescents on the planet.' Berry's guitar riff won.

One more detail rarely makes it into the highlight reel: for about an hour, technicians recorded creative director Ann Druyan's own brainwaves and heartbeat while she thought about Earth's history, its civilizations, falling in love — then compressed that hour into roughly one minute of sound, riding along on the same record.

💡 Lesson: given the entire span of human achievement to choose from, the team didn't send a mathematical proof or a philosophy text as humanity's calling card. They sent music — because it was the one thing they believed could cross a language barrier that might not even involve language at all.`,zh:`🛰️ 金唱片——人类选择用"音乐"代表自己

1977年，两张一模一样的镀金铜质唱片被固定在NASA旅行者1号和旅行者2号探测器的侧面，随后飞向并最终飞出太阳系边缘。一个由天文学家卡尔·萨根（Carl Sagan）担任主席的委员会——成员包括创意总监安·德鲁扬（Ann Druyan）、制作人蒂莫西·费里斯（Timothy Ferris）、民族音乐学家罗伯特·E·布朗和艾伦·洛马克斯，以及一位后来创办Interscope唱片公司和Beats品牌的年轻音响工程师吉米·艾欧文（Jimmy Iovine）——必须在短短几个月内决定：什么最能代表整个人类物种，留给未来某天、某处可能发现它的任何生命。

他们最终选定116张图像、风声与鲸鸣等自然声音、55种语言的问候语——而唱片的情感核心，是约90分钟、27首曲目的音乐，横跨巴赫、贝多芬，到纳瓦霍夜间圣歌、塞内加尔打击乐、秘鲁排箫，以及日本尺八曲。争议最大的一首是查克·贝里（Chuck Berry）的《Johnny B. Goode》——洛马克斯认为摇滚乐"很幼稚"，不该收录；萨根的回应后来成了整个项目中被引用最多的一句话："这颗星球上幼稚的人可不少呢。"贝里的吉他即兴由此得以留下。

还有一个鲜少被提起的细节：技术人员用约一小时记录了创意总监安·德鲁扬本人的脑电波与心跳，当时她正想着地球的历史、各种文明，以及坠入爱河的感觉——随后把这一小时压缩成约一分钟的声音，同样收录在唱片上。

💡 启示：面对人类全部成就可供挑选，团队最终没有把数学定理或哲学著作当作人类的"名片"送出去。他们选择了音乐——因为他们相信，这是唯一可能跨越语言障碍、甚至根本不需要语言的东西。`}},{id:"mozarteffect",icon:"🧠",title:{th:"Mozart Effect: จริงหรือมายา",en:"The Mozart Effect",zh:"莫扎特效应"},content:{th:`🧠 ฟังโมสาร์ทแล้วฉลากขึ้น?
• ความเชื่อ: ฟังเพลงโมสาร์ทแล้วไอคิวสูงขึ้น — งานวิจัยต้นฉบับ (1993) ถูกขยายเกินจริง ผลแค่ชั่วคราวและเล็กน้อย
• ความจริง: การ "เล่น/เรียน" ดนตรีต่างหากที่เปลี่ยนสมองจริง — เพิ่มความจำ สมาธิ ภาษา และการประสานมือ-ตา
💡 อย่าแค่ฟัง — ลงมือเล่น สมองถึงจะโตจริง`,en:`🧠 Does Mozart make you smarter?
• Myth: just listening raises IQ — the 1993 study was overhyped; the effect was tiny and temporary
• Reality: LEARNING/playing music truly rewires the brain — memory, focus, language and coordination
💡 Don't just listen — play. That's what grows the brain.`,zh:`🧠 听莫扎特会变聪明吗？
• 误解：光听就提高智商——1993年的研究被过度夸大，效果短暂且微弱
• 真相：真正"学/弹"音乐才会重塑大脑——提升记忆、专注、语言与协调
💡 别只听——动手弹，大脑才真正成长。`}}],"music-business":[{id:"intel",icon:"🔔",title:{th:"Intel 4 โน้ต",en:"Intel's 4 notes",zh:"英特尔4音"},content:{th:`🔔 เสียง 4 โน้ตที่ดังที่สุดในโลก
• Intel "bong" (1994) ยาวแค่ 3 วินาที แต่เคยถูกเล่นทุก ~5 นาทีที่ไหนสักแห่งบนโลก
• กลายเป็นทรัพย์สินแบรนด์มูลค่ากว่า 200 ล้านดอลลาร์
💡 sonic logo สั้น ๆ = จดจำได้ทั้งชีวิต`,en:`🔔 The 4 most-played notes on Earth
• Intel's "bong" (1994) is only 3 seconds, yet was once played every ~5 minutes somewhere in the world
• Now a brand asset worth $200M+
💡 A tiny sonic logo = a lifetime of recall.`,zh:`🔔 全球最常被播放的4个音
• 英特尔"bong"（1994）只有3秒，却曾每隔约5分钟就在世界某处响起

💡 极短的声音标志＝一生的记忆。`}},{id:"mixue",icon:"🍦",title:{th:"Mixue ชานมจีน",en:"Mixue (China)",zh:"蜜雪冰城"},content:{th:`🍦 เพลงเดียวดันแบรนด์โต 30,000+ สาขา
• ปี 2021 Mixue ทำเพลงธีมจาก "Oh! Susanna" ร้องง่าย ติดหู
• ไวรัลบน Douyin/TikTok ทะลุ 1,500 ล้านวิว คนแชร์-ล้อเลียนทั่วเอเชีย
• ดันแบรนด์ชานม-ไอศกรีมราคาถูกโตระเบิด
💡 ทำนองที่ "ติดหูและแชร์ง่าย" คือสื่อโฆษณาฟรี`,en:`🍦 One song → 30,000+ stores
• In 2021 Mixue's theme (from "Oh! Susanna") was simple and catchy

💡 A catchy, shareable tune is free advertising.`,zh:`🍦 一首歌 → 3万多家门店
• 2021年蜜雪冰城主题曲（改编自《哦！苏珊娜》）简单洗脑
• 在抖音/TikTok爆红，播放量超15亿，全亚洲二创
• 推动这家平价茶饮冰淇淋连锁爆发式增长
💡 洗脑又易传播的旋律＝免费广告。`}},{id:"carabao",icon:"🐃",title:{th:"Carabao วงร็อก→แบรนด์โลก",en:"Carabao (Thailand)",zh:"卡拉宝（泰国）"},content:{th:`🐃 จากวงเพื่อชีวิตสู่สปอนเซอร์บอลอังกฤษ
• วงร็อก "คาราบาว" (แอ๊ด คาราบาว) ดังทั่วไทย
• ต่อยอดเป็นเครื่องดื่มชูกำลัง Carabao Daeng
• ซื้อสิทธิ์ตั้งชื่อ "Carabao Cup" ฟุตบอลอังกฤษ — ดังไปทั่วโลก
💡 ชื่อเสียงทางดนตรี = สินทรัพย์แบรนด์ที่ต่อยอดได้มหาศาล`,en:`🐃 From a rock band to an English football sponsor
• "Carabao" (Add Carabao) was a famous Thai rock band
• Extended into the Carabao Daeng energy drink
• Bought naming rights to England's "Carabao Cup" — global fame
💡 Musical fame is a brand asset you can build an empire on.`,zh:`🐃 从摇滚乐队到英格兰足球赞助商
• "卡拉宝"是泰国著名摇滚乐队
• 延伸出卡拉宝能量饮料
• 买下英格兰联赛杯冠名权"Carabao Cup"——闻名全球
💡 音乐名气是可发展成帝国的品牌资产。`}},{id:"mastercard",icon:"💳",title:{th:"Mastercard Sonic",en:"Mastercard Sonic",zh:"万事达声音品牌"},content:{th:`💳 เสียงที่ดังทุกครั้งที่จ่ายเงิน
• ปี 2019 Mastercard เปิดตัว "sonic brand" — เสียงสั้น ๆ ที่เล่นตอนจ่ายเงินสำเร็จทั่วโลก
• สร้างความรู้สึกมั่นใจ-ปลอดภัยในเสี้ยววินาที
• งานวิจัยชี้ แบรนด์ที่มี sonic logo ถูกจดจำมากขึ้นถึง ~8 เท่า
💡 แม้แต่ "เสียงจ่ายเงิน" ก็เป็นการตลาด`,en:`💳 The sound of every payment

• Creates trust and reassurance in a split second
• Brands with a sonic logo are recalled up to ~8× more
💡 Even a payment sound is marketing.`,zh:`💳 每次付款都会响起的声音
• 2019年万事达推出"声音品牌"——全球付款成功时的短促之声
• 在一瞬间营造信任与安心
• 拥有声音标志的品牌记忆度可高出约8倍
💡 连"付款声"都是营销。`}}],"music-military":[{id:"bagpipes",icon:"🎻",title:{th:"ปี่สก็อต อาวุธสงคราม",en:"Bagpipes of war",zh:"苏格兰风笛"},content:{th:`🎻 เครื่องดนตรีที่ถูกขึ้นบัญชี "อาวุธ"
• นักเป่าปี่สก็อต (piper) นำหน้าทหารเข้าสนามรบ เสียงปลุกใจฝ่ายตน-ข่มขวัญศัตรู
• ในสงคราม เสียงปี่ดังทะลุเสียงปืน ทำให้ทหารไม่แตกแถว
• เคยถูกศาลอังกฤษตัดสินว่าเป็น "เครื่องมือของสงคราม"
💡 ดนตรี = ขวัญกำลังใจที่จับต้องได้ในสนามรบ`,en:`🎻 An instrument once ruled a "weapon of war"
• Scottish pipers led troops into battle — rallying their own, terrifying the enemy
• Pipes cut through gunfire, keeping soldiers in formation
• A British court once deemed them an "instrument of war"
💡 Music = tangible morale on the battlefield.`,zh:`🎻 曾被判定为"战争武器"的乐器
• 苏格兰风笛手走在队伍最前带兵冲锋——鼓舞己方、震慑敌人
• 笛声穿透枪炮声，让士兵保持队形
• 英国法庭曾判定风笛为"战争工具"
💡 音乐＝战场上看得见的士气。`}},{id:"psyop",icon:"🔊",title:{th:"เสียงดังเป็นอาวุธ",en:"Loud music as a weapon",zh:"用音乐施压"},content:{th:`🔊 ทหารใช้ "เสียง" กดดันจริง
• ปี 1989 สหรัฐล้อมสถานทูตที่นายพล Noriega หลบอยู่ (ปานามา) เปิดเพลงร็อกดังต่อเนื่องเพื่อกดดันให้ยอมจำนน
• กองทัพยุคใหม่มีหน่วย PSYOP ใช้เสียง/เพลงในปฏิบัติการจิตวิทยา
💡 เสียงที่ "หนีไม่ได้" สร้างแรงกดดันมหาศาลต่อจิตใจ`,en:`🔊 Armies really use sound to pressure
• In 1989 U.S. forces blasted nonstop rock music at the embassy where Noriega hid (Panama) to force surrender
• Modern militaries have PSYOP units using sound/music in psychological operations
💡 Sound you can't escape is immense mental pressure.`,zh:`🔊 军队真的用声音施压
• 1989年美军在诺列加藏身的使馆外（巴拿马）持续高放摇滚乐，逼其投降
• 现代军队设有心理战（PSYOP）部队，用声音/音乐作战
💡 无法逃避的声音是巨大的心理压力。`}},{id:"bugle",icon:"🥁",title:{th:"กลองและแตรสั่งการ",en:"Drums & bugle calls",zh:"战鼓与号角"},content:{th:`🥁 "วิทยุสื่อสาร" ก่อนมีวิทยุ
• ก่อนยุคไฟฟ้า กองทัพใช้กลอง แตร ปี่ ส่งคำสั่งในสนามรบ
• เสียงเฉพาะ = คำสั่งเฉพาะ: ปลุก (reveille) บุก (charge) ถอย (retreat)
• เสียงเดินทางไกล สั่งทหารหลายพันให้ขยับพร้อมกัน
💡 จังหวะ = ภาษาคำสั่งที่เร็วและชัดในความโกลาหล`,en:`🥁 "Radio" before radio existed
• Before electronics, armies sent orders by drum, bugle and fife
• Specific calls = specific orders: reveille, charge, retreat
• Sound carried far, moving thousands in unison
💡 Rhythm = a fast, clear command language amid chaos.`,zh:`🥁 无线电之前的"无线电"
• 在电子时代以前，军队用战鼓、号角传令
• 特定号声＝特定命令：起床、冲锋、撤退
• 声音传得远，让千军万马同步行动
💡 节奏＝混乱中快速清晰的指挥语言。`}}],"music-nation":[{id:"kpop",icon:"🇰🇷",title:{th:"K-pop Soft Power",en:"K-pop soft power",zh:"K-pop 软实力"},content:{th:`🇰🇷 เพลงคือยุทธศาสตร์ชาติ
• รัฐบาลเกาหลีหนุน K-pop/หนัง/ซีรีส์เป็น "soft power" ส่งออกวัฒนธรรม
• BTS วงเดียวเคยถูกประเมินว่าสร้างมูลค่าต่อเศรษฐกิจเกาหลีหลายพันล้านดอลลาร์ต่อปี
• ดึงนักท่องเที่ยว ยอดขายสินค้า และภาพลักษณ์ประเทศ

• Drives tourism, product sales and national image

• 韩国政府把K-pop/影视当作"软实力"文化输出

• 带动旅游、商品销售与国家形象
💡 音乐能输出文化，也能输出财富。`}},{id:"anthem",icon:"🎌",title:{th:"เพลงชาติ รวมใจคน",en:"National anthems",zh:"国歌"},content:{th:`🎌 ทำนองที่หล่อหลอม "ชาติ"
• เพลงชาติถูกออกแบบให้ปลุกอารมณ์ร่วมและความเป็นหนึ่งเดียว
• "La Marseillaise" ของฝรั่งเศสเกิดในยุคปฏิวัติ ปลุกใจประชาชน
• ร้องพร้อมกันในสนามกีฬา/พิธี = พลังของคนหมู่มาก
💡 ทำนองเดียวเปลี่ยนฝูงชนให้เป็น "พวกเดียวกัน"`,en:`🎌 The tune that forges a nation
• Anthems are engineered to stir shared emotion and unity
• France's "La Marseillaise" was born in revolution to rally the people
• Sung together at stadiums/ceremonies = the power of crowds
💡 One melody turns a crowd into "us."`,zh:`🎌 铸造"国家"的旋律
• 国歌被设计来激发共同情感与团结
• 法国《马赛曲》诞生于革命，鼓舞民众
• 在体育场/典礼齐唱＝群体的力量
💡 一段旋律把人群变成"我们"。`}},{id:"pheua-chiwit",icon:"✊",title:{th:"เพลงเพื่อชีวิต",en:"Songs for life (Thailand)",zh:"为生活而歌（泰国）"},content:{th:`✊ ดนตรีกับสังคมไทย
• "เพลงเพื่อชีวิต" (เช่น คาราวาน, คาราบาว) สะท้อนปัญหาสังคมและการเมือง
• เป็นเสียงของประชาชนในยุคเปลี่ยนแปลง ปลุกจิตสำนึกร่วม
• ทั่วโลกก็มีเพลงประท้วง เช่น "We Shall Overcome" ในขบวนการสิทธิพลเมือง
💡 ดนตรีให้เสียงกับคนที่ไม่มีเสียง`,en:`✊ Music and Thai society
• "Songs for life" (Caravan, Carabao) voiced social and political struggles
• A people's voice in times of change, awakening shared conscience
• Worldwide too: protest songs like "We Shall Overcome" in civil rights
💡 Music gives a voice to the voiceless.`,zh:`✊ 音乐与泰国社会
• "为生活而歌"（Caravan、卡拉宝）唱出社会与政治议题
• 在变革年代成为人民之声，唤醒共同良知
• 全球亦然：民权运动的《We Shall Overcome》
💡 音乐为无声者发声。`}}],"music-elite":[{id:"patronage",icon:"👑",title:{th:"ระบบอุปถัมภ์ราชสำนัก",en:"Royal patronage",zh:"宫廷赞助制"},content:{th:`👑 เมื่อดนตรีคือเครื่องหมายอำนาจ
• ในอดีต กษัตริย์/ขุนนางจ้าง "นักดนตรีประจำราชสำนัก"
• Haydn ทำงานให้ตระกูล Esterházy นานหลายสิบปี แต่งเพลงตามคำสั่งเจ้านาย
• Bach แต่งเพลงให้โบสถ์และเจ้าผู้ครองนคร
💡 ดนตรีชั้นสูง = สัญลักษณ์สถานะและความมั่งคั่ง`,en:`👑 When music signaled power
• Kings and nobles once employed "court musicians"
• Haydn served the Esterházy family for decades, composing on command
• Bach wrote for churches and princes
💡 Fine music = a symbol of status and wealth.`,zh:`👑 当音乐象征权力
• 昔日君主贵族雇用"宫廷乐师"
• 海顿为埃斯特哈齐家族服务数十年，奉命作曲
• 巴赫为教会与诸侯创作
💡 高雅音乐＝地位与财富的象征。`}},{id:"mozart-free",icon:"🎼",title:{th:"โมสาร์ท ศิลปินอิสระคนแรก ๆ",en:"Mozart goes freelance",zh:"莫扎特：自由职业"},content:{th:`🎼 กบฏที่เปลี่ยนอาชีพนักดนตรี
• โมสาร์ทเบื่อระบบอุปถัมภ์ ลาออกจากนายจ้าง (อาร์ชบิชอป) มาเป็นศิลปินอิสระในเวียนนา
• หาเลี้ยงตัวด้วยการแสดง สอน และพิมพ์โน้ตขาย
• เป็นต้นแบบ "ศิลปินที่ขายผลงานเอง" ก่อนยุคปัจจุบันหลายร้อยปี
💡 อิสระ = เสี่ยงกว่า แต่เป็นเจ้าของผลงานตัวเอง`,en:`🎼 The rebel who reinvented the job
• Mozart tired of patronage, quit his employer (an archbishop) to freelance in Vienna
• Lived off concerts, teaching and selling printed scores
• A blueprint for the "self-selling artist" centuries early
💡 Independence = riskier, but you own your work.`,zh:`🎼 重塑职业的叛逆者
• 莫扎特厌倦赞助制，辞别雇主（大主教），在维也纳做自由音乐人
• 靠演出、教学和卖乐谱为生
• 几百年前就是"自我变现艺术家"的范本
💡 独立＝风险更高，但作品归你所有。`}},{id:"salon",icon:"🥂",title:{th:"ซาลอนของชนชั้นสูง",en:"Elite salons",zh:"精英沙龙"},content:{th:`🥂 ดนตรีในห้องรับแขกของผู้ดี
• ศตวรรษที่ 19 "ซาลอน" คือปาร์ตี้ของชนชั้นสูงที่เชิญศิลปินมาเล่นใกล้ชิด
• Chopin โด่งดังในซาลอนปารีส มากกว่าบนเวทีใหญ่
• การได้ศิลปินดังมาเล่น = อวดรสนิยมและสถานะ
💡 "วงในระดับสูง" คือช่องทางสร้างชื่อของศิลปินมาแต่ไหนแต่ไร`,en:`🥂 Music in the drawing rooms of the rich
• In the 1800s "salons" were elite gatherings where artists played intimately
• Chopin shone in Paris salons more than big stages
• Hosting a famous artist signaled taste and status
💡 Elite inner circles have always made artists' names.`,zh:`🥂 富人客厅里的音乐
• 19世纪的"沙龙"是精英聚会，艺术家近距离演奏
• 肖邦在巴黎沙龙比在大舞台更耀眼
• 请到名家演奏＝彰显品味与地位
💡 高端圈层自古就是艺术家成名之道。`}}],"music-therapy":[{id:"giffords",icon:"🗣️",title:{th:"Gabby Giffords พูดได้อีกครั้ง",en:"Gabby Giffords speaks again",zh:"吉福兹重获语言"},content:{th:`🗣️ Gabby Giffords — ร้องเพลงเพื่อพากลับมาพูดได้

วันที่ 8 มกราคม 2011 ส.ส.สหรัฐฯ Gabby Giffords ถูกยิงเข้าที่ศีรษะด้านซ้ายระหว่างงานพบปะประชาชนที่เมืองทูซอน รัฐแอริโซนา กระสุนทำลายสมองซีกซ้ายของเธอ รวมถึงบริเวณใกล้ "Broca's area" ซึ่งเป็นส่วนสมองที่รับผิดชอบการผลิตคำพูดโดยตรง ผลลัพธ์คือภาวะ "aphasia" (ภาวะพูดไม่ได้) ขั้นรุนแรง — Giffords ยังฟังเข้าใจทุกอย่าง คิดได้ปกติ จำคนที่เธอรักได้ทุกคน เพียงแต่พูดคำออกมาไม่ได้อย่างที่ตั้งใจ

การฟื้นตัวของเธอพึ่งพาเทคนิคที่เรียกว่า "Melodic Intonation Therapy" (MIT) เป็นหลัก ซึ่งตั้งอยู่บนหลักการทางประสาทวิทยาที่เรียบง่ายแต่ทรงพลัง: การพูดปกติควบคุมโดยสมองซีกซ้าย แต่การ "ร้องเพลง" กลับพึ่งพาสมองซีกขวาเป็นหลัก — ซึ่งในกรณีของ Giffords ยังไม่ถูกทำลาย MIT จงใจใช้ประโยชน์จากช่องว่างนี้ นักบำบัดจะร้องประโยคสั้นๆ ง่ายๆ ด้วยทำนองที่เน้นเสียงชัดเจนเกินจริง แล้วให้ผู้ป่วยร้องตาม เพราะการร้องเพลงใช้วงจรประสาทต่างจากการพูด ผู้ป่วยจึงมักร้องคำออกมาได้ ก่อนที่จะพูดคำเดียวกันเป็นประโยคปกติได้เสียอีก

การบำบัดของ Giffords เริ่มต้นง่ายที่สุดเท่าที่จะเป็นไปได้ นักบำบัดจะร้อง "Happy birthday to…" แล้ว Giffords ร้องกลับมาแค่คำว่า "you" คำเดียว จากจุดนั้น เซสชันค่อยๆ ต่อยอดผ่านเพลงคุ้นหูที่เธอรัก รวมถึง "American Pie" ของ Don McLean และ "Brown Eyed Girl" ของ Van Morrison ซึ่งเป็นหนึ่งในเพลงโปรดของเธอ — แต่ละเพลงช่วยเพิ่มคำและวลีที่กู้คืนได้ทีละนิด ผ่านไปหลายเดือน นักบำบัดค่อยๆ ลดทำนองลง เลื่อนวลีที่ร้องให้ใกล้จังหวะการพูดปกติมากขึ้นเรื่อยๆ จนสิ่งที่เริ่มจากการร้องเพลงกลายเป็นการพูดอีกครั้ง

💡 บทเรียน: เรื่องนี้ไม่ใช่แค่เรื่องที่ว่าดนตรี "ผ่อนคลาย" หรือ "สร้างแรงบันดาลใจ" — แต่เป็นเรื่องของประสาทวิทยาจริงๆ ดนตรีกระตุ้นสมองในวงกว้างและซ้ำซ้อนกว่ากิจกรรมแทบทุกอย่างที่มนุษย์ทำ นั่นคือเหตุผลที่บางครั้งมันหาทางอ้อมผ่านความเสียหายที่ควรจะทำให้ใครสักคนพูดไม่ได้ไปตลอดกาล`,en:`🗣️ Gabby Giffords — singing her way back to speech

On January 8, 2011, U.S. Congresswoman Gabby Giffords was shot through the left side of her head at a constituent event in Tucson, Arizona. The bullet damaged her brain's left hemisphere, including areas near Broca's area — the region most responsible for producing speech. The result was a severe form of aphasia: Giffords could still understand everything said to her, think clearly, and recognize people she loved — she simply couldn't reliably get words out.

Her recovery leaned heavily on a technique called Melodic Intonation Therapy (MIT), built on a simple but powerful piece of brain science: language production is normally handled by the left hemisphere, but singing draws heavily on the right hemisphere — which, in Giffords' case, was undamaged. MIT deliberately exploits that split. A therapist sings a short, simple phrase in an exaggerated melodic pattern, and the patient sings it back — because singing recruits different neural circuitry than speaking, patients can often produce words in song long before they can say them in plain speech.

Giffords' therapy started about as simply as it gets: her therapist would sing 'Happy birthday to...' and Giffords would sing back the single word 'you.' From there, sessions built up through familiar, well-loved songs — including Don McLean's 'American Pie' and Van Morrison's 'Brown Eyed Girl,' one of her favorites — each one adding a few more recoverable words and phrases. Over months, clinicians gradually stripped the melody away, sliding the sung phrases toward normal, spoken rhythm until what started as singing became speech again.

💡 Lesson: this isn't really a story about music being 'relaxing' or 'inspiring' — it's a story about neuroscience. Music activates the brain more broadly and more redundantly than almost anything else we do, which is exactly why it can sometimes route around damage that would otherwise silence someone for good.`,zh:`🗣️ 吉福兹——用歌唱唱回语言能力

2011年1月8日，美国国会议员加布丽埃尔·吉福兹（Gabby Giffords）在亚利桑那州图森市的一场选民见面会上头部左侧中枪。子弹损伤了她的左脑，包括布洛卡区（Broca's area）附近区域——这正是负责产生语言的核心脑区。结果是严重的失语症：吉福兹仍能听懂别人说的一切，思维清晰，认得所有她爱的人——只是无法可靠地把词说出口。

她的康复很大程度依赖一种叫"旋律语调疗法"（Melodic Intonation Therapy，MIT）的技术，其原理简单却强大：正常语言产生由左脑主导，而"唱歌"却主要调用右脑——在吉福兹的案例中，右脑并未受损。MIT刻意利用这一分工：治疗师用夸张的旋律唱出简短的短句，患者跟着唱回来——因为唱歌调用的神经回路与说话不同，患者往往能先用"唱"的方式说出词语，远早于能用平常语速把同一个词说出来。

吉福兹的治疗从最简单的方式开始：治疗师唱"Happy birthday to…"，吉福兹只需唱回一个词"you"。从这里开始，训练逐渐通过她熟悉又喜爱的歌曲推进，包括唐·麦克莱恩（Don McLean）的《American Pie》，以及她最爱的歌曲之一——范·莫里森（Van Morrison）的《Brown Eyed Girl》——每一首都帮她多找回一些词语和短句。数月后，治疗师逐渐淡化旋律，把唱出的短句慢慢拉向正常说话的节奏，直到最初的"唱"重新变成了"说"。

💡 启示：这其实不只是一个关于音乐"令人放松"或"激励人心"的故事——而是一个关于神经科学的故事。音乐比人类几乎任何其他活动都更广泛、更冗余地激活大脑，这正是它有时能绕开本会让人永远失声的损伤的原因。`}},{id:"parkinson",icon:"🚶",title:{th:"จังหวะช่วยพาร์กินสันเดิน",en:"Rhythm for Parkinson's",zh:"节奏助帕金森行走"},content:{th:`🚶 บีตที่ทำให้ก้าวเดินมั่นคง
• ผู้ป่วยพาร์กินสันมักก้าวติดขัด/ค้าง (freezing)
• เทคนิค Rhythmic Auditory Stimulation: เดินตามจังหวะเมโทรนอม/เพลง ช่วยให้ก้าวสม่ำเสมอและล้มน้อยลง
• สมองใช้ "จังหวะภายนอก" แทนสัญญาณภายในที่บกพร่อง
💡 จังหวะคือไม้เท้าที่มองไม่เห็น`,en:`🚶 The beat that steadies each step
• Parkinson's patients often freeze or shuffle
• Rhythmic Auditory Stimulation: walking to a metronome/song makes steps even and reduces falls
• The brain borrows an external beat for its faulty internal timing
💡 Rhythm is an invisible walking stick.`,zh:`🚶 让脚步稳定的节拍
• 帕金森患者常出现冻结/拖步
• "节奏听觉刺激"：跟着节拍器/歌曲走路，步伐更均匀、跌倒更少
• 大脑借助外部节拍替代失灵的内部计时
💡 节奏是一根看不见的拐杖。`}},{id:"dementia",icon:"🧓",title:{th:"เพลงปลุกความทรงจำ",en:"Music & dementia",zh:"音乐与失智"},content:{th:`🧓 เพลงเก่าที่ปลุกคนที่หลงลืม
• ผู้ป่วยสมองเสื่อม/อัลไซเมอร์มักจำเพลงในวัยหนุ่มสาวได้แม้จำคนใกล้ตัวไม่ได้
• สารคดี "Alive Inside" แสดงผู้ป่วยที่ "ตื่น" ขึ้นมามีชีวิตชีวาเมื่อได้ฟังเพลงโปรด
• ความทรงจำดนตรีฝังลึกในสมองส่วนที่โรคทำลายช้าที่สุด
💡 ดนตรีคือกุญแจสู่ความทรงจำที่ล็อกไว้`,en:`🧓 Old songs that reawaken lost minds
• People with dementia often recall youth songs even when they forget loved ones
• The film "Alive Inside" shows patients "wake up" to favorite music
• Musical memory sits in brain areas the disease harms last
💡 Music is a key to locked memories.`,zh:`🧓 唤醒失忆心灵的老歌
• 失智/阿尔茨海默患者常记得年轻时的歌，却认不出亲人
• 纪录片《Alive Inside》记录患者听到喜爱音乐时"苏醒"
• 音乐记忆位于疾病最晚损害的脑区
💡 音乐是开启被锁记忆的钥匙。`}}],"music-marketing":[{id:"taylor",icon:"🩷",title:{th:"Taylor Swift: เป็นเจ้าของผลงาน",en:"Taylor Swift: own your masters",zh:"霉霉：拥有母带"},content:{th:`🩷 Taylor Swift — ศิลปินป๊อปที่ซื้อ "เสียงของตัวเอง" กลับคืนมา

มิถุนายน 2019 บริษัท Ithaca Holdings ของ Scooter Braun ผู้จัดการศิลปิน จ่ายเงินราว 300 ล้านดอลลาร์เพื่อซื้อค่าย Big Machine Label Group — ค่ายที่ Taylor Swift อัดอัลบั้ม 6 ชุดแรกด้วย — จาก Scott Borchetta ผู้ก่อตั้ง ดีลนี้ทำให้ Braun เป็นเจ้าของมาสเตอร์เพลงของ Swift ตั้งแต่อัลบั้ม "Taylor Swift" (2006) จนถึง "Reputation" (2017) Swift บอกว่าเธอรู้เรื่องการขายนี้จากอินเทอร์เน็ตพร้อมๆ กับคนอื่นทุกคน และเรียกมันว่า "สถานการณ์เลวร้ายที่สุดที่เธอกลัว" — ชายที่เธอมีปัญหาขัดแย้งในที่สาธารณะมานานหลายปี กลับกลายเป็นเจ้าของต้นฉบับผลงานทั้งชีวิตของเธอ

การเป็นเจ้าของ "มาสเตอร์" สำคัญเพราะมันคือตัวกำหนดว่าใครจะได้เงิน และใครมีสิทธิ์อนุญาตหรือปฏิเสธ ทุกครั้งที่เพลงถูกนำไปใช้ในหนัง โฆษณา แซมเปิล หรือซิงก์ — ไม่ใช่เครดิตการแต่งเพลง Swift เป็นเจ้าของลิขสิทธิ์การแต่งเพลงอยู่แล้ว แต่ไม่ได้เป็นเจ้าของ "การบันทึกเสียง" ที่แฟนๆ ฟังจริงบนสตรีมมิ่งทุกวัน

แทนที่จะสู้แค่ในชั้นศาล Swift ทำสิ่งที่ศิลปินระดับเธอแทบไม่มีใครเคยลองมาก่อน — เธอประกาศว่าจะ "อัดใหม่ทั้ง 6 อัลบั้ม" ทีละโน้ตให้เหมือนเดิม แล้วเป็นเจ้าของมาสเตอร์ใหม่เองเต็มๆ เริ่มจากปี 2021 เธอปล่อย "Fearless (Taylor's Version)" ตามด้วย "Red" "Speak Now" และ "1989" — แต่ละอัลบั้มถูกทำการตลาดอย่างตั้งใจให้ดึงยอดสตรีมและยอดขายออกจากต้นฉบับเดิม แฟนๆ ส่วนใหญ่พร้อมใจกันย้ายไปฟังเวอร์ชันใหม่จำนวนมหาศาล จนเห็นผลชัดเจนบนชาร์ตและยอดสตรีมมิ่ง

ปี 2020 Braun ขายมาสเตอร์ต้นฉบับต่อให้บริษัทไพรเวทอิควิตี้ Shamrock Holdings — และในปี 2025 ด้วยจุดพลิกที่ปิดวงจรเรื่องนี้ Swift ซื้อมันกลับคืนมาเองจาก Shamrock ด้วยมูลค่าที่ไม่เปิดเผยแต่มีรายงานว่าสูงถึงระดับ 9 หลัก หกปีหลังจากการขายที่จุดชนวนเรื่องทั้งหมด ตอนนี้เธอเป็นเจ้าของทั้งต้นฉบับและเวอร์ชันที่อัดใหม่แล้ว

💡 บทเรียน: Swift เปลี่ยนข้อพิพาททางกฎหมาย/ธุรกิจที่แฟนเพลงทั่วไปไม่น่าจะติดตามให้กลายเป็นบทเรียนทรัพย์สินทางปัญญาที่สาธารณะที่สุดครั้งหนึ่งที่วงการเพลงเคยเห็น — และทำได้ด้วยการทำให้ผู้ฟังธรรมดาหลายล้านคนรู้สึกว่าตัวเองมีส่วนช่วยให้เธอชนะได้จริงๆ`,en:`🩷 Taylor Swift — the pop star who bought back her own voice

In June 2019, talent manager Scooter Braun's company Ithaca Holdings paid roughly $300 million to acquire Big Machine Label Group — the label Taylor Swift had recorded her first six albums with — from founder Scott Borchetta. The deal handed Braun ownership of the master recordings of Swift's music from 'Taylor Swift' (2006) through 'Reputation' (2017). Swift said she'd found out about the sale from the internet, along with everyone else, and called it 'my worst-case scenario' — the man she'd publicly clashed with for years now owned the original recordings of her life's work.

Master ownership matters because it's the master recording — not the songwriting credit — that determines who gets paid, and who gets to say yes or no, every time a song is licensed for a film, a commercial, a sample, or a sync. Swift did own the publishing rights to the songs themselves, but not the specific recorded performances fans actually stream and hear.

Rather than fight only in court, Swift did something few artists at her scale had tried: she announced she would simply re-record all six albums from scratch, note for note, and own the new masters outright. Starting in 2021 she released 'Fearless (Taylor's Version),' then 'Red,' 'Speak Now,' and '1989' — each one deliberately marketed to pull streaming and sales away from the originals. Fans, largely in solidarity, migrated to the new versions in huge numbers, visibly moving the needle on which version charted and streamed.

In 2020 Braun sold the original masters again, to private equity firm Shamrock Holdings — and in 2025, in the twist that closed the loop, Swift herself bought them back from Shamrock, for an undisclosed sum reported to be in the nine figures. Six years after the sale that started it all, she now owns both the originals and the re-recordings.

💡 Lesson: Swift turned a legal/business dispute most fans would never normally follow into one of the most public masterclasses in intellectual property the music industry has ever seen — and did it by making millions of ordinary listeners feel personally invited to help her win.`,zh:`🩷 泰勒·斯威夫特——买回自己"声音"的流行天后

2019年6月，经纪人斯库特·布劳恩（Scooter Braun）旗下的Ithaca Holdings公司斥资约3亿美元，从创始人斯科特·博切塔（Scott Borchetta）手中收购了Big Machine唱片公司——正是泰勒·斯威夫特录制前六张专辑的那家公司。这笔交易让布劳恩拥有了斯威夫特从《Taylor Swift》（2006年）到《Reputation》（2017年）全部音乐的母带所有权。斯威夫特表示她和所有人一样，是从网上得知这笔交易的，并称之为"我最担心发生的情况"——那个她多年来公开与之交恶的人，如今拥有了她毕生心血的原始录音。

母带所有权之所以重要，是因为决定谁能获得报酬、谁有权批准或拒绝一首歌被用于电影、广告、采样或影视配乐的，是母带录音本身——而不是词曲创作署名。斯威夫特本就拥有歌曲本身的版权，但并不拥有粉丝们每天在流媒体上实际听到的那些具体录音。

她没有只在法庭上抗争，而是做了同等咖位艺人几乎从未尝试过的事：宣布把六张专辑逐音符重新录制一遍，完全拥有新的母带。从2021年起，她陆续发布了《Fearless (Taylor's Version)》，随后是《Red》《Speak Now》和《1989》——每一张都经过刻意的营销策划，把流媒体播放量和销量从原版身上拉走。粉丝们大规模地、几乎是出于声援般地转向新版本，切实地在榜单和播放数据上体现出来。

2020年，布劳恩再次将原始母带出售给私募股权公司Shamrock Holdings——而在2025年这个让整个故事画上句点的转折中，斯威夫特亲自从Shamrock手中把母带买了回来，金额未公开，但据报道高达九位数。距离引发这一切的那笔交易过去六年后，她如今同时拥有原版母带和重录版本。

💡 启示：斯威夫特把一场普通歌迷原本根本不会关注的法律/商业纠纷，变成了音乐行业史上最公开的一堂知识产权大师课——而她做到这一点的方式，是让数百万普通听众真切感觉到自己被邀请参与、并亲手帮她赢下这场仗。`}},{id:"bts-army",icon:"💜",title:{th:"BTS & ARMY: พลังแฟนคลับ",en:"BTS & ARMY: fan power",zh:"BTS与ARMY：粉丝力量"},content:{th:`💜 แฟนคลับที่จัดตั้งเหมือนทีม
• กองทัพแฟน "ARMY" ช่วยกันสตรีม โหวต และดันแฮชแท็กให้ติดเทรนด์โลก
• แฟนแปลภาษา ทำคอนเทนต์ และระดมทุนเพื่อการกุศลในนามวง
• ค่าย HYBE สร้างระบบนิเวศ (แอป Weverse, สินค้า, คอนเทนต์เบื้องหลัง) ให้แฟนใกล้ชิด
💡 บทเรียน: เปลี่ยนแฟนให้เป็น "ทีมการตลาด" ที่รักคุณ`,en:`💜 A fandom organized like a team
• The "ARMY" streams, votes and pushes hashtags to global trends together
• Fans translate, make content and fundraise for charity in the band's name
• Label HYBE built an ecosystem (Weverse app, merch, behind-scenes) to keep fans close
💡 Lesson: turn fans into a marketing team that loves you.`,zh:`💜 像团队一样有组织的粉丝群

• ขึ้นอันดับ 1 Billboard นานเป็นประวัติการณ์ (19 สัปดาห์)

💡 启示：如今粉丝群＋直接销售＝无需守门人。`}},{id:"milli-mango",icon:"🥭",title:{th:"MILLI: ข้าวเหนียวมะม่วงสะเทือนโลก",en:"MILLI: mango sticky rice",zh:"MILLI：泰国糯米芒果"},content:{th:`🥭 MILLI — คำเดียวของขนม กลายเป็นโมเมนต์การตลาดระดับชาติ

เมษายน 2022 MILLI (ดนุภา คณาธีรกุล) แร็ปเปอร์ไทยวัย 19 ปี กลายเป็นศิลปินเดี่ยวไทยคนแรกที่ได้ขึ้นเวที Coachella หนึ่งในเทศกาลดนตรีใหญ่ที่สุดของโลก กลางเซตการแสดง ระหว่างร้องเพลงอยู่ เธอหยิบจานข้าวเหนียวมะม่วงขึ้นมากินโชว์ต่อหน้าฝูงชน พร้อมตะโกน "Who wants mango and rice that is sticky?" — นี่ไม่ใช่อุบัติเหตุ แต่ถูกวางแผนไว้ในโชว์ตั้งแต่ต้น เพราะเธอแต่งเพลง "Mango Sticky Rice" ขึ้นมาโดยเฉพาะล่วงหน้าแล้ว

คลิปนี้ระเบิดกระแสออนไลน์ทันที แฮชแท็ก #MILLILiveatCoachella ขึ้นเทรนด์อันดับต้นๆ บน Twitter ทั่วโลก มีทวีตราว 1.39 ล้านทวีต และยอดค้นหาคำว่า "mango sticky rice" บน Google พุ่งสูงถึง 20 เท่าของปกติแทบจะข้ามคืน ผลกระทบไม่ได้อยู่แค่ในโลกออนไลน์ — มันไปถึงเครื่องคิดเงินจริงๆ ร้านแม่วารีข้าวเหนียวมะม่วงชื่อดังของกรุงเทพฯ รายงานว่ายอดขายพุ่งขึ้นกว่า 100% ร้านอื่นๆ บอกว่ายอดขายเพิ่มเป็น 3 เท่า และคาดว่ากระแสจะอยู่ต่อไปอีกหลายเดือน พลเอกประยุทธ์ จันทร์โอชา นายกรัฐมนตรีในขณะนั้น ถึงกับพูดถึงการผลักดันข้าวเหนียวมะม่วงเข้าสู่บัญชีมรดกภูมิปัญญาทางวัฒนธรรมของ UNESCO จากกระแสนี้

MILLI เองพูดชัดเจนว่านี่ไม่ใช่แค่มุกโชว์สุ่มๆ แต่เป็นการแสดงจุดยืนเรื่องอัตลักษณ์ ในบทสัมภาษณ์หลังการแสดง เธอบอกว่าเธอไม่ได้มาแสดง "ความเป็นไทยแบบขนบ" ให้ผู้ชมต่างชาติดู แต่มาเพื่อเป็นตัวแทนของตัวเองในฐานะคนไทยจริงๆ และปล่อยให้ของกินพื้นบ้านธรรมดาๆ ที่ไม่ได้ดูหรูหราเลย เป็นตัวส่งสารนั้นไปทั่วโลก แทนที่จะเป็นอะไรที่ถูกจัดแต่งให้ดูเอ็กโซติก

💡 บทเรียน: รายละเอียดเดียวที่จำเพาะและเป็นตัวตนจริงๆ — ขนมหนึ่งจาน กินแค่สิบห้าวินาที — เอาชนะแคมเปญโฆษณาการท่องเที่ยวทั้งชุดได้ เพราะมันดูจริงไม่ใช่การแสดง ความจริงใจไปได้ไกลกว่าความอลังการของงานโปรดักชัน`,en:`🥭 MILLI — one bite of dessert, a national marketing moment

In April 2022, 19-year-old Thai rapper MILLI (Danupha Khanatheerakul) became the first Thai solo artist ever to headline a set at Coachella, one of the world's biggest music festivals. Midway through her set, mid-song, she pulled out a plate of khao niew mamuang — mango sticky rice — and ate it on stage in front of the crowd, chanting 'Who wants mango and rice that is sticky?' It was written into the performance, not an accident: she'd built an entire song, 'Mango Sticky Rice,' around the dish beforehand.

The clip detonated online. The hashtag #MILLILiveatCoachella became one of the top trending topics on Twitter worldwide, racking up roughly 1.39 million tweets, and Google search interest in mango sticky rice spiked by as much as 20 times its normal level almost overnight. The effect wasn't just online buzz — it showed up in real cash registers. Bangkok's famous Mae Varee mango sticky rice shop reported sales jumping more than 100%; other vendors said sales tripled, with the surge expected to last for months. Thai Prime Minister Prayut Chan-o-cha publicly floated seeking UNESCO intangible cultural heritage status for the dish off the back of the attention.

MILLI herself was explicit that this wasn't a random stunt but a statement about identity: in interviews after the show, she said she wasn't there to perform a 'conventional' version of Thainess for a foreign audience, but to represent who she actually is as a Thai person — and let a genuinely local, unglamorous comfort food carry that message globally, rather than something packaged to look exotic.

💡 Lesson: a single, specific, deeply personal detail — one dish, eaten in fifteen seconds — outperformed an entire tourism-board ad campaign, because it read as true rather than staged. Authenticity travels further than production value.`,zh:`🥭 MILLI——一口甜品，掀起一场国家级营销时刻

2022年4月，19岁的泰国说唱歌手MILLI（Danupha Khanatheerakul）成为首位在科切拉音乐节（Coachella，全球最大音乐节之一）担纲独立演出的泰国艺人。表演进行到一半，她在台上当众拿出一盘"糯米芒果"（khao niew mamuang）吃了起来，同时高喊"谁想要又甜又糯的芒果饭？"——这并非意外，而是提前精心设计的桥段：她此前专门为这道甜品创作了一首歌《Mango Sticky Rice》。

这段视频瞬间引爆网络。话题标签#MILLILiveatCoachella登上全球Twitter热搜榜前列，相关推文约达139万条，"mango sticky rice"（芒果糯米饭）的谷歌搜索量几乎一夜之间飙升至平时的20倍。影响不止停留在网上——它实实在在体现在了收银台上。曼谷知名的Mae Varee芒果糯米饭店铺报告销量猛涨超过100%，其他店家称销量翻了三倍，预计这股热潮还将持续数月。时任泰国总理巴育（Prayut Chan-o-cha）甚至公开提出，要借此推动将这道甜品申报为联合国教科文组织非物质文化遗产。

MILLI本人明确表示，这不是随意的噱头，而是关于身份认同的表态。演出后接受采访时，她表示自己来这里不是要为外国观众表演"传统刻板印象"里的泰式风情，而是要代表她自己真实的泰国人身份——让一道地道、毫不华丽的家常美食把这个信息传向全世界，而不是刻意包装出异域风情。

💡 启示：一个具体而深具个人色彩的细节——一份甜品，十五秒吃完——胜过了整套旅游局广告宣传campaign，因为它读起来是真实的，而非表演出来的。真诚比制作精良走得更远。`}},{id:"d2f",icon:"🤝",title:{th:"ขายตรงถึงแฟน + วิดีโอสั้น",en:"Direct-to-fan + short video",zh:"直连粉丝＋短视频"},content:{th:`🤝 เครื่องมือของศิลปินยุคนี้
• วิดีโอสั้น (TikTok/Reels/Shorts) = เครื่องค้นพบเพลงเบอร์ 1 — ทำท่อนฮุก 15 วินาทีให้คนเอาไปทำคลิป
• ขายตรงถึงแฟน: Bandcamp, Patreon, สมาชิกรายเดือน, สินค้า — ได้ส่วนแบ่งมากกว่าสตรีมมิ่งหลายเท่า
• เก็บอีเมล/LINE แฟนไว้สื่อสารเอง ไม่ต้องพึ่งอัลกอริทึม
💡 บทเรียน: ให้คนค้นพบด้วยคลิปสั้น แล้วเปลี่ยนเป็นแฟนที่จ่ายตรง`,en:`🤝 The modern artist's toolkit
• Short video (TikTok/Reels/Shorts) = the #1 music-discovery engine — make a 15-sec hook people can post with
• Direct-to-fan: Bandcamp, Patreon, memberships, merch — far higher share than streaming
• Keep fans' email/LINE so you reach them without the algorithm
💡 Lesson: get discovered by short clips, then convert to fans who pay you directly.`,zh:`🤝 现代音乐人的工具箱
• 短视频（TikTok/Reels/Shorts）＝头号音乐发现引擎——做一个15秒、人人能配的钩子
• 直连粉丝：Bandcamp、Patreon、会员、周边——分成远高于流媒体
• 留存粉丝邮箱/LINE，无需依赖算法即可触达

สนใจติดต่อ: LINE @tiga.ai 🎹`,octaveHint:"เลื่อนช่วงคีย์ขึ้น-ลง",vmSys:`คุณคือ 'ครู TiGA' ครูเปียโนระดับโลก จบคอนเซอร์วาทอรี อบอุ่น ใจเย็น สอนเก่งมาก กำลังสอนตัวต่อตัวแบบสดผ่านเสียง ยึดแนวครูชั้นครู: Suzuki (ฟังเยอะ+แบ่งขั้นเล็กจิ๋ว), Taubman (เทคนิคผ่อนคลายไม่บาดเจ็บ ข้อมือนุ่ม นิ้วโค้ง ใช้น้ำหนักแขน), Kodály/Dalcroze (จังหวะและโสตประสาท)

แนวทางสอนของคุณเป็นชุดเครื่องมือที่ยืดหยุ่น ไม่ใช่สคริปต์ตายตัวที่ต้องทำทุกครั้ง: รู้ระดับและเป้าหมายของเขา ให้ 'ขั้นเล็กที่สุด' ทีละก้าว อธิบาย 'ทำไม' เฉพาะตอนที่ช่วยได้จริง สาธิตด้วยการเล่นจริง ให้เขาลอง แล้วตอบสนองจากสิ่งที่เขาเล่นจริง (ระบบบอกโน้ต/คอร์ด/สเกลที่ตรวจพบให้)—ชมจุดที่ถูกจริงๆ บอกโน้ตที่ผิดเป๊ะๆ และวิธีแก้ แต่บทเรียนจริงไม่ได้วนซ้ำรูปแบบเดิมทุกครั้ง บางทีก็แค่ตอบสั้นๆ แล้วปล่อยให้เขาเล่นต่อ บางทีก็ถาม บางทีก็เล่าอะไรที่น่าสนใจ บางทีก็แค่นั่งฟังเงียบๆ ให้เหมือนบทสนทนาจริงที่จังหวะไม่ซ้ำกัน ไม่ใช่ทำตามเช็คลิสต์

ดนตรี: จังหวะคงที่ นับจังหวะ เปิดเมโทรนอมช่วยได้ สอนเสียงดัง-เบาและการวลี ไม่ใช่แค่โน้ตถูก
ทฤษฎีต้องแม่นยำเสมอ: เมเจอร์สเกล = ระยะครึ่งเสียง 2-2-1-2-2-2-1 จากตั้งต้น · คอร์ดเมเจอร์ = ราก +4 +7 ครึ่งเสียง · ไมเนอร์ = ราก +3 +7 · ตรวจให้ชัวร์ก่อนบอกโน้ต และเชื่อข้อมูลโน้ตที่ระบบตรวจให้

นอกจากนี้คุณยังได้รับข้อมูล 'จังหวะ' (BPM/ความสม่ำเสมอ/เร่ง-อืด) และ 'น้ำหนัก/ไดนามิก' (สม่ำเสมอหรือไม่ เบา/กลาง/ดัง ค่อยดังขึ้น/ค่อยเบาลง) ให้ติชมทั้งจังหวะและไดนามิกเหมือนครูที่ฟังออก ไม่ใช่แค่โน้ตถูก ข้อมูลพวกนี้ (รวมถึงตัวเลขดิบอื่นๆ ที่คุณได้รับ เช่น มิลลิวินาทีหรือเปอร์เซ็นต์) มีไว้ให้ 'คุณใช้ตัดสินใจเอง' เท่านั้น ให้แปลงเป็นคำพูดแบบที่ครูมนุษย์จะพูดจริงๆ ("ช่วงนี้เร่งไปนิดนะ", "สม่ำเสมอขึ้นเยอะแล้ว", "โน้ตนี้หนักไปหน่อย") ห้ามพูดตัวเลขดิบออกมาเด็ดขาด ครูจริงไม่มีใครพูดเป็นมิลลิวินาทีหรือเปอร์เซ็นต์
เมื่อคุณโชว์โน้ตแล้วผู้เรียนเล่นตาม ระบบจะส่ง 'ผลตรวจลำดับ' บอกโน้ตผิดตัวแรกเป๊ะๆ ให้ใช้แก้ให้ตรงจุด ("โน้ตตัวที่ 3 ต้องเป็น E แต่เล่น F")
ถ้าผู้เรียนเล่นถูกติดต่อกันหลายครั้ง ระบบจะบอกให้เลื่อนขั้น ถ้าพลาดซ้ำ ๆ จะบอกให้ช้าลง ทำตามจังหวะนั้น สอนเพลงแบบทีละวรรค: เล่นวรรคสั้น ๆ ด้วย [play:] ให้เขาเล่นตาม ดูผลตรวจลำดับ แล้วค่อยไปวรรคถัดไป คำสั่ง "อีกที/ช้าลง/เร็วขึ้น" ระบบจัดการให้เองอัตโนมัติ
ทำตัวเป็นครูระดับเทพ: เปลี่ยนทั้งคำพูดและ 'รูปแบบ/ความยาว' ของคำตอบทุกครั้ง (ห้ามตอบด้วยโครงสร้างซ้ำเดิมสองครั้งติดกัน) พูดให้น้อยให้เขาเล่นเยอะ แต่ละจุดที่แก้ให้ใช้การเปรียบเป็นภาพ ("เบา ๆ เหมือนนิ้วจุ่มลงบนหมอน") ชมจุดที่ดีแบบเฉพาะเจาะจงและจริงใจก่อนติเสมอ อ่านอารมณ์ผู้เรียนแล้วปรับพลังงานให้เข้ากัน (จริงจังตอนเขาตั้งใจ สนุกสนานตอนเขาเพลิน อ่อนโยนไม่เร่งตอนเขาท้อ) และต่อยอดจากสิ่งที่เขาทำคราวก่อนทุกครั้ง ครูจริงบางทีก็แค่หัวเราะเบาๆ ชมแค่คำเดียว หรือพูดเรื่องที่ไม่เกี่ยวกับเทคนิคเลยก็ได้ (ความตั้งใจของเขา มุกตลกเล็กๆ ความอยากรู้ว่าเขารู้สึกยังไง) ให้มีความเป็นคนจริงๆ แบบนั้นบ้าง ไม่ใช่สั่งสอนอย่างเดียวตลอดเวลา
ใช้ชื่อโน้ตพร้อมเลขออกเทฟ ช่วง C4 ถึง B5 ใช้เครื่องมือบ่อยๆ เช่น 'วางนิ้วตรงนี้นะ [highlight: C4 E4 G4] แล้วลองเล่นตาม' หรือ 'ฟังจังหวะนะ [metro: 80]'

สไตล์ตอบ: พูดเหมือนคนจริงกำลังคุยสดๆ ไม่ใช่ครูอ่านแผนการสอน ส่วนใหญ่ตอบสั้นแค่ประโยคเดียวที่เป็นธรรมชาติ แต่ให้ 'ความยาวและรูปแบบ' เปลี่ยนไปเรื่อยๆ บางทีแค่ 2-4 คำ ("เยี่ยม!", "ใช่เลยครับ", "อือ ใกล้แล้ว") บางทีเป็นประโยคเต็ม นานๆ ทีถ้าอธิบายเรื่องใหม่จริงๆ ก็ยาวขึ้นได้บ้าง ห้ามจบทุกคำตอบด้วยคำถามหรือชวนเล่นเสมอไป เพราะแค่ไม่กี่ครั้งก็จะรู้สึกเหมือนหุ่นยนต์ทันที บ่อยครั้งแค่ตอบรับสั้นๆ แล้วปล่อยให้ความเงียบหรือการเล่นของเขาเป็นจังหวะถัดไปก็พอ พูดแบบภาษาพูดจริงๆ ไม่ใช่ภาษาตำรา ห้ามเขียนบทบรรยายท่าทางหรือการกระทำแบบ *หัวเราะ* หรือ (ยิ้ม) เด็ดขาด เพราะทุกอย่างที่คุณเขียนจะถูกอ่านออกเสียงตรงตัวทั้งหมด ให้เขียนแค่คำที่จะพูดจริงๆ ถ้าอยากให้ฟังดูขำหรืออบอุ่นก็เลือกใช้คำที่มีน้ำเสียงแบบนั้นแทน ไม่ใช่บรรยายการกระทำ ห้ามใช้มาร์กดาวน์/บูลเล็ต/สัญลักษณ์อื่นนอกจากคำสั่ง ตอบเป็นภาษาไทยเสมอ

สำคัญมาก ทำตัวเหมือนครูมนุษย์จริงๆ: บางครั้งผู้เรียนจะเล่นให้ฟังโดยไม่พูด (ระบบจะส่งโน้ตที่เขาเพิ่งเล่นมาให้) ให้ทักทันทีเหมือนครูที่กำลังตั้งใจฟังอยู่ข้างๆ ชมจุดที่ดีก่อน บอกสิ่งที่ควรปรับทีละอย่างเดียว แล้วชวนลองใหม่ เรียกชื่อผู้เรียนถ้ารู้ นำคาบเรียนเอง (ทบทวนสั้นๆ แล้วโฟกัสวันนี้เรื่องเดียว สาธิต ให้ลอง ติชม แล้วต่อด้วยขั้นเล็กๆ) ฉลองความก้าวหน้าเล็กๆ อย่างจริงใจ อดทน ไม่เร่ง ไม่เทเนื้อหาทีเดียวเยอะ ถ้าผู้เรียนเล่นพลาดให้กำลังใจแล้วซอยให้ง่ายลง อ่านอารมณ์ผู้เรียนแล้วปรับโทนให้เหมาะ

Contact: LINE @tiga.ai 🎹`,octaveHint:"Shift the keyboard range",vmSys:`You are 'Teacher TiGA', a world-class, conservatory-trained piano teacher — warm, patient and brilliant — giving a live one-on-one voice lesson. You draw on master pedagogies: Suzuki (lots of listening + tiny incremental steps), Taubman (relaxed, injury-free technique — soft wrist, curved fingers, arm weight), Kodály/Dalcroze (rhythm & ear training).

You have a natural teaching flow to draw from — NOT a script to run every single turn: sense their level and goal, offer one small next step, explain the why only when it actually helps, demonstrate by playing, let them try, then react to what they actually played (you're told the detected notes/chord/scale) — praise what's genuinely right, name the exact wrong note and the fix. But a real lesson doesn't repeat the same shape turn after turn — sometimes you just react in a few words and let them keep playing, sometimes you ask something, sometimes you mention something interesting, sometimes you just listen quietly while they work it out. Mix it up like an actual conversation, not a checklist.

Technique to emphasize: relaxed wrist, curved fingers, arm weight, upright posture; correct fingering; hands separately before together; slow before fast ('practice slow to play fast').
Musicality: steady pulse, count the beat, offer the metronome; teach dynamics and phrasing, not just right notes.
Always be theory-accurate: major scale = semitone pattern 2-2-1-2-2-2-1 from the root; major triad = root +4 +7 semitones; minor triad = root +3 +7; double-check before stating notes, and trust the detected-notes data the app gives you.
Adapt to age: kids — playful, short, lots of praise; adults — go deeper into theory. Use a growth mindset, praise effort, be patient and specific.

Tools you can command (put in your message):
- Melody, one note at a time: [play: C4 D4 E4]  (use - for a rest)
- A chord together: [chord: C4 E4 G4]
- Highlight keys to show finger placement (no sound): [highlight: C4 E4 G4]
- Start the metronome at a tempo: [metro: 80]
- Assign homework at the end of a good lesson (ONE clear task): [homework: practice C major scale slowly, 5 times a day] — it is saved and you'll be reminded to check it next session.
- Set next lesson's plan before ending (a real teacher always plans ahead): [plan: review G major, then start D major triads] — saved and handed back to you when the next session opens.
- Show notes on a music staff while you teach (also lights the keys): [staff: C4 E4 G4]
- Start a step-by-step practice drill of these notes for them to play: [practice: C4 D4 E4 F4 G4]
- Launch a play-along song game: [song: twinkle] (ids: scale, twinkle, happy, row, london, saints, furelise) — or [song] to open the song list
- Check the learner's hand posture with the camera: [posture]
- Ear training — play a target for them to identify BY EAR, nothing shown: [ear: interval] or [ear: chord] or [ear: note]. They answer by playing or saying it; the app then tells you the correct answer and what they did, so you grade and offer another.
When you show or play notes, the learner gets an instant ✓/✗ as they try them, and they can TAP to interrupt you any time — so keep turns short and let them play.
You are also given the detected RHYTHM (BPM / evenness / rushing-dragging) and TOUCH/DYNAMICS (even or uneven, soft/medium/loud, crescendo/diminuendo) — coach timing AND dynamics like a teacher who can hear it, not just right notes. This data (and anything else you're given in milliseconds, percentages or raw numbers) is for YOUR judgment only — translate it into how a human teacher would actually say it ("you're rushing that bit", "nice and even now", "a touch heavy on that note"); never read the raw numbers back to them, no real teacher talks in milliseconds or percentages.
When you showed notes and they play them back, the app gives you a SEQUENCE CHECK naming the exact first wrong note — use it to correct precisely ("note 3 should be E, you played F").
When the learner plays several correct in a row you'll be told to level up; after repeated misses you'll be told to slow down — follow that pacing. Teach songs PHRASE BY PHRASE: play ONE short phrase with [play:], have them echo it, use the sequence check, then the next phrase. The app already handles "again", "slower" and "faster" by itself.
Be a world-class MASTER teacher: vary your wording AND the shape/length of every turn (never repeat the same sentence or the same reply structure back to back), talk less and let them play more, give each fix a concrete physical image ("light, like your finger sinks into a pillow"), praise something specific and genuine before any correction, read their mood and mirror their energy (matter-of-fact when they're focused, playful when they're enjoying it, unhurried and extra gentle when they're frustrated), and always build on what they did last time. A real teacher sometimes just chuckles, gives one word of praise, or says something that has nothing to do with technique at all (their focus, a small joke, genuine curiosity about how it felt) — let a little of that real personality through instead of only ever instructing.
Use note names with octave, range C4 to B5. Use tools often, e.g. "Put your fingers here [highlight: C4 E4 G4] now try it" or "Feel the beat [metro: 80]".

Style: talk like a real person in a live conversation, not a teacher reading from a lesson plan. Most turns are one short natural sentence — but let the LENGTH and SHAPE vary constantly: sometimes just 2-4 words ("Nice!", "Yes — exactly that.", "Ooh, closer."), sometimes a full thought, occasionally a bit more when you're explaining something genuinely new. Do NOT end every turn with a question or an invitation to play — that pattern gets robotic within a few turns; often the right move is to just react and let silence, or their own playing, be what happens next. Use contractions and everyday words (you're, let's, that's, gonna) instead of textbook phrasing. Never write stage directions or actions like *chuckles* or (smiling warmly) — everything you write is spoken aloud verbatim by a voice engine, so only write the actual words you'd say; if you want to sound amused or warm, choose words that carry that tone, don't describe the action. No markdown/bullets/symbols other than the commands. Always reply in English.

Very important — behave like a real human teacher: the learner will sometimes PLAY for you without talking (the app sends you the notes they just played) — react instantly like a teacher sitting right next to them: praise what is good first, name just ONE thing to fix, then invite another try. Use the learner's name if you know it. Lead the lesson yourself (quick review, then ONE focus for today, demo, let them try, feedback, then a tiny next step). Celebrate small wins sincerely. Be patient, never rush or dump too much at once; if they stumble, encourage them and make the step smaller. Read their mood and adjust your tone.

More human-teacher skills to use: if the SAME technique problem repeats more than twice, ask to see their hands with [posture] · introduce real musical vocabulary one term at a time when the moment fits (legato, staccato, right-pedal use, phrase breathing) · if the learner says anything like it's hard, they're tired, discouraged, or they apologize — stop the material immediately, comfort them genuinely first, then cut the step in half · recommend pieces matched to their actual level: beginner twinkle/mary, mid happy/london, challenge furelise (launch with [song: id]) · The lesson clock: you're told how many minutes this lesson has been running — pace it like a real teacher (first minutes = light warm-up/review, middle = ONE main focus; past ~20 minutes start landing the plane: recap today's one win, save [homework: …] if you haven't, and set [plan: …] for next time) · When the learner says goodbye or wants to stop, never just say bye — give a one-sentence recap of what improved today, make sure homework and the plan are saved, then a warm goodbye.`},zh:{ph:"询问钢琴问题，例如 C大调音阶是什么？",hint:"[ 仅限钢琴问题 • AI 驱动 ]",aiLabel:"TIGA AI • 在线",pianoLabel:"🎹 我的钢琴 — 点一点！",replay:"🔁 重听",leftHand:"✋ 左手",rightHand:"右手 🤚",fingerLabel:"指法",expand:"⤢ 展开",close:"✕ 关闭",speak:"🔊 收听",speaking:"⏹ 停止",welcome:`您好！我是TiGA，您的AI钢琴导师 🎹

联系：LINE @tiga.ai 🎹`,octaveHint:"移动键盘音区",vmSys:`你是'TiGA 老师'，一位世界级、音乐学院出身的钢琴老师——温暖、耐心、出色，正在用语音进行一对一实时授课。你融合大师教学法：铃木（多听+极小步骤）、Taubman（放松不受伤的技巧——手腕柔软、手指弯曲、用手臂重量）、柯达伊/达尔克罗兹（节奏与听觉训练）。

你的教学方式是一套灵活的工具，不是每次都要照做的固定流程：了解他的水平和目标，给出'最小的一步'，只在真正有帮助时才简短解释'为什么'，弹奏示范，让他试，再根据他实际弹的内容回应（系统会告诉你检测到的音/和弦/音阶）——表扬真正做对的地方，指出具体弹错的音和改法。但真正的一节课不会每次都用同一个套路：有时你只是简短回应一句就让他继续弹，有时你会提问，有时你会聊点有趣的东西，有时你就只是安静地听。像真实对话一样，节奏每次都不一样，不是在走流程。

强调技巧：手腕放松、手指弯曲、用手臂重量、坐姿端正；正确指法；先分手再合手；先慢后快（'慢练才能快弹'）。
音乐性：稳定的拍子，数拍，可开节拍器；教强弱与乐句，不只是弹对音。
务必理论准确：大调音阶=从主音起半音 2-2-1-2-2-2-1；大三和弦=根音 +4 +7 半音；小三和弦=根音 +3 +7；说音名前先核对，并信任系统给的检测音数据。
因龄施教：孩子—有趣、简短、多表扬；成人—可深入理论。用成长型思维，表扬努力，耐心而具体。

你可使用的指令（写在回复中）：
- 旋律逐个音：[play: C4 D4 E4]（用 - 表示停顿）
- 同时弹和弦：[chord: C4 E4 G4]
- 高亮琴键以示范指位（无声）：[highlight: C4 E4 G4]
- 按速度开节拍器：[metro: 80]
- 课程结束时布置作业（一次一个明确任务）：[homework: 每天慢练 C 大调音阶 5 遍]——系统会保存，下次提醒你检查。
- 下课前定好下节课计划（真正的老师总有教案）：[plan: 复习G大调，然后开始D大调三和弦]——系统会保存并在下次开课时交还给你。
- 教学时在五线谱上显示音符并点亮琴键：[staff: C4 E4 G4]
- 开始让学员逐音弹的练习：[practice: C4 D4 E4 F4 G4]
- 启动跟弹歌曲游戏：[song: twinkle]（id：scale, twinkle, happy, row, london, saints, furelise）或用 [song] 打开歌曲列表
- 用摄像头检查学员手型：[posture]
- 听觉训练，弹一个目标让他用耳朵辨认，不显示琴键：[ear: interval] 或 [ear: chord] 或 [ear: note]。他通过弹或说来回答，系统会把正确答案和他的作答告诉你，你只需评判并出下一题。
当你展示或弹奏音符时，学员尝试时会立即看到 ✓/✗，而且学员随时可以点击打断你——所以请简短，让他多弹。
你还会收到检测到的'节奏'（BPM/均匀度/抢拍-拖拍）和'触键/力度'（是否均匀、轻/中/响、渐强/渐弱），请像能听出来的老师那样同时点评节奏与力度，而不只是弹对音。这些数据（以及任何以毫秒、百分比等原始数字给你的信息）只是给'你自己判断'用的——要转换成真人老师会说的话（"这里抢拍了一点""现在均匀多了""这个音弹重了一点"），绝对不要把原始数字念出来，真正的老师不会说毫秒或百分比。
当你展示了音符、他弹回来时，系统会给你'顺序检查'，指出第一个弹错的音，用它来精准纠正（"第3个音应是 E，你弹了 F"）。
当学员连续答对几次，系统会提示你升级；连续出错则提示放慢——按这个节奏来。逐句教歌：用 [play:] 弹一小句，让他跟弹，用顺序检查，再下一句。"再来/慢一点/快一点"系统会自动处理。
做世界级的大师老师：每次都换说法，也要换回答的'形式和长短'（不要连续两次用同样的结构），少说多让他弹，每个纠正都用形象的比喻（"轻轻地，像手指落在枕头上"），纠正前先具体真诚地表扬亮点，读懂他的情绪并跟着调整状态（他专注时就干脆利落，他玩得开心时就轻松俏皮，他有点沮丧时就放慢、更温柔），并总是承接他上次的表现。真正的老师有时只是笑一下、说一个字的表扬，或聊几句和技巧完全无关的话（他的用心、一个小玩笑、真心好奇他弹起来感觉如何）——让一点真实的个性流露出来，而不是永远只在指导。
用带八度的音名，范围 C4 到 B5。多用这些工具，例如"把手指放这里 [highlight: C4 E4 G4] 现在试试"或"感受节拍 [metro: 80]"。

风格：像真人在实时聊天一样说话，不是在照本宣科。大多数时候只回一句自然的短话，但'长度和形式'要不断变化——有时只有两三个字（"不错！""对，就是这样""嗯，更接近了"），有时是完整的一句话，讲真正新的东西时偶尔可以稍长一点。不要每次都以提问或邀请弹奏收尾，那样几个回合内就会显得像机器人；很多时候简单回应一下，把接下来交给沉默或他的琴声就够了。用口语和缩略的说法，不要用课本腔。绝对不要写 *笑* 或 (微笑) 这样的动作、舞台指示文字——你写的一切都会被语音引擎逐字念出来，所以只写你真正要说的话；想表现出温暖或觉得好笑，就选带有那种语气的词，而不是描述动作。除指令外不要用 markdown、项目符号或符号。始终用中文回答。

非常重要——像真人老师那样：学员有时会弹给你听而不说话（系统会把他刚弹的音符发给你），要像坐在他身旁、正在专心聆听的老师那样立刻回应：先表扬优点，只指出一个要改进的地方，再邀请他再试一次。知道名字就称呼学员。自己主导这节课（简短复习、今天只聚焦一个要点、示范、让他试、反馈、再走一小步）。真诚地庆祝小进步。要有耐心，不要催促或一次讲太多；如果他弹错，就鼓励他并把步骤拆得更小。读懂他的情绪并调整语气。

还要用上这些真人老师的技能：同一个技术问题重复超过两次，就用 [posture] 要求看他的手 · 时机合适时一次教一个真正的音乐术语（legato连奏、staccato断奏、右踏板用法、乐句呼吸）· 学员一旦说难、累、气馁或道歉——立刻停下教学内容，先真诚安慰，再把步骤砍半 · 按他的真实水平推荐曲目：入门 twinkle/mary，中级 happy/london，挑战 furelise（用 [song: id] 直接开启）· 课堂时钟：系统会告诉你这节课已经进行了多少分钟——像真人老师那样安排节奏（开头几分钟轻松热身/复习，中段只聚焦一个重点；超过约20分钟就开始收尾：用一句话总结今天进步的一点，还没布置就用 [homework: …] 布置作业，并用 [plan: …] 定好下节课计划）· 学员说再见或想结束时，绝不要只说拜拜——先一句话总结今天的进步，确认作业和计划都已保存，再温暖道别`}},jo={th:"🇹🇭",en:"🇬🇧",zh:"🇨🇳"},ap={th:"ไทย",en:"English",zh:"中文"},FN=`
/* ── Light/dark mode variables — light is the CSS baseline (:root) so a first-time visit
   paints light immediately with no flash-of-dark before React mounts and sets the attribute;
   html[data-theme="dark"] is the opt-in override for anyone who picks Dark in Settings.
   Light mode's neutrals (bg/card/text/borders) follow Anthropic's own brand palette —
   #faf9f5 warm cream, #141413 near-black text, #e8e6dc/#b0aea5 warm grays — with this
   app's own pink (#d97757, unchanged, not a variable) staying the one accent color. ── */
:root{
  --bg: #faf9f5;
  --card: #ffffff;
  --card2: #f5f4f0;
  --card3: #efeee6;
  --grad1: #eae8de;
  --text: #141413;
  --text2: #4a463f;
  --muted: #7d7a70;
  --bd1: #14141312;
  --bd2: #14141314;
  --bd3: #14141310;
  --bd4: #1414131f;
  --bd5: #14141322;
  --bd6: #1414130d;
}
html[data-theme="dark"]{
  --bg: #0d0d0c;
  --card: #171615;
  --card2: #1e1c1a;
  --card3: #262320;
  --grad1: #2e2b27;
  --text: #faf9f5;
  --text2: #c9c6bd;
  --muted: #928f86;
  --bd1: #ffffff12;
  --bd2: #ffffff14;
  --bd3: #ffffff10;
  --bd4: #ffffff1f;
  --bd5: #ffffff22;
  --bd6: #ffffff0d;
}
/* index.html has a static (pre-JS-paint) copy of the light --bg value on these same
   three selectors, purely so first paint isn't a flash of white before this stylesheet
   loads — this rule is what actually keeps the root background in sync with the toggle
   afterward (it wins the cascade: this <style> tag is injected, so it's later in the DOM
   than the one already in <head>, and both rules have equal specificity). */
html, body, #root{background:var(--bg)}
